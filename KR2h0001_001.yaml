body:
  text: 兩漢博聞卷一宋楊侃輯北闕髙帝紀七年上至長安蕭何治未央宫立東闕北闕前殿武庫太倉師古曰未央宫雖南嚮而尚書奏事謁見之徒皆詣北闕公車司馬亦在北焉是則以北闕為正門而又有東門東闕至於西南兩面無門闕矣葢蕭何初立未央宫以厭勝之術理宜然乎案是編於漢書本注多剪裁成文今惟校正訛誤其他雖不純用本文而於義可通者皆仍之鳳闕漸臺井幹郊祀志五下栢梁災粤人勇之廼言曰粤俗有火災復起屋必以大用勝服之於是作建章宫其東則鳳闕髙二十餘丈其西則商中數十里北治大池漸臺髙二十餘丈名曰泰液南立神明臺井榦樓髙五十丈輦道相屬焉師古曰勇之粤人名也鳳闕三輔故事云其闕圜上有銅鳳凰即金雀也如淳曰商中商庭也師古曰商金也於序在秋故謂西方之庭為商庭言廣數十里漸臺漸浸也臺在池中為水所浸故曰漸臺一音子亷反揚雄校獵賦云漸臺泰液注云漸臺在泰液池中漢宮閣疏云神明臺髙五十丈上有九室恒置九天道士百人然則神明井幹俱髙五十丈也井幹者井上木欄也其形或四角或八角張衡西京賦云井幹疊而百層即謂此臺也幹或作韓其義並同麒麟閣蘇武傳二十四甘露三年單于始入朝上思股肱之美廼圖畫其人於麒麟閣張晏曰武帝獲麒麟時作此閣圖畫其象於閣遂以為名師古曰漢宮閣疏云蕭何造靈旗揚雄傳五十七上雄奏甘泉賦曰樹靈旗李竒曰欲伐南越告祈太一畫旗樹太一壇上名靈旗以指所伐之國也鐘虡郊祀志五下甘露元年建章長樂鐘虡銅人皆生毛長一寸所時以為美祥師古曰虡神獸名也縣鐘之木刻飾為之名曰虡也又賈山傳注曰鐘鼓之柎飾為此獸通權火郊祀志五上上宿郊見通權火張晏曰權火㷭火也狀若井挈臯矣其法𩔖稱故謂之權火欲令光明逺照通於祀所也漢祀五畤於雍五十里一㷭火如淳曰權舉也師古曰凡祭祀通舉火者或以天子不親至祠所而望拜或以衆祠各處欲其一時薦饗宜知早晏故以火為之節度也他皆𩔖此承露盤郊祀志五上武帝作栢梁銅柱承露僊人掌之屬蘇林曰仙人以手掌擎盤承甘露師古曰三輔故事云建章宫承露盤髙二十丈大七圍以銅為之上有仙人掌承露和玉屑飲之蓋張衡西京賦所云立脩莖之仙掌承雲表之清露屑瓊蘂以朝餐必性命之可度也尸解郊祀志五上後漢王直傳七十二下燕人為方僊道形解銷化服䖍曰尸解也張晏曰人老而解去故骨如變化也今山中有龍骨世人謂之龍解骨化去應劭曰列仙𫝊曰崔文子學仙於王子喬王子喬化為白蜺文子驚引戈擊之俯而見之王子喬之尸也須臾則為大鳥飛而去師古曰服張二説是也又後漢書注云尸解者言將登仙假托為尸以解化也陳倉寶雞郊祀志五上揚雄傳五十七上秦文公獲若石云于陳倉北阪城祠之其神或嵗不至或嵗數來也常以夜光輝若流星從東方來集于祠城若雄雉其聲殷殷云野雞夜鳴以一牢祠之名陳寶祠蘇林曰質如石似肝師古曰陳倉之北阪上城中也云語辭也殷殷聲也云傳聲之亂也野雞亦雉也言陳寶若來而有聲則野雞皆鳴以應上言雄雉下言野雞史駮文也臣瓚曰陳倉縣有寶夫人祠或一嵗二嵗與葉君合葉君神來時天為之殷殷雷鳴雉為之雊揚雄校獵賦云䍐車飛揚武騎聿皇蹈飛豹追天寶應駍聲擊流光野盡山窮囊括其雌雄師古曰䍐車畢䍐之車也聿皇疾貌應劭曰天寶陳寶也晉灼曰天寶雞頭而人身如淳曰陳寶神來下時駍然有聲又有光精也應劭曰下時窮極山川天地之間然後得其雌雄也師古曰雄在陳倉雌在南陽也故云野盡山窮也駍音普萌反北第夏侯嬰𫝊十一惠帝賜夏侯嬰北第師古曰北第者近北闕之第嬰最第一也故張衡賦云北闕甲第當道直啓東第司馬相如傳二十七下司馬相如喻蜀文曰邊郡之士急國家之難而樂盡人臣之道也故有剖符之封析圭而爵位為通侯居列東第師古曰東第甲宅也居帝城之東故曰東第也甲舎胡建傳三十七射甲舍門師古曰甲舎即甲第也柱下方書張蒼傳十三張蒼秦時為御史主柱下方書如淳曰方板也謂事在板上者也秦置柱下史蒼為御史主其事或曰主四方文書也師古曰居殿柱之下若今侍立御史也計相張蒼傳張蒼封北平侯遷為計相一月更以列侯為主計四嵗是時蕭何為相國而蒼乃自秦時為柱下御史明習天下圖書計籍又善用算律厯故令蒼以列侯居相府主郡國上計者文頴曰以能計故號曰計相師古曰專主計籍故號計相師古曰時所卒立非乆施也師古曰去計相之名更號主計莫府李廣傳二十四李廣莫府省文書晉灼曰將軍職在征行無常處所在為治故言莫府也莫大也或曰衛青征匈奴絶大莫大克獲帝就拜大將軍於莫中府故曰莫府莫府之名始於此也師古曰二説皆非也莫府者以軍幕為義古字通單用耳軍旅無常居止故以帳幕言之亷頗李牧市租皆入幕府此則非因衛青始有其號又莫訓大於義乖矣省少也音所領反部曲李廣傳李廣行無部曲行陳師古曰續漢書百官志云將軍領軍皆有部曲大將軍營五部部校尉一人部下有曲曲有軍候一人今廣尚於簡易故行道之中而不立部曲也傅校衛青𫝊二十五詔御史曰䕶軍都尉公孫敖三從大將軍擊匈奴常䕶軍傅校獲王師古曰傅讀曰附言敖總䕶諸軍每附部校以致克㨗而獲王也校者營壘之稱故謂軍之一部為一校或曰幡旗之名非也每軍一校則别為幡耳不名校也票姚校尉霍去病傳二十五去病為票姚校尉服䖍曰音飄揺師古曰票音頻妙反姚音羊召反票姚勁疾之貌也荀悦漢紀作票鷂字去病後為票騎將軍尚取票姚之字耳今讀者音飄揺則不當其義也金人去病傳票騎將軍收休屠祭天金人如淳曰祭天以金人為主也張晏曰佛徒祠金人也師古曰今之佛像是也休音許虯反屠音儲鏖兵去病𫝊票騎將軍歴五王國轉戰六日過焉支山千有餘里合短兵鏖臯蘭下應劭曰隴西白石縣塞外河名也蘇林曰匈奴中山關名也李竒曰鏖音麃津名也晉灼曰世俗謂盡死殺人為鏖糟文頴曰鏖音意曹反師古曰鏖字本從金麀聲轉寫訛耳鏖謂苦擊而多殺也臯蘭山名也言苦戰於臯蘭山下而多殺虜也晉説文音皆得之今俗猶謂打擊之甚者曰鏖麀牝鹿也音於求反部刺史百官公卿表七上監御史秦官掌監郡漢省丞相遣史分刺州不常置武帝元封五年初置部刺史掌奉詔條察州秩六百石員十三人居部九嵗舉為守相刺史以六條察事薛宣傳五十三郡守尉曹參傳九永百官表七上後漢桓帝夀元年秦一郡置守尉監三人百官表曰郡尉掌佐守典武職甲卒秩比二千石景帝二年更名郡尉曰都尉建武七年省唯邊郡往往置都尉及屬國都尉永壽元年以太山琅邪二郡寇賊不息置都尉李法胡建傳三十七黃帝李法蘇林曰獄官名也天文志左角李右角將孟康曰兵書之法也師古曰李者法官之號也總主征伐刑戮之事也故稱其書曰李法蘇説近之甲乙帳東方朔傳三十五東方朔曰陛下誠能推甲乙之帳燔之於四通之衢應劭曰帳多故甲乙第之耳孟康曰西域傳贊云興甲乙之帳絡以隋珠和璧天子襲翠被馮玉几而處其中也師古曰謂推而去之燔焚燒也綺紈敘傳七十上班伯與王許子弟為羣在於綺襦紈袴之間非其好也晉灼曰白綺之襦氷紈之袴也師古曰紈素也綺今細綾也並貴戚子弟之服彀騎馮唐傳二十李牧為將選車千三百乘彀騎萬三千匹師古曰彀張弩也滿籯韋賢傳四十三鄒魯諺曰遺子黃金滿籯不如一經如淳曰籯竹器受三四斗今陳留俗有此器蔡謨曰滿籯者言其多耳非器名也若論陳留之俗則吾陳人也不聞有此器師古曰許慎説文解字云籯笭也揚雄方言云陳楚宋魏之間謂筲為籯然則筐籠之屬是也今書本籯字或作盈又是盈滿之義蓋兩通也丞相更春乃封平當傳四十一平當為御史大夫至丞相以冬月賜爵關内侯明年春上使使者召欲封當當病篤不應召室家或謂當不可强起受侯印為子孫耶當曰起受侯印還卧而死死有餘罪今不起者所以為子孫也如淳曰漢儀注御史大夫為丞相更春乃封故先賜關内侯也李竒曰以冬月非封侯時且先賜爵關内侯也師古曰李説是也上尊酒平當傳賜當上尊酒如淳曰律稻米一斗得酒一斗為上尊稷米一斗得酒一斗為中尊粟米一斗得酒一斗為下尊師古曰稷即粟也中尊者宜為黍米不當言稷且作酒自有澆醇之異為上中下耳不必繫之米慮囚雋不疑傳四十一雋不疑為京兆尹每行縣録囚徒還其母輙問有所平反活幾何人師古曰省録之知其情狀有寃滯與不也今云慮囚本録聲之去者耳音力具反而近俗不曉其意訛其文遂為思慮之慮失其源矣行音下更反如淳曰反音幡幡奏使從輕也師古曰幾音居起反襃衣博帶雋不幾傳四十一雋不疑襃衣博帶師古曰襃大裾也言著襃大之衣廣博之帶也而説者乃以為朝服垂襃之衣非也櫑具劍雋不疑傳雋不疑冠進賢冠帶櫑具劍應劭曰櫑具木標首之劍櫑落壯大也晉灼曰古長劍首以玉作井鹿盧形上刻木作山形如蓮花初生未敷時今大劍木首其狀似此師古曰晉説是也櫑音磊摽音匹遥反具獄于定國傳四十一師古曰具獄者獄案已成其文備具也躧履雋不疑傳後漢崔駰傳四十二暴勝之躧履迎雋不疑文頴曰躧音纚師古曰履不著跟曰躧躧謂納履未正曳之而行言其遽也躧音山爾反崔駰候竇憲屣履迎門屣履謂納履曳之而行言怱遽也屣與躧同借前箸張良傳十張良曰臣請借前箸以籌之張晏曰求借所食之箸用指畫也或曰前世著明之事已籌度今時之不若也師古曰或説非也箸直庶反儋石之禄蒯通傳十五守儋石之禄者闕卿相之位應劭曰齊人名小甖為儋受一斛晉灼曰石斗石也師古曰儋音都濫反或曰儋者一人之所負擔也雋永蒯通傳十五蒯通論戰國時説士權變亦自序其説凡八十一首號曰雋永師古曰雋音字兖反雋肥肉也永長也言所論甘美而義深長也赤松子張良傳十張良曰願棄人間事欲從赤松子游耳師古曰赤松子仙人號也神農時為雨師服水玉教神農能入火不燒至昆山上常止西王母石室隨風雨上下炎帝少女追之亦得仙俱去黃石書張良傳張良嘗步遊下邳圯上有一老父衣褐至良所直墮其履圯下顧謂良曰孺子下取履良取履圮下跪進父曰孺子可教遂與期夜半往有頃父亦來出一編書曰讀是為王者師後十年興十三年見我濟北榖城山下黃石即我也其書乃太公兵法服䖍曰圯音頥楚人謂橋曰圯應劭曰汜水之上也文頴曰沂水上橋也師古曰下邳之水非汜水也又非沂水服説是矣金匱之計孝成趙皇后傳六十七下耿育上䟽愚臣既不能深援安危定金匱之計師古曰援引也金匱言長乆之法可藏於金匱石室者也援音爰五宗司馬遷傳三十遷作五宗世家師古曰景帝子凡十三人為王而母五人所生遷謂同母者為一宗故云五宗也紬書司馬遷傳遷為太史令紬史記石室金鐀之書如淳曰紬徹舊書故事而次述之師古曰此説非也紬謂綴集之音胄鐀與匱同臧獲司馬遷傳且夫臧獲婢妾猶能引決應劭曰揚雄方言云海岱之間罵奴曰臧罵婢曰獲燕之北郊民而婿婢謂之臧女而婦奴謂之獲晉灼曰臧獲敗敵所被虜獲為奴𨽻者師古曰應説是也土刑司馬遷傳堯舜飯土簋歠土刑師古曰簋所以盛飯也刑所以盛羮也土謂燒土為之即瓦器也間使張騫傳三十一天子聞張騫之言欲從蜀求大夏道廼令因蜀犍為發間使四道並出出駹出莋出徙卭出𤏡師古曰間使者求間隙而行又注蒯通傳間使謂使人伺間隙而單行徙音斯鑿空張騫傳張騫既至烏孫致賜諭㫖即分遣副使使大宛康居月氏大夏烏孫發道譯送騫與烏孫使數十人馬數十匹報謝因令窺漢知其廣大騫還拜為大行嵗餘騫卒後嵗餘其所遣副使通大夏之屬者皆頗與其人俱來於是西北國始通於漢矣然騫鑿空諸後使往者皆稱博望侯以為質於外國蘇林曰鑿開也空通也騫始開通西域道也師古曰空孔也猶言始鑿其孔穴也故此下言當空道而西域傳謂孔道也邛竹杖張騫傳張騫曰臣在大夏時見卭竹杖蜀布臣瓚曰卭山名生此竹髙節可作杖服䖍曰布細布也師古曰卭竹杖人皆識之無假多釋而蘇林乃言節間合而體離誤後學矣黃金上幣食貨志四下秦兼天下幣為二等黃金以鎰為名上幣銅錢質如周錢文曰半兩重如其文而珠玉龜貝銀錫之屬為器飾寶藏不為幣然各隨時輕重無常孟康曰二十兩為鎰師古曰改周一斤之制更以鎰為金之名數也髙祖初賜張良金百鎰此尚秦制也上幣者二等之中黃金為上而錢為下也臣瓚曰言錢之形質如周錢唯文異耳以斤名金食貨志惠帝紀漢興以為秦錢重難用更令民鑄莢錢黃金一斤師古曰復周之制更以斤名金惠帝紀晉灼曰凡言黃金真金也不言黄謂錢也食貨志黃金一斤直萬錢師古曰諸賜言黃者皆與之金不言黃者一金與萬錢也牢盆食貨志孔僅東郭咸陽言願募民自給費因官器作鬻鹽官與牢盆蘇林曰牢價直也今世人言顧手牢如淳曰牢廩食也古者名廩為牢盆鬻鹽盆也師古曰牢蘇説是也鬻古煮字宣室賈誼傳十八刑法志三文帝思賈誼徴之至入見上方受釐坐宣室蘇林曰宣室未央前正室也應劭曰釐祭餘肉也漢儀注祭天地五畤皇帝不自行祠還致福釐音禧師古曰禧福也借釐字為之耳言受神之福刑法志云宣帝時季秋後廷尉請讞時上常幸宣室齋居而決事如淳曰宣室布政教之室也重用刑故齋戒以決事晉灼曰未央宫中有宣室殿師古曰蓋其殿在前殿之側也齋則居之大鈞賈誼傳大鈞播物坱圠無垠如淳曰陶者作器於鈞上此以造化為大鈞也應劭曰其氣坱圠非有限齊也師古曰今造瓦者謂所轉為鈞言造化為人亦猶陶之造瓦爾坱音烏朗反圠音於黠反泉布食貨志四下貨寶於金利於刀流於泉布於布束於帛如淳曰名錢為刀者以其利於民也流行如泉也布者布於民間李竒曰東聚也泰半之賦食貨志四上秦始皇内興功作外攘夷狄收泰半之賦師古曰泰半三分取其二閭左食貨志發閭左之戍應劭曰秦時以謫發之名謫戍先發吏有過及贅壻賈人後以常有市籍者發又後以大父母父母嘗有市籍者戍者曹輩盡復入閭取其左發之未及取右而秦亡師古曰閭里門也言居在里門之左者一切發之此閭左之釋應最得之諸家之義煩穢舛錯故無所取也孟康曰秦時復除者居閭之左後發役不供復役之也或云直先發取其左也九府圜法食貨志四下太公為周立九府圜法李竒曰圜即錢也圜一寸而重九兩師古曰此説非也周官太府玉府内府外府泉府天府職内職金職幣皆掌財幣之官故云九府圜謂均而通也黃頭郎鄧通傳六十三鄧通以濯船為黃頭郎師古曰濯船能持櫂行船也土勝水其色黃故刺船之郎皆著黃帽因號曰黃頭郎也濯讀曰櫂音直孝反破觚為圜酷吏傳序六十漢興破觚而為圜斵琱而為樸孟康曰觚方也師古曰去嚴刑而從簡易抑巧偽而務敦厚也琱與彫同椎埋王温舒傳六十王温舒少時推埋為姦師古曰椎殺人而埋之椎直追反喉咽嚴延年傳六十延年曰河南天下喉咽師古曰喉咽言其所在襟要如人體之有喉咽符節臺延年傳左馮翊缺上欲徴嚴延年符已發為其名酷復止應劭曰符竹使符也藏在符節臺欲有所拜召治書御史符節令發符下太尉也結髪施讎傳五十八梁丘賀薦施讎結髪事師數十年師古曰言從結髪為童丱即從師學也戈船武帝紀元鼎五年歸義越侯嚴為戈船將軍張晏曰嚴故越人降為歸義侯越人於水中負人船又有蛟龍之害故置戈於船下因以為名臣瓚曰伍子胥書有戈船以載干戈因謂之戈船也旁午霍光傳三十八昌邑王受璽已來二十七日使者旁午持節詔諸官署徴發凡一千一百二十七事如淳曰旁午分布也師古曰一從一横為旁午猶交橫也梓宫霍光傳後漢顯宗紀二服䖍曰棺也師古曰以梓木為之親身之棺也葬霍光為天子制故亦稱梓宫後漢書注云梓宫以梓木為棺風俗通曰宫者存時所居縁生事死因以為名輼輬車霍光傳載霍光尸柩以輼輬車文頴曰輼輬車如今䘮轜車也孟康曰如衣車有牕牖閉之則温開之則涼故名之輼輬車也臣瓚曰秦始皇道崩秘其事載以輼輬車百官奏事如故此不得是轜車𩔖也師古曰輼輬本安車也可以卧息後因載䘮飾以栁翣故遂為䘮車耳輼者密閉輬者旁開牕牖各别一乘後人既專以載䘮又去其一而總為藩飾合二名呼之廟勝趙充國傳三十九誠非素定廟勝之䇿師古曰廟勝謂謀於廟堂而勝敵也皸瘃趙充國𫝊軍士寒手足皸瘃文頴曰皸拆裂也瘃寒創也師古曰皸音軍瘃音竹足反蒲輪申公傳五十八王臧趙綰請立明堂以朝諸侯不能就其事乃言師申公於是上使使束帛加璧安車以蒲裹輪駕駟迎申公申公年八十餘絫息孝成班偼伃𫝊六十七下班偼伃賦云每寤寐而絫息兮師古曰絫息言懼而喘息也絫古累字左遷周昌傳十二髙祖召御史大夫周昌曰吾欲煩公公彊為我相趙吾極知其左遷師古曰是時尊右而卑左故謂貶秩位為左遷木强周昌傳贊曰周昌木强人也師古曰言其强質如木石强音其兩反掖門成帝紀建始三年服䖍曰掖門者正門之旁小門也師古曰掖門在兩旁言如人臂掖也瓦合之卒酈食其傳十三酈食其謂髙祖曰足下起瓦合之卒師古曰謂如破瓦之相合雖曰聚合而不齊同醖藉薛廣徳傳四十一後漢第五倫傳十一薛廣徳為人温雅有醖藉師古曰醖言如醖釀也藉有所薦藉也第五倫少醖藉不修威儀注云藴藉猶寛博也推轂田蚡傳二十三竇嬰田蚡俱好儒術推轂趙綰為御史大夫王臧為郎中令師古曰推轂謂升薦之若轉車轂之為也肺附田蚡傳劉向傳六蚡以肺附為相師古曰舊解云肺附如肺肝之相附著也一説肺斫木札也喻其輕薄附著大材也又劉向傳臣幸得託肺附注云肝肺相附著猶言心膂也一説自言於帝室猶肺札附於大材木也除吏田蚡傳田蚡為丞相入奏事語移日所言皆聽薦人或起家至二千石權移主上上乃曰君除吏盡未吾亦欲除吏師古曰凡言除者除去故官就新官關説佞幸傳六十三公卿皆因關説師古曰關説者言由之而納説亦如行者之有關津也揚㩁叙傳七十下叙傳曰揚㩁古今師古曰揚舉也㩁引也揚㩁者舉而引之陳其趣也武庫兵毋將隆傳四十七古者諸侯方伯得顓征伐廼賜斧鉞漢家邊吏職在距寇亦賜武庫兵皆任其事然後䝉之春秋之誼家不藏甲所以抑臣威損私力也建鼓寺何並傳四十七後漢和帝紀永元六年何並為長陵令道不拾遺初卭成太后外家王氏貴而侍中王林卿通輕俠傾京師後坐法免賓客愈盛歸長陵上冢因留飲連日並遣之林卿素驕慙於賓客既去令騎奴還至寺門拔刀剥其建鼓師古曰諸官曹之所通呼為寺建鼓一名植鼓建立也謂植木而旁懸鼓焉縣有此鼓者所以召集號令為開閉之時注云風俗通曰寺嗣也理事之吏嗣續于其中不訾之軀盖寛饒傳四十七用不訾之軀臨不測之險師古曰訾與貲同不訾者言無貲量可以比之貴重之極也别注云訾量也次骨杜周傳三十杜周少言重遲而内深次骨李竒曰其用法深刻至骨睚眦杜欽傳三十報睚眦怨師古曰睚音厓舉眼也眦即眥字謂目匡也言舉目相忤者即報之也一説睚音五懈反眦音仕懈反睚眦瞋目貎也兩義並通柄臣朱雲傳三十七師古曰柄臣執權之臣也堂皇胡建傳三十七師古曰室無四壁曰皇伏質王訢傳三十六王訢為被陽令繡衣御史暴勝之使持斧逐捕盗賊以軍興從事誅二千石以下勝之過被陽欲斬訢訢已解衣伏質師古曰質鍖也欲斬人皆伏於鍖上尚方斬馬劍朱雲傳師古曰尚方少府之屬官也作供御器物故有斬馬劍劍利可斬馬也軺傳條對梅福傳三十七黄霸傳五十九梅福求假軺傳詣行在所條對急故師古曰軺傳小車之傳也傳音張戀反條對一一條録而對之又注黃霸傳曰凡言條者一一而䟽舉之若木條然也九九梅福傳王裒傳三十四梅福書曰齊桓之時有以九九見者桓公不逆欲以致大也師古曰九九計數之書若今算經九章五曹之輩又應劭注王裒傳曰桓公不納其人曰九九小術而君不納之况大於九九者乎於是桓公設庭燎之禮而見之居無幾隰朋自逺而至桓公遂以霸魁柄梅福傳梅福書云漢興以來社稷三危吕霍上官皆母后之家也親親之道全之為右當與之賢師良傅教以忠孝之道今廼尊寵其位授以魁柄師古曰務全安之以為上魁柄以斗為喻也斗身為魁文石陛赤墀梅福傳梅福曰願一登文石之陛涉赤墀之塗應劭曰以丹淹泥塗殿上法坐梅福傳户牖之法坐師古曰户牖之間謂之扆言負扆也法坐正坐也猶言法宫法駕也坐音才卧反珠璣東方朔傳三十五東方朔云宫人垂珠璣師古曰璣珠之不圓者印章數五武帝紀太初元年色上黃數用五張晏曰漢據土徳土數五故用五謂印文也若丞相曰丞相之印章諸卿及守相印文不足五字者以之足之篇武帝紀元光元年詔賢良咸以書對著之于篇師古曰篇謂竹簡也殿霍光傳三十八鴞數鳴殿前樹上師古曰鴞惡聲之鳥也古者宫室髙大則通呼為殿非止天子宫中卧廬金日磾傳三十八金日磾小疾卧廬師古曰殿中所止曰廬奏厠日磾傳日磾奏厠心動師古曰奏向也日磾方向厠而心動三璽霍光傳霍光傳昌邑王受皇帝信璽行璽大行前孟康曰漢初有三璽天子之璽自佩行璽信璽在符節臺大行前昭帝柩前也韋昭曰大行不反之辭也行内孔光傳五十一王莽白太后帝幼少宜置師傅徙孔光為帝太傅位四輔給事中領宿衛供養行内師古曰行内行在所之内中猶言禁中也靈壽杖孔光傳賜太師孔光靈壽杖孟康曰扶老杖也服䖍曰靈壽木名師古曰木似竹有枝節長不過八九尺圍三四寸自然有合杖制不須削治也青蒲史丹傳五十二史丹以親密臣得侍視疾候上間獨寢時丹直入卧内頓首伏青蒲上諫欲廢太子事服䖍曰青縁蒲席也應劭曰以青規地曰青蒲自非皇后不得至此孟康曰以蒲青為席用蔽地也師古曰應説是也移病朱博傳五十三朱博遷琅邪太守齊部舒緩養名博新視事右曹掾史皆移病卧師古曰言齊人之俗其性遲緩多自髙大以養名聲右曹上曹也移病謂移書言病也熒惑淮南厲王傳十四淮南王廢法度行邪辟有詐偽心以亂天下熒惑百姓背叛宗廟師古曰熒謂囘繞也印韍陳遵傳六十二羞汙印韍師古曰此韍謂印之組也重足一迹石顯傳六十三公卿以下畏石顯重足一迹師古曰言不敢自寛縱擊劍司馬相如傳二十七上師古曰相如學擊劍擊劍者以劍遥擊而中之非斬刺也筆札司馬相如傳相如請為天子逰獵之賦上令尚書給筆札師古曰札木簡之薄小者也校獵司馬相如傳又注成帝紀元延二年從胡客大校獵相如傳云冬天子校獵李竒曰以五校兵出獵也師古曰李説非也校獵者以木相貫穿總為闌校遮止禽獸而獵取之説者或以為周官校人掌田獵之馬因云校獵亦失其義養馬稱校人者謂以為闌校以養馬耳故呼為閑也事具周禮非以獵馬故稱校人六玉虯司馬相如傳相如賦曰乘鏤象六玉虯張揖曰鏤象象路也以象牙䟽鏤其車輅六玉虯謂駕六馬以玉飾其鑣勒有似玉虯龍子有角曰虯扈從四校司馬相如傳相如傳扈從横行出乎四校之中文頴曰凡五校今言四者一校中隨天子乘輿也師古曰此説又非也四校者䦨校之四面也言其跋扈從恣而行出於校之四外也垂堂司馬相如傳鄙諺曰家絫千金坐不垂堂張揖曰畏櫩瓦墮中人也師古曰垂堂者近堂邊外自恐墜墮耳非畏櫩瓦也言富人之子則自愛深也行祖臨江王榮傳二十三榮行祖於江陵北門師古曰祖者送行之祭因饗飲也黃帝之子纍祖好逺逰而死于道故後人以為行神也白屋吾丘壽王傳三十四三公有司或由窮巷起白屋裂地而封師古曰白屋以白茅覆屋也羽林孤兒宣帝紀神爵元年應劭曰天有羽林大將軍之星林喻若林木之盛羽羽翼鷙擊之意故以名武官如淳曰百官表取從軍死事者之子養羽林官教以五兵號曰羽林孤兒少壯令從軍猶豫髙后紀八年師古曰猶獸名也爾雅曰猶如􅕱善登木此獸性多疑慮常居山中忽聞有聲即恐有人且來害之每豫上樹乆之無人然後敢下須臾又上如此非一故不決者稱猶豫焉一曰隴西俗謂犬子為猶犬隨人行每豫在前待人不得又來迎候故云猶豫􅕱音几予寧三年哀帝紀詔博士弟子父母死予寧三年師古曰寧謂處家持䘮服除任子令哀帝紀應劭曰任子令者漢儀注吏二千石以上視事滿三年得任同産若子一人為郎不以徳選故除之師古曰任者保也名田哀帝紀詔曰諸侯王列侯公主吏二千石及豪富民多畜奴婢田宅亡限與民爭利其議限列有司條奏王列侯得名田國中列侯在長安及公主名田縣道關内侯吏民名田皆無得過三十頃如淳曰名田國中者自其所食國中也既收其租税又自得有私田三十頃名田縣道者令甲諸侯在國名田他縣罰金二兩今列侯有不之國者雖遥食其國租税復自得田於他縣道公主亦如之不得過三十頃琁題揚雄傳五十七上甘泉賦云珍臺閒館琁題玉英應劭曰題頭也榱椽之頭皆以玉飾并閭平慮揚雄傳甘泉賦云攢并閭與苃䒷兮如淳曰并閭其葉隨時改政平則平政不平則傾也師古曰如氏所説自是平慮耳此并閭謂㯶樹也苃䒷草名也苃步末反䒷音栝駊騀揚雄傳甘泉賦云崇丘陵之駊騀兮蘇林曰駊騀音叵我師古曰駊騀髙大狀也明堂平帝紀元始四年安漢公奏立明堂辟廱應劭曰明堂所以正四時出教化明堂上圜下方八牕四達布政之宫在國之陽上八牕法八風四達法四時九室法九州十二重法十二月三十六户法三十六旬七十二牖法七十二候孝經曰宗祀文王于明堂以配上帝上帝謂五時帝太昊之屬黃帝曰合宫有虞曰總章殷曰陽館周曰明堂辟廱者象璧圜雍之以水象教化流行卞射武戲哀帝紀贊哀帝雅性不好聲色時覽卞射武戲蘇林曰手搏為卞角力為武戲也晉灼曰甘延壽試卞為期門待詔漏刻哀帝紀李尋傳天文志又注哀帝時待詔夏賀良等建言改元易號増益漏刻以百二十為度應劭曰謂以材技徴召未有正官故曰待詔師古曰舊漏晝夜共百刻今増其二十此本齊人甘忠可所造今賀良等重言遂施行之後良等終以此伏誅兩漢博聞卷一
