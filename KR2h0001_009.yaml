body:
  text: 兩漢博聞卷九宋楊侃輯六璽紫泥光武紀建武三年赤眉君臣面縛奉光武以髙帝璽綬注云蔡邕獨斷曰皇帝六璽皆玉螭虎紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽皆以武都紫泥封之玉璽譜曰𫝊國璽是秦始皇初定天下所刻通中枕鍾離意傳三十一注云蔡質漢官儀曰尚書郎直入臺中官供新青縑白綾被晝夜更宿帷帳畫通中枕卧旃蓐冬夏隨時改易大官供食五日一美食下天子一等方領馬援傳十四注云前書音義曰頸下施衿領正方學者之服也鹿車趙憙傳十六趙憙避赤眉兵以泥塗友人韓仲伯婦面載以鹿車注云風俗通曰鹿車窄小載容一鹿文降皇甫規傳五十五中外共誣皇甫規貨賂羣羌令其文降注云以文簿虚降非真心也重問王龔傳四十六舊典大臣不有大罪不至重問注云大臣獄重故曰重問成帝時丞相薛宣御史大夫翟方進有罪上使五二千石雜問音義曰大獄重故以秩二千石五人同問之棨信竇武傳五十九取棨信閉諸禁門注云棨有衣㦸也漢官儀曰凡居宫中皆施籍於掖門案姓名當入者本官為封棨𫝊審印信然後受之回冗盧植傳五十四植上書曰今之禮記特多回冗注云回冗紆曲也投間延篤傳五十四延篤書曰百家衆氏投間而作注云言誦經典之餘投射間隙而翫百氏也粃謬盧植傳植書云周禮諸經發起粃謬注云粃粟不成喻義之乖僻也閥閲章帝紀建初元年詔曰每尋前世舉人貢士或起畎畝不繫閥閲注云明其等曰閥積其功曰閲言務取賢才不拘門地嬰城卓茂傳十五嬰城者相望注云言以城自嬰繞油㦸杜詩傳二十一杜詩嵗中三遷為侍御史世祖召見賜以棨㦸注云漢雜事曰漢制假棨㦸以代斧鉞崔豹古今注曰棨㦸前驅之器也以木為之後代以赤油韜之亦謂之油㦸王公以下通用之紫艾綬馮魴傳二十三獲嘉侯馮石安帝寵之賜紫艾綬注云艾即盭緑色也其色似艾兼兩吳祐傳五十四吳祐諫其父欲殺青簡以寫經書曰此書若成則載之兼兩注云車有兩輪故稱兩也骨鯁來歙傳五注云骨鯁喻正直也說文曰鯁魚骨也食骨留咽中爲鯁奕世楊秉傳四十四楊秉疏曰臣奕世受恩注云奕猶重也龜鼎宦者傳六十八宦者論云魏武因之遂遷龜鼎注云龜鼎國之守器以喻帝位也竹帛和熹鄧皇后傳十注云竹謂簡册帛謂縑素鍛鍊韋彪傳十六鍛鍊之吏持心近薄注云鍛椎也鍛鍊成熟也言深文之吏入人之罪猶工冶陶鑄鍛鍊使之成熟也時髦順帝紀贊注云髦俊也郭璞云士中之俊猶毛中之髦保阿傅土順帝紀贊注云保安也阿倚也言可依倚以取安傅姆之𩔖也𫝊土謂阿母山陽君宋娥更相貨賂求増邑土也五營順帝紀永建元年注云五營五校也謂長水步兵射聲胡騎車騎等五校尉仙人山圖西南夷傳七十六莋都夷者武帝所開土出長年神藥仙人山圖所居焉注云劉向列仙傳曰山圖隴西人好乗馬馬蹋折脚山中道士教服地黄當歸羌活𤣥參服一年不嗜食病愈身輕道士自云五嶽使人之名山採藥能隨吾汝便不死山圖隨之莫知所終晨門王龔傳論四十六晨門有抱關之夫注云晨主守門晨夜開閉也史記侯嬴夷門抱關者守門必抱關故兼言之環玦袁譚傳六十四下審配上書袁譚願將軍熟詳吉凶以賜環玦注云絶人以玦反人以環峭覈第五倫傳論三十一第五倫峭覈為方注云峭覈謂其性峻急好窮覈事情露布李雲傳四十七李雲素剛憂國將危乃露布上書移副三府注云露布謂不封之也并以副本上三公府也白越明徳馬皇后傳十馬太后賜諸貴人白越三千端注云白越越布也跋扈朱浮傳二十三注云跋扈猶暴横也又梁冀𫝊注跋扈猶强梁也東園梓器匽皇后傳十下匽皇后崩斂以東園畫梓夀器注云東園署名屬少府掌為棺器梓木為棺以漆畫之稱夀器者欲其乆長也猶如夀宫夀陵之𩔖也大臣薨亦多賜東園秘器采女鄧皇后傳鄧皇后少入掖庭為采女絶幸注云采擇也因采擇而立名富於春秋樂恢傳三十三注云春秋謂年也言年少春秋尚多故稱富姑息朱穆傳三十三注云姑且也息安也小人之道苟且取安也梗槩杜篤傳七十杜篤曰臣所欲言陛下已知故畧其梗槩不敢具陳注云梗槩猶粗略也髫齓邊讓傳七十下注云髫剪髪為鬌也齓毁齒也大戴禮曰男八嵗而髫女七嵗而齓巨萬鄧皇后傳十下賞賜巨萬計注云巨大也大萬謂萬萬也輈張董皇后傳十下汝今輈張怙汝兄邪注云輈張猶彊梁也府帑鄧訓傳六注云帑金帛所藏之府稽故鄧訓傳擁衛稽故令不得戰注云稽故謂稽留事故也詿誤光武紀建武六年注云詿亦誤也音挂浮屠楚王英傳三十二注云袁宏漢記浮屠佛也西域天竺國有佛道焉佛者漢言覺也將以覺悟羣生也初明帝夢見金人長大頂有日月光以問羣臣或曰西方有神其名曰佛陛下所夢得無是乎於是遣使天竺問其道術而圖其形像焉伊蒲塞桑門仁祠楚王英傳三十二顯宗詔天下死罪皆入縑贖楚王英奉黄縑白紈三十匹贖罪下詔曰楚王誦黄老之㣲言尚浮屠之仁祠何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌注云伊蒲塞即優婆塞也中華翻為近住言受戒行堪近僧住也桑門即沙門也神道中山簡王傳三十二中山簡王薨詔大為修冢塋開神道注云墓前開道建石柱以為標謂之神道刀筆劉盆子傳一注云古者記事於簡冊謬誤者以刀削而除之故曰刀筆輕車楊賜傳四十四注云續漢書輕車古之戰車也雕朱輪輿不巾不蓋菑矛㦸幢麾菑側事反謂揷也伍伯曹節傳六十八騎營五百注云韋昭辯釋名曰五百字本為伍伯伍當也伯道也使之導引當道陌中以驅除也案今俗呼行杖人為五伯也充庭車安帝紀永初四年正月元日㑹徹樂不陳充庭車注云每大朝㑹必陳乗輿法物車輦於庭故曰充庭車也以年饑故不陳口賦光武紀建武二十二年注云漢儀注曰人年十五至五十六出賦錢人百二十為一算又七嵗至十四出口錢人二十以供天子至武帝時又口加三錢以補車騎馬旄頭騎光武紀建武二十八年注云漢官儀曰舊選羽林為旄頭被髪先驅魏文帝列異𫝊曰秦文公時梓樹化為牛以騎擊之騎不勝或墮地髻解被髪牛畏之入水故秦因是置旄頭騎使先驅長檄安帝紀永初元年民訛言相驚窮困道路若欲歸本郡在所為封長檄注云印封之也長檄猶今長牒欲歸者皆給以長牒為驗葆車光武紀建武十三年注云葆車謂上建羽葆也合聚五采羽名為葆烽燧光武紀建武十二年注云邊方備警急作髙土臺臺上作桔臯桔臯頭有兜零以薪草置其中有寇即燃火相告曰烽又多積薪寇至即燔之望其煙曰燧晝則燔燧夜乃舉烽兜零籠也同門學張酺傳三十五注云張酺從祖父充與光武同門學光武即位求問充充已死又前漢孟喜傳注云同門同師學者也甄表門閭安帝紀元初六年甄表門閭旌顯厥行注云甄明也旌章也里門謂之閭旌表者若今樹闕而顯之苛政光武紀更始元年注云説文曰苛小草也言政令繁細羽檄光武紀更始二年注云魏武奏事云若有急即揷以雞羽謂之羽檄三河光武贊注云河南河北河東也殿最光武紀建武十六年注云殿後也謂課居後也最凡要之首言課居先也鉗􅎂光武紀建武二十二年詔赦徒皆㢮解鉗衣絲絮注云㢮解脱也鉗􅎂也前書音義曰􅎂足鉗也徒計反又太蓋反在徒役者不得衣絲絮今赦許之輿地圖光武紀建武十五年注云廣雅曰輿載也言載在地者皆圖畫之制詔光武紀建武元年注云漢制度曰帝之下書有四一曰策書二曰制書三曰詔書四曰誡敕赤草光武紀中元元年赤草生於水崖注云赤草朱草也大戴禮曰朱草日生一葉至十五日已後日落一葉周而復始幕南光武紀建武二十二年匈奴北徙幕南地空注曰前書音義曰沙土曰幕即今磧也野穀旅生光武紀建武三年注云旅寄也不因播種而生故曰旅亭候光武紀建武十二年注云亭候伺候望敵之所前書曰秦法十里一亭亭有長漢因之不改牙門袁紹傳六十四上麴義乗勝到公孫瓚營㧞其牙門注云真人水鏡經曰凡軍始出立牙竿必令完堅若有折將軍不利牙門旗竿軍之精也即周禮軍旅㑹同置旌門是也衿帶杜篤傳七十關梁之險多所衿帶注云衿帶衣服之要故以喻之間關荀彧傳論六十荀君乃越河冀間關以從曹氏注云間關猶展轉也又前書王邑戰敗馳入宫間關至漸臺注云間關猶言﨑嶇展轉也投繯吳祐傳五十四投繯而死注云謂以繩爲繯投之而縊也繯胡犬反庶孽杜喬傳五十三注云孽賤也猶樹之有孽生也大較延篤傳五十四注云較猶略也輜重光武紀更始元年注云釋名曰輜厠也謂軍糧什物雜厠載之以其累重故稱輜重重直用反屠唐鄉光武紀髙帝紀注附光武進屠唐子鄉注云多所誅殺曰屠唐子鄉地名師古曰屠謂破取城邑誅其人如屠六畜然中堅光武紀更始元年衝其中堅注云凡軍事中軍將最尊居中以堅鋭自輔故曰中堅雲車光武紀注云雲車即樓車稱雲言其髙也升之以望敵猶公輸般為雲梯之械武關山為地門劉盆子傳一注云武關在今商州上洛縣東河圖括地象曰武關山為地門上為天齊星下為文宿辰樓車光武紀或為地道衝輣撞城注云衝撞車也輣樓車也面縛光武紀建武二年注云面偝也謂反偝而縛之占書袁敞傳三十五張俊自獄中占獄吏上書自訟注云占謂口授也前書陳遵憑几口占書吏是也盤盂銘朱穆傳三十三古之明君必有輔徳之臣規諫之官下至器物銘書成敗以防遺失注云黄帝作巾机之法孔甲有盤盂之誡太公隂謀曰武王衣之銘曰桑𧖟苦女工難得新捐故後必寒鏡銘曰以鏡自照者見形容以人自照者見吉凶觴銘曰樂極則悲沉湎致非社稷為危也章奏胡廣傳三十四注云周成雜字曰牋表也漢雜事曰凡羣臣之書通於天子者四品一曰章二曰奏三曰表四曰駮議章者需頭稱稽首上以聞謝恩陳事詣闕通者也奏者亦需頭其京師官但言稽首言下稽首以聞其中有所請若罪法劾案公府送御史臺卿校送謁者臺也表者不需頭上言臣某言下言誠惶誠恐頓首頓首死罪死罪左方下附曰某官臣甲乙上嚴棘寇榮傳六尚書背繩墨案空劾不復質确其過寘於嚴棘之下注云質正也确實也若角反嚴棘謂獄也易曰繫用徽墨寘于叢棘珠畫祕器袁安傳三十五袁逢卒賜以珠畫特詔祕器注云前書董賢死以沙畫棺音義云以朱沙畫之也珠與朱同祕器棺也董賢𫝊沙畫棺以朱砂塗之而又雕畫也賜胙鄧彪傳三十四注云胙祭廟肉也禮凡預祭異姓則歸之胙同姓則留之宴不預祭而賜胙重之也江沔荀彧傳六十注云沔即漢水也孔安國曰漢上為沔酒罏孔融傳六十注云罏累土為之以居酒瓮如鍛鑪故名罏字或作壚縣廷郭太傳五十八郭太早孤母欲使給事縣廷注云蒼頡篇曰廷直也説文廷朝中也風俗通云廷正也言縣廷郡廷朝廷皆取平均正直也梁益獻帝紀建安十八年復禹貢九州注云兖豫青徐荆揚冀益雍也九數雖同而禹貢無益州有梁州然梁益亦一地也前漢武帝置十三郡刺史改雍曰梁改梁曰益喉舌之官李固傳五十三李固曰陛下之有尚書猶天之有北斗也斗為天喉舌尚書亦為陛下喉舌斗斟酌元氣運平四時尚書出納王命賦政四海賦布也注云春秋合誠圖曰天理在斗中司三公如人喉在咽以理舌語宋均曰斗為天之舌口主出政教三公主導宣君命兩漢博聞卷九
