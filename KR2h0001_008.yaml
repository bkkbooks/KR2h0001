body:
  text: 兩漢博聞卷八宋楊侃輯大駕法駕小駕輿服志二十九胡廣漢制度曰天子出有大駕法駕小駕大駕則公卿奉引大將軍參乗太僕御屬車八十一乗備千乗萬騎法駕八卿不在鹵簿唯河南尹執金吾洛陽令奉引侍中驂乗奉車郎御屬車四十六乗小駕太僕奉駕侍御史整車騎也文始五行武徳之舞顯宗紀永平三年烝祭光武廟初奏文始五行武徳之舞注云禮記曰冬祭曰烝烝衆也冬物畢成可祭者衆前書曰文始舞者本舜韶舞也髙祖六年更名文始其舞人執羽籥五行者本周舞也秦始皇二十六年更名五行其舞人冠冕衣服法五行色武徳者髙祖四年作言行武以除亂也其舞人執干戚光武草創禮樂未備今始奏之三老五更顯宗紀永平二年詔曰光武皇帝建三朝之禮而未及臨饗𦕈𦕈小子初行大射復踐辟雍尊事三老兄事五更三老李躬年耆學明五更桓榮授朕尚書其賜榮爵關内侯三老五更皆以二千石禄養終厥身注云三朝之禮謂明堂辟雍靈臺也漢官儀曰三老五更皆取有首妻男女全具用其徳行年耆髙者三公一人為三老次卿一人為五更皆冠進賢三老扶玊杖五更不杖其日乗輿先到辟雍遣使者安車迎三老五更天子迎于門屏交拜三老東面三公設几杖九卿正履天子親袒割俎執醬而饋執爵而酳五更南面三公進供禮亦如之醬醢也横吹班超傳三十七拜班超為將兵長史假鼓吹幢麾注云古今樂録曰横吹胡樂也張騫入西域傳其法於長安唯得摩訶兜勒一曲李延年因之更造新聲二十八解乗輿以為武樂後漢以給邊將萬人將軍得之在俗用者有黄鵠隴頭出關入關出塞入塞折楊柳黄覃子赤之楊望行人十曲横吹麾幢皆大將軍所有超非大將故言假小侯學顯宗紀永平九年為四姓小侯開立學校置五經師注云袁宏漢紀曰為外戚樊氏郭氏隂氏馬氏諸子弟立學號四姓小侯以非列侯故曰小侯清宫楊秉傳四十四前漢文帝紀附王者至尊警蹕而行靜室而止注云蹕止行人也靜室謂先使清宫也文帝即位使太僕嬰東牟侯興居先清宫應劭曰舊典天子行幸所至必遣靜室今先案行清淨殿中以虞非常三鱣楊震傳四十四有冠雀銜三鱣魚飛集楊震講堂前都講取魚進曰蛇鱣者卿大夫服之象也數三者法三台也先生自此升矣注云冠音貫即鸛雀也鱣音善鱣似蛇臣賢案續漢及謝承書鱣字皆作鱓然則鱣鱓古字通也黄地黑文故云卿大夫服象也三互蔡邕傳五十下初朝議以州郡相黨人情比周乃制婚姻之家及兩州人士不得對相監臨至是復有三互法注云三互謂婚姻之家兩州人不得交互為官也鯨魚杵蒲牢班固傳三十下前漢揚雄傳附班固東都賦云發鯨魚鏗華鍾登玉輅乗時龍注云鯨魚杵謂刻杵作鯨魚形也鏗謂擊之也薛綜注西京賦云海中有大魚名鯨又有獸名蒲牢素畏鯨魚鯨魚擊蒲牢蒲牢輒大鳴呼凡鍾欲令其聲大者故作蒲牢於其上撞鐘者名為鯨魚鐘有篆刻之文故曰華揚雄河東賦鳴洪鐘師古曰天子將出則撞黄鍾之鐘左五鐘皆應入則撞㽔賔之鐘右五鐘皆應周廬千列班固傳三十上注云宿衛之廬周於宮也千列言多也鈎陳班固傳周以鈎陳之位衛以嚴更之署注云周環也鈎陳紫宫外星也宫衛之位亦象之嚴更之署行夜之司也尺一詔李雲傳四十七陳蕃傳五十六李雲書曰尺一拜用不經御省注云尺一之版謂詔策也陳蕃䟽曰尺一選舉委尚書三公注云尺一謂板長尺一以寫詔書也肉刑郎顗傳二十下注云漢法肉刑三謂黥也劓也左右趾也文帝除之當黥者髠鉗城旦舂當劓者笞三百當左右趾者笞五百輦車驪駕寇恂傳十六光武北征軍食急乏寇恂守河内以輦車驪駕轉輸前後不絶注云驪駕併駕也輦車人挽行也風角郎顗傳郎顗學京氏易善風角星筭注云京氏京房也作易𫝊風角謂候四方四隅之風以占吉凶也星筭謂天文筭數也道家蓬萊山竇章傳十三學者稱東觀為老氏藏室道家蓬萊山注云老子為守藏史復為柱下史四方所記文書皆歸柱下言東觀經籍多也蓬萊海中神山為仙府幽經秘録皆在焉中書伏湛傳十六永和元年詔伏無忌與議郎黄景校定中書五經諸子百家藝術注云中書内中之書也名馬式馬援傳十四馬援善别名馬於交趾得駱越銅鼔乃鑄為式還上之因表曰臣援常師事楊子阿受相馬骨法今欲形之於生馬則骨法難備具孝武時善相馬者東門京東門姓也京名也鑄作銅馬法獻之有詔立馬於魯班門外則更名魯班門為金馬門臣謹依儀氏等數家骨相以為法有詔置於宣徳殿下以為名馬式馬服君馬援傳馬援其先趙奢為趙將號曰馬服君子孫因為氏注云馬服者言能服馭馬也史記曰趙恵文王以奢有功賜爵號馬服君汗簡吳祐傳五十四吳祐父恢為南海太守祐隨到官恢欲殺青簡以寫經書諫止之注云殺青者以火炙簡令汗取其青易書復不蠧謂之殺青亦謂汗簡帝者諦也李雲傳四十七孔子曰帝者諦也注云審諦於物也治所前漢朱博傳五十三師古曰刺史所止理事處黄綬朱博傳師古曰縣丞尉職卑皆黄綬間歩朱博傳朱博去吏間步至廷尉下雪陳咸事師古曰去吏自解職也間步謂步行而伺間隙以去束脩之饋第五倫傳三十一大夫無境外之交束脩之饋注云束脩束帛也脩脯也饋遺也司馬法孔融傳六十注云齊威王使大夫追論古者司馬法其法論田及兵之法也三閭孔融傳注云即屈原也掌王族三姓曰昭屈景故曰三閭鼓行荀彧傳六十鼔行而前注云謂鳴鼓而行言無所畏也人品郭泰傳五十八郭泰奬㧞士人皆如所鑒注云謝承書云泰之所名人品乃定先言後驗衆皆服之角立傑出徐穉傳四十三桓帝徴徐穉姜肱等並不至帝問陳蕃曰徐穉等孰為先後蕃曰穉爰自江南卑薄之域角立傑出宜當為先注云如角之特立也國憂奔國憂又曰來弔大憂禁民二業劉般傳二十九劉般上言曰郡國以官禁二業至有田者不得漁捕注云二業謂農者不得商賈也琴増二絃仲長統傳三十九注云三禮圖曰琴本五絃曰宫商角徴羽文王琴增曰少宫少商弦最清也去符傳竇固傳十三竇固出玉門擊西域詔耿秉及騎都尉劉張皆去符傳以屬固注云専將兵者並有符傳擬合之取信今去符傳皆受固之節度清詔第五倫傳三十一第五種案原本作倫今考此語雖出第五倫傳然清詔使乃倫曽孫種也永夀中以司徒掾清詔使兾州㢘察災害舉奏刺史二千石以下注云風俗通曰汝南周勃辟太尉清詔使荆州又此言以司徒清詔使兾州蓋三公府有清詔貟以承詔使也去就之槩周燮傳序四十三識去就之槩注云槩節也候時而處不失去就也前星廣陵思王傳三十二注云天官書曰心前星太子之位也征營鍾離意傳三十一鍾離意上䟽曰不勝愚戇征營罪當萬死注云征營不自安也當陽侯清河孝王傳四十五注云當陽今荆州也北寺獄千乗貞王傳四十五北寺獄名屬黄門署前書音義曰即若盧獄也通儒俗儒儒林傳十七注云風俗通曰儒者區也言其區别古今居稽先王之制立當時之事此通儒也若能言而不能行講誦而已無能往來此俗儒也伎數桓譚傳十八小才伎數之人注云伎方伎醫方之家也數謂數術史卜之官也奏記班固傳三十上班固奏記於東平王蒼注云奏進也記書也前書待詔鄭朋奏記於蕭望之奏記自朋始也搜牢董卓傳六十二董卓既行廢立之事是時洛中金帛家家殷積卓縱放兵士剽虜資物謂之搜牢注云言牢固者皆搜索取之也叟兵董卓傳吕布軍有叟兵内反引李傕入城注云叟兵則蜀兵也漢代謂蜀為叟百六有㑹董卓傳贊百六有㑹過剥成災注云前書音義曰四千五百嵗為一元一元之中有九厄陽厄五陰厄四陽為旱隂為水初入元百六嵗有陽厄故曰百六之㑹郿塢南北塢董卓傳獻帝紀皇甫規傳五十五董卓築塢於郿髙厚七丈號曰萬嵗鄔積穀為三十年儲自云事成雄據天下不成守此足以畢老既敗塢中珍藏有金二三萬斤銀八九萬斤錦綺紈素竒玩積如丘山李傕移獻帝幸北鄔注云營居曰塢一曰庳城時帝在南塢傕迎帝幸北塢字林曰塢小障也一曰小城字或作隖皇甫規傳覆没營塢塢音烏古反鮮車怒馬第五倫傳三十一第五倫為蜀郡太守蜀地肥饒掾史家貲多至千萬皆鮮車怒馬以財貨自達倫悉遣之更選孤貧志行之人以處曹任注云怒馬謂馬之肥壯其氣憤怒也服練紅東海恭王傳三十二宗室東海孝王臻兄弟並有篤行母卒皆吐血毁瘠至服練紅兄弟追念初喪父㓜小哀禮有闕因復重行喪制注云既祥之後而服練也禮記曰練衣黄裏縓緣縓淺絳也八月賜羊酒鄭均傳十七鄭均為尚書以病乞骸骨拜議郎告歸元和元年詔曰鄭均前在機密以病致仕守善貞固黄髪不怠其賜均穀千斛常以八月長吏存問賜羊酒顯兹異行注云東觀記曰賜羊一頭酒二斗終其身問遺賢良必以八月諸物老成故順其時氣助養育之也三關馮衍傳十八上上黨之地有四塞之固東帶三關西為國蔽注云三關謂上黨關壺口關石陘關也陘音形天心郎顗傳二十注云李巡曰北極天心也居北方正四時謂之北辰也𫝊國璽徐璆傳三十八徐璆道為袁術所劫術死軍破璆得其盜國璽還許上之注云衛宏曰秦以前以金玉銀為方寸璽秦以來天子獨稱璽又以玊羣下莫得用其玉出藍田山題是李斯書其文曰受命于天既夀永昌號曰𫝊國璽漢髙祖定三秦子嬰獻之髙祖即位乃佩之王莽就元后求璽后乃出以投地上螭一角缺及莽敗李松送上更始更始上赤眉建武三年盆子奉以上光武孫堅入雒敗董卓軍於城南見井中有五色光堅乃浚井得璽袁術拘堅妻求之得璽舉以向肘時璆得而獻之紫微宫霍諝傳三十八注云天有紫微宫是上帝所居也王者立宫象而為之也飛書梁松傳二十四梁松怨望乃縣飛書誹謗下獄死注云飛書者無根而至若飛來也即今匿名書也伊優抗髒趙壹傳七十下趙壹詩云伊優北堂上抗髒倚門邊注云伊優屈曲佞媚之貌抗髒髙伉婞直之貌也佞媚者見親故昇堂婞直者見棄故倚門彈棊梁冀傳二十四梁冀能挽滿彈棊格五六博蹴踘意錢之戯挽滿猶引强也注云藝經曰彈棊兩人對局白黑棊子各六枚先列棊相當更先彈也格五梁冀傳吾丘夀王傳三十四附注云前書吾丘夀王善格五音義云簺也蘇代反說文曰行棊相塞謂之簺鮑宏簺經曰簺有四采塞白乗五是也至五即格不得行故謂之格五六博梁冀傳注云鮑宏博經曰用十二棊六棊白六棊黑所擲頭謂之瓊瓊有五采按莊子云博塞以逰注云行五道而投瓊曰博不投瓊曰塞塞亦博𩔖意錢梁冀傳王符傳三十九注云何承天纂文曰詭億一曰射意一曰射數即攤錢也王符潛夫論曰或以逰博持掩為事注云博謂六博掩謂意錢也蹴踘梁冀傳注云劉向列傳曰蹴踘者𫝊言黄帝所作或曰起戰國之時蹴踘兵勢也所以講武知有材也步驟曹褒傳二十五詔曰三五步驟優劣殊軌注云孝經鈎命決曰三皇步五帝驟三王馳掾屬葢延傳八蓋延身長八尺彎弓三百斤邊俗尚勇力而以氣聞歴郡列掾州從事注云古者三公下至郡縣皆有掾屬續漢志曰建武十八年立刺史十三人人主一州皆有從事史假佐毎郡皆置諸曹掾郡中列掾非一延並為之故言歴也甲乙科射䇿順帝紀陽嘉元年注云前書音義曰甲乙科謂作簡策難問列置案上在試者意投射取而答之謂之射䇿上者為甲次者為乙若録政化得失顯而問之謂之對策三獨坐王常傳五注云漢官儀曰御史大夫尚書令司𨽻校尉皆専席號三獨坐景風和帝永元三年和帝詔曰髙祖功臣蕭曹為首曹相國後容城侯無嗣宜求近親須景風紹封以章厥功注云春秋考異郵曰夏至四十五日景風至則封有功間氣郎顗傳二十下郎顗曰處士漢中李固元精所生王之佐臣天之生固必為聖漢注云元為天精謂之精氣春秋演孔圖曰正氣為帝間氣為臣宫商為佐秀氣為人也三統陳寵傳三十六冬至之節陽氣始萌故十一月有蘭射干芸荔之應天以為正周以為春十二月陽氣上通雉雊雞乳地以為正殷以為春十三月陽氣已至天地已交人以為正夏以為春三微成著以通三統周以天元殷以地元夏以人元若以此時行刑則殷周嵗首皆當流血不合人心不稽天意百户牛酒肅宗紀元和二年詔賜河南女子百戸牛酒注云史記封禪書百戸牛一頭酒十石臣賢謂女戸頭即今之女戶也天下稱慶恩當普洽所以男户賜爵女子賜牛酒駭雞犀西域大秦國傳七十八注云抱朴子曰通天犀有白理如綖者以盛米置羣雞中雞欲往啄米至輒驚却故南人名為駭雞設屏齊王縯傳四人君正屏有所不聽注云白虎通曰所以設屏何以自障也示不極臣下之敬也天子徳大故外屏諸侯徳小故内屏重繭段熲傳五十五段熲與東羌戰羌大敗棄兵而走追之三日三夜士皆重繭注云繭足下傷起形如繭也淮南子曰申包胥曾繭重胝樞機明徳馬皇后傳十先帝防慎舅氏不令在樞機之位注云樞機近要之官也太后臨朝安思閻皇后傳十下注云蔡邕獨斷曰少帝即位太后即代攝政臨前殿朝羣臣太后東面少帝西面羣臣奏事上書皆為兩通一詣后一詣少帝關覽張升傳七十下張升少好學多關覽而任情不羈注云關涉也不羈謂超絶等倫不可羈束也柱天齊王縯傳四齊王縯自稱柱天都部注云柱天者若天之柱也匿犀李固傳五十三李固貌狀有竒表鼎角匿犀足履龜文注云鼎角頂有骨如鼎足也匿犀伏犀也謂骨當額上入髪際隠起也足履龜文者二千石見相書儈牛逢萌傳七十三王君公儈牛自隱注云口無二價時人曰避世牆東王君公儈謂平㑹兩家賣買之價角力隗囂傳三注云角力爭力也慰藉隗囂傳隗囂上書詣闕光武素聞其風聲報以殊禮言稱字用敵國之儀所以慰藉之良厚注云慰安也藉薦也言安慰而薦藉之良甚也櫜弓卧鼓隗囂傳注云卧猶息也章鉞李固傳五十三李固誅弟子汝南郭亮年始成童逰學洛陽乃左提章鉞右秉鈇鑕詣闕上書乞收固屍不許注云章謂所上章也鉞斧也鈇鑕鍖也懸師皇甫規傳五十五皇甫規上疏乞自効懸師之費且百億計注云懸猶停也銀艾張奐傳五十五張奐曰吾前後仕進十要銀艾注云銀印緑綬也以艾草染之故曰艾也晏開耿國傳九使塞下無晏開之警注云有警急則開門晩也鐵劵祭遵傳十丹書鐵劵傳於無窮注云鐵劵鐵契也前書髙祖與功臣剖符作誓丹書鐵契中藏蓋勲傳四十八帝曰吾多出中藏財物以餌士何如注云中藏謂内藏也元元光武紀建武元年注云元元謂黎庶也前書武帝詔勸元元師古曰元元善意左官丁鴻傳二十七丁鴻上封事曰左官外附之臣依托權門注云左官者人道尚右舎天子而事諸侯為左官外附謂背正法而附私家韋帶周磐傳二十九周磐解韋帶就孝㢘之舉注云以韋皮爲帶未仕之服也求仕則服革帶故解之殊死光武紀一上光武詔罪非犯殊死一切勿案注云殊死謂斬刑殊絶也左傳曰斬其木而弗殊一切謂權時非乆制也史書安帝紀五安帝年十嵗好學史書注云史書者史籀所作凡五十五篇可以教童㓜生犀肅宗紀元和元年南徼外蠻夷獻生犀白雉注云山海經曰犀似牛而猪頭黒色交州記曰犀其毛如豕頭如馬有三角鼻上角短額上頭上角長異物志曰角中特有光耀白理如線自本達末則為通犀六幽肅宗紀章和元年光照六幽注云六幽謂六合幽隱之處廊廟之計申屠剛傳十九注云廊殿下屋也廟太廟也國事必先謀於廊廟之所也從官前漢元帝紀附永光五年秋潁川水出流殺人民吏從官縣被害者與告晉灼曰從官即上侍從之官也言凡為吏為從官其本縣有被害者皆與休告兩漢博聞卷八
