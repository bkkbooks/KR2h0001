body:
  text: 兩漢博聞卷三宋楊侃輯更有三品昭帝紀元鳳四年食貨志四上如淳曰更有三品有卒更有踐更有過更古者正卒無常人皆當迭為之一月一更是為卒更貧者欲得顧更錢者次直者出錢顧之月二千是謂踐更也天下之人皆直戍邉三日亦名為更律所謂繇戍也雖丞相子亦在戍邉之調不可人人自行三日戍又行者當自戍三日不可往便還因使住一嵗一更諸不行者出錢三百入官官以給戍者是為過更也律說卒踐更者居也居更縣中五月乃更也後從尉律卒踐更一月休十一月也食貨志曰月為更卒已復為正一嵗屯戍一嵗力役三十倍於古此漢初因秦法而行之也後遂改易有謫乃戍邉一嵗耳更音工衡反又食貨志注師古曰更卒謂給郡縣一月而更者也正卒謂給中都官者也率計今人一嵗之中屯戍及力役之事三十倍多於古也暴室宣帝紀後漢桓帝鄧皇后傳掖庭令張賀嘗事戾太子思顧舊恩哀曽孫奉養甚謹為取暴室嗇夫許廣漢女師古曰暴室者掖庭主織作染練之署故為之暴室取暴曬為名耳或云薄室者薄亦暴也今俗語亦云薄曬蓋暴室職務既多因為置獄主治其罪人故往往云暴室獄耳然本非獄名嗇夫者暴室屬官亦猶縣鄉之嗇夫也注云漢官儀曰暴室主宫中婦人疾病者其皇后貴人亦就此室中二千石宣帝紀神爵四年黃霸以治行尤異秩中二千石師古曰霸舊已二千石矣今增為中二千石以寵異之此與地節三年增膠東相王成秩其事同耳漢制秩二千石者一嵗得一千四百四十石實不滿二千石也其云中二千石者一嵗得二千一百六十石舉成數言之故曰中二千石中者滿也佐酒髙帝紀十二年上置酒沛宫悉召故人父老子弟佐酒應劭曰助行酒張飲髙帝紀上過沛留止張飲三日張晏曰張帷帳也張音竹亮反駃騠鄒陽傳二十一蘇秦相燕人惡之燕王燕王按劒而怒食以駃騠孟康曰駃騠駿馬也蘇秦雖有讒謗而更食以珍竒之味擁彗髙帝紀六年太公擁彗迎門郤行李竒曰如今卒持帚也師古曰彗者所以掃也郤退而行也彗音似嵗反復道髙帝紀上居南宫從復道上如淳曰復音復上下有道故謂之復乘傳髙帝紀五年田橫乘傳詣雒陽未至三十里自殺如淳曰律四馬髙足為置傳四馬中足為馳傳四馬下足為乘傳一馬二馬為軺傳急曰乘一乘傳師古曰傳者若今之驛古者以車謂之傳車其後又單置馬謂之驛騎傳音張戀反舍人髙帝紀蘇林曰藺相如為宦者令舍人韓信為侯亦有舍人師古曰舍人親近左右之通稱也後遂以為私屬官號又曹參傳注曰舍人猶家人也一說私屬官主家事者也宿兵韓安國傳二十二韓安國曰孝文皇帝嘗一擁天下之精兵聚之廣武常溪然終無尺寸之功孝文寤於兵之不可宿故復合和親之約師古曰宿久留也柱國髙帝紀應劭曰柱國上卿官也若相國矣詭辨趙王彭祖傳二十三趙王彭祖為人心刻深好法持律詭辨以中人師古曰詭辨違道之辨也中傷也榷㑹趙王彭祖傳趙王擅權使使即縣為賈人榷㑹韋昭曰平㑹兩家買賣之賈者榷者禁他家獨王家得為之也師古曰即就也就諸縣而專榷賈人之㑹若今和市矣㑹音工外反一子不事賈山傳二十一賈山曰陛下即位振貧民禮髙年九十者一子不事八十者二算不事師古曰一子不事蠲其賦役二算不事免二口之算賦也合從項籍傳贊一過秦論曰諸侯恐懼㑹盟而謀弱秦不愛珍器重寶肥饒之地以致天下之士合從締交相與為一師古曰締結也從子容反締大系反約從從橫項籍傳贊後漢馮衍傳十八下過秦論曰約從離橫師古曰約誓為從欲以分離為橫橫謂秦也馮衍顯志賦云毒從橫之敗俗注云毒恨也關東為從關西為橫蘇秦事鬼谷先生為從說說關東六國為從親以畔秦㑹於洹水之上刳白馬而盟張儀與蘇秦同師為關西橫說說關西六國令事秦皆尚誣詐不遵道德景從項籍傳贊天下雲合嚮應贏糧而景從師古曰嚮讀曰響如響之應聲贏擔也景從言如影之隨形也頭㑹箕斂張耳傳二頭㑹箕斂以供軍費服䖍曰吏到其家人人頭數出榖以箕斂之同産子平帝紀元始元年平帝即位令諸侯王公列侯關內侯亡子而有孫若子同産子者皆得以為嗣師古云子同産子者謂養昆弟之子為子者縣官東平王宇傳五十東平王宇曰今縣官年少張晏曰不敢指斥成帝謂之縣官也渙汗元帝永光四年後漢胡廣傳三十四詔曰政令多還民心未得李竒曰還反也易曰渙汗其大號言王者發號施令如汗出不可復反胡廣曰政令如汗往而不反郵亭薛宣傳五十三郵亭不修師古曰郵行書之舍亦如今之驛及行道館舍也左道王商傳五十二執左道以亂政師古曰左道僻左之道謂不正相訐王商傳父子相訐師古曰訐告斥其罪也鼙鼓史丹傳五十二師古曰鼙本騎上之鼓流庸昭帝紀始元四年詔曰比嵗不登民匱於食流庸未盡還師古曰流庸謂去其本鄉而行為人庸作傳馬昭帝紀元鳳二年張晏曰驛馬也馬口錢昭帝紀元鳳二年詔曰其令郡國毋斂今年馬口錢文穎曰往時有馬口出斂錢今省如淳曰所謂租及六畜也緡錢武帝紀元狩四年李斐曰緡絲也以貫錢也一貫千錢出算二十也師古曰謂有儲積錢者計其緡貫而稅之緡武巾反計帳武帝紀武帝元封五年明堂朝諸侯王列侯受郡國計師古曰計若今之諸州計帳也占租昭帝紀始元六年令民得以律占租如淳曰律諸當占租者家長身各以其物占占不以實家長不身自書皆罰金二斤沒入所不自占物及賈錢縣官也師古曰占謂自隱度其實定其辭也占章贍反下又言占名數其義並同今猶謂獄訟之辨曰占皆其意也蓋武帝時賦斂繁多律外而取今始復舊倉廪昭帝紀元鳳三年師古曰倉新榖所藏也廪榖所振入也長楊五柞宣帝紀武帝疾往來長楊五柞宫師古曰長楊五柞二宫並在盩厔皆以樹名也嬌䖍吏武帝紀元狩六年師古曰嬌與矯同其字從手矯託也䖍固也妄託上命而堅固為邪惡也侵漁宣帝紀神爵三年侵漁百姓師古云漁者若言漁獵也絶幕武帝紀元朔六年衛青復將六將軍絶幕應劭曰幕沙幕胸奴之南界也臣瓉曰沙土曰幕直渡曰絶師古曰幕者即今之突厥中磧耳柏梁臺武帝紀元鼎二年師古曰三輔舊事云以香柏為之今書字皆從柏火耕水耨武帝紀江南之地火耕水耨應劭曰燒草下水種稻草與稻並生髙七八寸因悉芟去復下水灌之草死獨稻長所謂火耕水耨泛駕之馬武帝紀元封五年師古曰泛覆也音方勇反字本作覂後通用耳覆駕者言馬有逸氣而不循軌轍也跅弛武帝紀跅弛之士如淳曰士行有卓異不入俗檢而見斥逐者也師古曰跅者跅落無檢局也弛者放廢不遵禮度也跅土各反弛式爾反典屬國昭帝紀始元六年蘇武前使胸奴留單于庭十九嵗乃還奉使全節以武為典屬國如淳曰以其久在外國知邉事故令典主諸屬國師古曰典屬國本秦官漢因之掌歸義蠻夷屬官有九譯令後省并大鴻臚水衡錢宣帝紀本始二年以水衡錢為平陵徙民起第宅應劭曰水衡與少府皆天子私藏耳縣官公作當仰給司農今出水衡錢言宣帝即位為異政也倢妤昭帝紀師古曰倢接幸也妤美貌也故以名宫中婦官字或從女音接余便殿武帝紀建元六年師古曰凡言便殿便室便坐者皆非正大之處所以就便安也子大夫武帝紀元光元年師古曰子者人之嘉稱大夫舉官稱也志在優賢故謂之子大夫也算商車武帝紀元光六年初算商車李竒曰始稅商賈車船令出算漕渠武帝紀元光六年穿漕渠通渭如淳曰水轉運曰漕不肖武帝紀師古曰肖似也不肖者言無所象類謂不材之人也惡少年昭帝紀元鳳五年發三輔及郡國惡少年吏有告劾亡者屯遼東師古曰惡少年謂無賴子弟也被告劾而逃亡者緩頰髙帝紀二年漢王謂酈食其曰緩頰往說魏王豹張晏曰緩頰徐言引譬喻也間出髙帝紀三年紀信曰事急矣臣請誑楚可以間出師古曰間出投間隙私出若言間行微行耳紀信詐為漢王而王出西門遁是私出也亢禮髙帝紀五年師古曰亢當也髙下相當無所卑屈不獨謂揖拜也案原注引應劭曰亢禮者長揖不拜故末句云然三川髙帝紀沛公與項羽西略地至雍丘與秦軍戰大敗之斬三川守李由應劭曰三川今河南郡也由李斯子也韋昭曰有河洛伊故曰三川銜枚髙帝紀章邯夜銜枚擊項梁師古曰銜枚者止言語歡囂欲令敵人不知其來也周官有銜枚氏枚狀如箸橫銜之老弱傅籍髙帝紀二年蕭何發關中老弱未傅者悉詣軍服䖍曰傅音附如淳曰今老弱未嘗傅者皆發之未二十三為弱過五十六為老師古曰傅著也言著名籍給公家徭役也甬道髙帝紀漢王築甬道屬河以取敖倉粟應劭曰恐敵鈔輜重故築垣墻如街巷也鄭氏曰甬音踊師古曰屬聨也之欲反陛下髙帝紀五年應劭曰陛者升堂之陛王者必有執兵陳於陛階之側羣臣與至尊言不敢指斥故呼在陛下者而告之因卑以達尊之意也若今稱殿下閣下侍者執事皆此類也三齊田儋傳三并三齊之地師古曰齊及濟北膠東苑囿髙帝紀師古曰養鳥獸曰苑苑有垣曰囿所以種植謂之園酒闌髙帝紀文穎曰闌言希也謂飲酒者半罷半在謂之闌賜告髙帝紀髙祖嘗告歸之田孟康曰古者名吏休假曰告漢律吏二千石有豫告有賜告豫告者在官有功最法所當得也賜告者病滿三月當免天子優賜其告使得帶印綬將官屬歸家治病師古曰告者請謁之言謂請休耳或謂之謝謝亦告也左氏傳曰韓獻子告老禮記曰若不得謝漢書諸云謝病皆同義繡衣直指百官公卿表七上侍御史有繡衣直指服䖍曰指事而行無阿私也師古曰衣以繡者尊寵之也長揖髙帝紀師古曰長揖者手自上而極下也斬以徇髙帝紀師古曰徇行示也司馬法曰斬以徇言使人將行遍示衆士以為戒宗臣蕭曹傳贊王莽傳六十九上蕭曹位冠羣后聲施後世為一代之宗臣師古曰言為後世之所尊仰故曰宗臣法有祖王莽傳令大法有設後世有祖案漢書今本俱作天法有設此作大法蓋猶宋時刋本之舊師古曰祖始也以此為法之始較然王莽傳如此即羣下較然輸忠黎庶昭然感德師古曰較明貌也藉稿元后傳六十八車騎將軍音藉稿請罪師古曰自坐稿上言就刑戮也青瑣元后傳孟康曰以青畫户邉鏤中天子制也師古曰青瑣者刻為連瑣文而青塗也濯歌元后傳成都侯王商嘗病欲避暑從上借明光宫後又穿長安城引內灃水注第中大陂以行船立羽蓋張周帷輯濯越歌上幸商第見穿城引水意恨內銜之師古曰輯與楫同濯與櫂同皆所以行船也令執楫櫂人為越歌也輯謂櫂之短者也今吳越之人呼為橈音饒越歌為越之歌奉常百官公卿表七上師古曰太常王者旌旗也畫日月焉王有大事則建以行禮官主奉持之故曰奉常也後改曰太常尊大之義也期門羽林百官公卿表年宣帝神爵元期門羽林皆屬光祿勳服䖍曰與期門下以微行後遂以名官師古曰羽林亦宿衛之官言其如羽之疾如林之多也一說羽所以為王者羽翼也應劭曰天有羽林大將軍之星間駒百官公卿表太僕有龍馬間駒槖泉騊駼承華五監長丞如淳曰槖泉廄在橐泉宫下師古曰間闌養馬之所也故曰間駒騊駼出北海中其狀如馬騊徒髙反駼音塗少府百官公卿表少府秦官掌山海池澤之稅以給共養師古曰大司農供軍國之用少府以養天子也共居用反養弋亮反執金吾百官公卿表師古曰金吾鳥名也主辟不祥天子出行職主先導以禦非常故執此鳥之象因以名官水衡都尉百官公卿表張晏曰主都水及上林苑故曰水衡主諸官故曰都有卒徒武事故曰尉師古曰衡平也主平其稅入越騎百官公卿表越騎校尉掌越騎如淳曰越人內附以為騎也師古曰宣紀言佽飛騎士胡越騎又此有胡騎校尉掌胡騎與越騎校尉俱在八校尉數戊巳校尉百官公卿表師古曰甲乙丙丁庚辛壬癸皆有正位唯戊巳寄治耳今所置戊巳亦無常居故取戊巳為名也有戊校尉有巳校尉一說戊巳居中鎮覆四方今所置校尉亦處西域之中撫諸國也金璽盩綬百官公卿表晉灼曰盩草名也出琅邪平昌縣如艾可染緑因以為綬名也師古曰璽之為言信也古者印璽通名今則尊卑有别漢舊儀云諸侯王黃金璽槖他鈕文曰璽謂刻云某王之璽徹侯百官公卿表秦制爵二十級以賞功勞徹侯最貴金印紫綬漢避武帝諱曰通侯師古曰徹言其爵位上通於天子丞相百官公卿表秦有左右丞相荀恱曰秦本次國命卿二人是以置左右丞相無三公官五兵吾丘壽王傳三十四師古曰謂矛㦸弓劔戈也輸之司空百官公卿表七上宗正屬官有都司空令丞如淳曰律司空主水及罪人賈誼曰輸之司空編之徒官司𨽻百官公卿表司𨽻校尉持節從中都官徒千二百人師古曰以掌徒𨽻而巡察故云司𨽻中都官京師諸官府也行在武帝紀元狩六年師古曰天子或在京師或出巡狩不可豫定故言行在所耳不得亦謂京師為行在也脽上武帝紀元鼎四年蘇林曰脽音誰如淳曰汾隂縣治脽之上后土祠在縣西汾在脽之北師古曰脽者以其形髙起如人凥脽故以名云一說此臨汾水之上地本名鄈音與葵同彼鄉人呼葵音如誰故轉而為脽字故漢舊儀云葵上渥窪馬武帝紀馬生渥窪水中李斐曰南陽新野有暴利長當武帝時遭刑屯田燉煌界數於此水旁見羣野馬中有竒異者與凡馬來飲此水利長持勒靽收得其馬獻之欲神異此馬云從水中出師古曰渥音握窪於佳反朝日夕月武帝紀元鼎五年師古曰春朝朝日秋暮夕月蓋常禮也郊泰畤而揖日月此又别儀先甲武帝紀詔曰辛卯夜若景光十有二明易曰先甲三日後甲三日朕飭躬齊戒丁酉拜況于郊師古曰況賜也辛夜有光是先甲三日也丁日拜況是後甲三日也故詔引易文舳艫武帝紀元封五年舳艫千里李斐曰舳船後持柁處也艫船前頭刺櫂處也言其船多前後相銜千里不絶也舳音軸艫音盧汗血馬武帝紀太初四年十六上西域大宛國傳六二師將軍李廣利斬大宛王首獲汗血馬來作西極天馬之歌應劭曰大宛舊有天馬種踏石汗血汗從前髆出如血號一日千里師古曰踏石者謂踏石而有跡言其蹄堅利孟康曰言大宛國有髙山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因號曰天馬子云裊蹄金武帝紀太始二年詔曰泰山見黃金宜改故名今更黃金為麟趾裊蹄以協瑞焉因以班賜諸侯王師古曰武帝欲表祥瑞故普改鑄為麟足馬蹄之形以易舊法耳今人往往於地中得馬蹄金甚精好形製巧妙裊奴了反小步馬西域傳六十六上烏秅國出小步馬師古曰小細也細步言其能蹀足即今所謂百步千跡者也烏一加反秅直加反􅏽嗇孔氏傳六十一師古曰􅏽細也與纎同嗇愛也細吝於財利也晚節石顯傳六十二元帝晚節寢疾師古曰晚節猶言末時也計然貨殖傳六十一勾踐困於㑹稽之上乃用范蠡計然孟康曰姓計名然越臣也師古曰據古今人表計然列在第四等計然一號計研故賔戲云研桑心計於無垠即謂此耳計然者濮上人也博學無所不通尤善計算嘗南遊越范蠡卑身事之其書則有萬物録著五方所出皆直述之事見皇覽及晉中經簿又吳越春秋及越絶書並作計倪此則倪研及然聲皆相近實一人耳掌故鼂錯傳十九鼂錯以文學為太常掌故應劭曰掌故六百石吏主故事狼顧食貨志四上失時不雨民且狼顧李竒曰狼性怯走喜還顧言民見天不雨今亦恐也服役食貨志今農夫五口之家其服役者不下二人師古曰服事也給公事之役也心計食貨志四下桑𢎞羊洛陽賈人之子以心計年十三侍中師古曰心計不用籌算齊民食貨志如淳曰齊等也無有貴賤謂之齊民若今言平民矣均輸平準食貨志桑𢎞羊為治粟都尉領大農請置大農部丞數十人分主郡國置均輸鹽鐡官令逺方各以其物如異時商賈所轉販者為賦而相灌輸置平準於京師都受天下委輸大農諸官盡籠天下之貨物貴則賣之賤則買之如此富商大賈亡所牟大利則反本而萬物不得騰躍故曰平準三木司馬遷傳三十二魏其衣赭關三木師古曰三木在頸及手足闒茸司馬遷傳師古曰闒茸猥賤也闒下也茸細毛也言非豪傑也闒吐合反茸人勇反又賈誼傳注闒茸下材不肖之人也青社齊懷王傳三十三皇帝使御史湯廟立子閎為齊王曰受兹青社師古曰於廟授䇿也張晏曰王者以五色土為大社封四方諸侯各以其方色與之苴以白茅歸以立社宵人廣陵厲王傳三十三應劭曰無邇近小人也劔論司馬遷傳司馬氏在趙者以傳劔論顯服䖍曰世善劔也師古曰劔論者能說劔術也論來頓反圜牆司馬遷傳幽於圜牆之中師古曰圜牆獄也周禮謂之圜土少從張騫傳三十一師古曰漢時謂隨使而出外國者為少從總言其少年而從使也從材用反進孰張騫傳大宛以西皆自恃逺尚驕恣漢使往既多其少從率進孰於天子言大宛有善馬師古曰進孰者但空進成孰之言積竹杖昌邑王傳三十三昌邑王徵詣長安為昭帝嗣到濟陽求長鳴雞道買積竹杖文穎曰合竹作杖也仰藥息夫躬傳十五師古曰仰首而飲藥也招權季布傳七辨士曹丘生數招權顧金錢事貴人趙談等師古曰言招求貴人威權因以請託故得他人顧金錢也采金鄱水地理志八上孟康曰鄱陽鄱音婆師古曰采者取金之處兩漢博聞卷三
