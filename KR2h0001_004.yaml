body:
  text: 兩漢博聞卷四宋楊侃輯治行曹參傳九蕭何薨曹參聞之告舍人趣治行師古曰舍人猶家人也一說私屬官主家事者也趣讀曰促謂速也治行謂修行治裝也獄市曹參傳曹參屬其後相曰以齊獄市為寄曰夫獄市者所以并容也今君擾之姦人安所容乎孟康曰夫獄市者兼受善惡若窮極姦人姦人無所容竄久且為亂秦人極刑而天下畔孝武峻法而獄繁此其效也師古曰老子云我無為民自化我好靜民自正參欲以道化為本不欲擾其末也事刃蒯通傳十五蒯通說范陽令曰足下殺人之父孤人之子慈父孝子不敢事刃於公之腹者畏秦法也李竒曰東方人以物臿地中為事師古曰事音側吏反字本作倳封人頸王莽傳六十九中王莽下書曰妄封人頸得錢者去如淳曰權臣妄以法枉其人為僮僕封其頸以别之也得顧錢乃去封阪上走丸蒯通傳蒯通曰范陽令先下而身富貴邉城必相率降如阪上走丸也師古曰言乘勢便易申子學張歐傳十六張歐孝文時以治刑名侍太子師古曰劉向别録云申子學號曰刑名刑名者循名以責實其尊君卑臣崇上抑下合於六經說者云刑刑家名名家即太史公所論六家之二也此說非歐音驅任俠季布傳七應劭曰任謂有堅完可任託以事也如淳曰相與信為任同是非為俠師古曰任謂任使其氣力俠之言挾也以權力俠輔人也任音人禁反俠音下頰反冠玉陳平傳十或讒陳平曰平雖美丈夫如冠玉耳其中未必有也孟康曰飾冠以玊光好外見中非所有也端門周勃傳十師古曰端門殿之正門從理入口周勃傳許負相周亞夫君後三嵗而侯侯八嵗為將相後九嵗而餓死負指其口曰從理入口此餓死法也亞夫果封條侯為將軍拜太尉下廷尉不食五日死師古曰從豎也音子容反簿責周勃傳周亞夫下吏吏簿責亞夫如淳曰簿問其辭情師古曰簿問者書之於簿一一問之也四皓王貢兩龔傳序四十二漢興有東園公綺里季夏黃公甪里先生師古曰四皓稱號本起於此更無姓名可稱知此蓋隱居之人匿跡逺害不自標顯祕其氏族故史傳無得而詳至於後代皇甫謐圈稱之徒及諸地理書說競為四人施安姓字自相錯互語又不經班氏不載於書諸家皆臆說今並棄略一無取焉銜橛王吉傳四十二司馬相如傳二十七下師古曰銜馬銜也橛車鉤心也張楫以橛為馬之長銜非也橛音其月反又注司馬相如諫獵書曰銜橛之變言馬銜或斷鉤心或出則致傾敗以傷人也詐僞萌生王吉傳師古曰萌生言其爭出如草木之初生翁主王吉傳髙帝紀又注漢家列侯尚公主諸侯則國人承翁主晉灼曰娶天子女曰尚公主國人娶諸侯女曰承翁主尚承皆卑下之名也師古曰翁主者言父自主婚也王主成帝紀建始元年張晏曰王主王之女也師古曰王主即翁主也王自主婚故曰王主軌躅叙傳七十上伏周孔之軌躅鄭氏曰躅迹也三輔謂牛蹄處為躅音文欲反偶人公孫賀傳三十六朱安世自獄中上書告公孫賀之子敬聲與陽石公主私通及使人巫祭祠詛上且上甘泉當馳道埋偶人賀父子死獄中家族巫蠱之禍起自朱安世成於江充遂及公主皇后太子皆敗師古曰刻木為人象人之形謂之偶人偶並也對也左驗楊惲傳三十六張湯傳二十九楊惲下廷尉廷尉于定國考問左驗明白師古曰左證左也言當時在其左右見此事者也又張湯傳注李竒曰左證左也師古曰謂之左者言除罪人正身之外又取其左右者考問也城門候蔡義傳三十六師古曰門候主候時而開閉也嬌正劉屈氂傳贊三十六嬌當世反諸正師古曰正曲曰嬌嬌讀與矯同其字從手小生朱雲傳三十七丞相薛宣留朱雲宿因謂曰且留我東閣可以觀四方竒士雲曰小生乃欲相吏邪宣不敢復言師古曰小生謂其新學後進言欲以我為吏乎畔換叙傳七十下項氏畔換黜我巴漢孟康曰畔反也換易也不用義帝要換易與髙祖漢中也師古曰此說非也畔換强恣之貌猶言跋扈也詩大雅皇矣篇曰無然畔換君侯劉屈氂傳三十六如淳曰漢儀注列侯為丞相稱君侯師古曰楊惲傳丘常謂惲為君侯是則通呼列侯之稱耳非必丞相也子絲敘傳子絲慷慨師古曰爰盎字絲此加子者是嘉稱以偶句耳行馳道鮑宣傳四十二成帝紀丞相孔光四時行園陵官屬以令行馳道中如淳曰令諸使有制得行馳道中者行旁道無得行中央三丈也成帝紀云不敢絶馳道應劭曰馳道天子所行道也若今之中道丈人疏廣傳四十一師古曰丈人嚴莊之稱也故親而老者皆稱焉鉦鼓東方朔傳三十五平帝紀元始二年師古曰鉦鼓之教鉦鼓所以為進退士衆之節也平帝紀遣執金吾候陳茂行邉兵假以鉦鼓應劭曰將帥乃有鉦鼓今茂官輕兵少又但往諭曉之耳所以假鉦鼓者欲重其威也鉦者鐃也似鈴柄中上下通師古曰鉦音征鐃音女交反亞將灌嬰傳十一虜亞將周蘭師古曰亞次也射鵰李廣傳二十四文頴曰鵰鳥也故使善射者射之師古曰鵰大鷙鳥也一名鷲黑色翮可以為箭羽音雕蘧蒢叙傳下師古曰蘧蒢口柔觀人顔色而為辭佞也閹尹叙傳下師古曰謂宦人為閹者言其精氣奄閉不泄也一曰主奄閉門者尹正也奪嫡梅福傳三十七諸侯奪宗聖庶奪適如淳曰奪宗始封之君尊為諸侯則奪其舊為宗子之事也奪嫡文王舍伯邑考而立武王是也孔子雖庶可為殷後師古曰適讀曰嫡祁連山霍去病傳二十五霍去病出北地遂深入至祁連山師古曰祁連山即天山也胸奴呼天為祁連祁音上夷反躢鞠去病傳去病在塞外卒乏糧而去病尚穿域躢鞠也服䖍曰穿地作鞠室也師古曰鞠以皮為之實以毛蹴躢而戲也躢音徒臘反鞠音距六反冡象祁連去病傳霍去病薨上悼之發屬國𤣥甲軍陳自長安至茂陵為冡象祁連山師古曰在茂陵旁冡上有豎石冡前有石人馬者是也求雨董仲舒二十六董仲舒為江都相治國以春秋災異之變推隂陽所以錯行故求雨閉諸陽縱諸隂其止雨反是師古曰謂若閉南門禁舉火及開北門水灑人之類是也旬嵗翟方進傳五十四翟方進為丞相司直旬嵗間免兩司𨽻朝廷憚之師古曰旬遍也滿也旬嵗猶言滿嵗也若十日之一周泉山朱買臣傳三十四東越王居保泉山師古曰泉山即今泉州之山也保者保守之以自固也承明廬嚴助傳三十四賜㑹稽太守嚴助詔曰君厭承明之廬張晏曰承明廬在石渠閣外直宿所止曰廬威稜李廣傳二十四威稜憺乎鄰國李竒曰神靈之威曰稜憺動也憺音徒濫反鑿壞揚雄傳五十七下應劭曰鑿壞謂顔闔也魯君聞顔闔賢欲以為相使者往聘因鑿後垣而亡也壞音陪又音普回反宦騎蘇武傳二十四師古曰宦騎宦者而為騎也周阹揚雄傳以罔為周阹李竒曰阹遮禽獸圍陳也阹音袪旐旟藝文志十師古曰畫龜蛇曰旐鳥隼曰旟諡司馬相如傳二十七下師古曰諡者行之迹也文鷁相如傳二十七浮文鷁張揖曰鷁水鳥也畫其象於船首淮南子曰龍舟鷁首天子之乘也榜人相如傳榜人歌張揖曰榜船也月令云命榜人榜人船長也主倡聲而歌者也榜音謗又方孟反屬車相如傳二十七下應劭曰古者諸侯二車九乘秦滅九國兼其車服漢依秦制故大駕屬車八十一乘師古曰屬者言相連續不絶也反騷廣騷畔牢愁揚雄傳五十七上揚雄讀屈原離騷文未嘗不流涕以為君子遇不遇命也何必湛身哉湛讀曰沈謂投水而死乃作書往往托離騷文而反之自岷山投書江流以弔屈原名曰反離騷又旁離騷作重一篇名曰廣騷又旁惜誦以下至懷沙一卷名曰畔牢愁師古曰旁依也音步浪反其下類此重音直用反李竒曰畔離也牢聊也與君相離愁而無聊也師古曰惜誦懷沙皆屈原所作九章中名也品藻揚雄傳五十七下仲尼之後訖于漢道德顔閔股肱蕭曹爰及名將尊卑之條稱述品藻撰淵騫師古曰品藻者定其差品及文質咫尺之書韓信傳四奉咫尺之書以使燕燕必不敢不聽師古曰八寸曰咫咫尺者言其簡牘或長咫或長尺喻輕率也今俗言尺書或言尺牘蓋其遺語耳枉矢劉向傳六枉矢夜光應劭曰流星也其射如矢蛇行不正故曰枉矢流以亂伐亂蘇林曰有聲為天狗無聲為枉矢天狗劉向傳孝昭時有大星如月西行衆星隨之此為特異孝宣興起之表天狗夾漢而西李竒曰流星也下墮地為天狗皆祅星常伯谷永傳五十五戴金貂之飾執常伯之職師古曰常伯侍中也伯長也常使長事者也一曰常任使之人此為長也法從揚雄傳五十七上趙昭儀方大幸每上甘泉常法從師古曰法從者以言法當從耳非失禮一曰從法駕也殊庭郊祀志五下師古曰殊庭蓬萊中仙人庭也首級衛青傳二十五斬輕鋭之卒捕伏聽者三千一十七級張晏曰伏於隱處聽軍虛實師古曰本以斬敵一首拜爵一級故謂一首為一級因復名生獲一人為一級也秦法斬首一賜爵一級禆王衛青傳漢兵圍右賢王右賢王驚夜逃潰圍北去輕騎校尉郭成等追數百里弗得得右賢禆王十餘人師古曰禆王小王也若言禆將也大黃李廣傳二十四李廣自以大黃射其禆將服䖍曰黃肩弩也孟康曰太公陷堅卻敵以大黃參連弩也晉灼曰黃肩即黃間也大黃其大者也師古曰服晉二說是也從橫短長術張湯傳二十九藝文志下主父偃傳三十四上邊通學短長官至濟南相應劭曰短長術興於六國時長短其語隱謬用相激怒也張晏曰蘇秦張儀之謀趣彼為短歸此為長戰國䇿名短長術也主父偃學短長從橫術藝文志云從橫家者流蓋出於行人之官孔子曰誦詩三百使於四方不能顓對雖多亦奚以為師古曰謂人不達於事誦詩雖多亦無所用三尺法杜周傳三十客謂廷尉杜周曰君為天下決平不循三尺法專以人主意指為獄獄者固如是乎孟康曰以三尺竹簡書法律也針石藝文志十師古曰針所以刺病也石謂砭石即石針也古者攻病則有砭今其術絶矣針音之林反砭音彼亷反褎然董仲舒傳二十六子大夫褎然為舉首張晏曰褎進也為舉賢良之首也師古曰褎然盛服貌也數竒李廣傳二十四大將軍隂受上指以為李廣數竒孟康曰竒隻不耦也如淳曰數為胸奴所敗為竒不耦師古曰言廣命隻不耦合也孟說是矣數音所角反竒音居宜反居無何李廣傳師古曰無何謂未多時也烏號司馬相如傳二十七上郊祀志五上左烏號之雕弓應劭曰楚有柘桑烏栖其上支下著地不得飛欲墮號呼故曰烏號郊祀志黃帝采首山銅鑄鼎於荆山下鼎既成有龍垂胡髯下迎黃帝黃帝上騎羣臣後宫從上龍七十餘人龍乃上去餘小臣不得上乃悉持龍䫇龍䫇拔墮墮黃帝之弓百姓仰望黃帝既上天乃抱其弓與龍䫇號故後世名其處曰鼎湖其弓曰烏號於是天子曰嗟乎誠得如黃帝吾視去妻子如脫屣耳師古曰屣小履脫屣者言其便易無所顧也不世之功後漢隗囂傳三附足下將建伊吕之業𢎞不世之功注云不世者言非世之所常有也鼐鼒郊祀志鼐鼎及鼒師古曰鼎絶大者謂之鼐圜弇上謂之鼒鼐音乃代反鼒音兹十二樓郊祀志五下方士有言黃帝時為五城十二樓以候神人名曰迎年應劭曰昆侖𤣥圃五城十二樓仙人之所常居師古曰迎年若云祈年箭服相如傳二十七上右夏服之徑箭伏儼曰服盛箭器也夏后氏之良弓名繁弱其矢亦良即繁弱之箭服也師古曰箭服即今之步義也伏祠郊祀志五上秦德公作伏祠孟康曰六月伏日也周時無至此乃有之師古曰伏者謂隂氣將起迫於殘陽而未得升故為藏伏因名伏日也立秋之後以金代火金畏於火故至庚日必伏庚金也梟鏡郊祀志人有言古天子常以春解祠祠黃帝用一梟破鏡張晏曰黃帝五帝之首也春嵗之始也梟惡逆之鳥方士虛誕云以嵗始破除凶災令神仙之帝食惡逆之物使天下為逆者破滅訖竟無有遺育也孟康曰梟鳥名食母破鏡獸名食父黃帝欲絶其類使百吏祠皆用之破鏡如貙而虎眼如淳曰漢使東郡送梟五月五日作梟羮以賜百官以其惡鳥故食之也師古曰解祠者謂祠祭以解罪求福縉紳郊祀志李竒曰縉插笏於紳紳大帶也臣瓉曰縉赤白色紳大帶也左氏傳有縉雲氏師古曰李云縉插是也字本作搢插笏於大帶與革帶之間耳或作薦紳者亦謂薦笏於紳帶之間其義同綿蕞叔孫通傳十三叔孫通與其弟子百餘人為綿蕞野外應劭曰立竹及茅索營之習禮儀其中也如淳曰謂以茅剪樹地為纂位尊卑之次也春秋傳曰置茅蕝師古曰蕞與蕝同並子恱反如說是也九賓叔孫通傳大行設九賓臚句傳蘇林曰上傳語告下為臚下告上為句也韋昭曰大行掌賓客之禮今之鴻臚也九賓則周禮九儀也謂公侯伯子男孤卿大夫士也鴟夷范蠡傳六十一鄒陽傳二十一師古曰范蠡自號鴟夷子皮者言若盛酒之鴟夷多所容受而可卷懷與時張弛也鴟夷皮之所為故曰子皮應劭曰吳王取馬革為鴟夷受伍子胥沉之江鴟夷榼形師古曰即今之盛酒鴟夷幐傾蓋鄒陽傳鄒陽上梁孝王書語曰白頭如新傾蓋如故何則知與不知也孟康曰初相識至白頭不相知文頴曰傾蓋猶交蓋駐車也䋁斷幹枚乘傳二十一泰山之霤穿石單極之䋁斷幹孟康曰西方人名屋梁為極單一也一梁謂井鹿盧也言鹿盧為綆索久鍥斷井幹也晉灼曰䋁古綆字也單盡也盡極之綆斷幹幹井上四交之幹常為汲索所契傷也師古曰晉說近之幹者交木井上以為欄者也孟云鹿盧失其義矣䋁綆皆音鯁鍥契皆刻也音口計反文甲東方朔傳三十五九後漢杜篤傳一百十後漢王符傳三十師古曰玳瑁文甲也廣志曰玳瑁形似龜出南海吳録曰玳瑁似龜而大五諸侯髙帝紀二年羽雖聞漢東既擊齊欲遂破之而後擊漢漢王以故得劫五諸侯兵師古曰五諸侯者謂常山河南韓魏殷也此年十月常山王張耳降河南王申陽降韓王鄭昌降三月魏王豹降虜殷王卬復除髙帝紀二年蜀漢民給軍事勞苦復勿租稅二嵗師古曰復者除其賦役也音方目反拔城髙帝紀秦二年攻碭三日拔之師古曰拔者克城邑而取之言若拔樹木并得其根榖嗛郊祀志五下師古曰嗛少意也言榖稼少嗛音苦簟反急就篇藝文志十元帝時黃門令史游作急就篇成帝時李長作元尚篇皆蒼頡中正字也八體藝文志韋昭曰八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書六體藝文志六體者古文竒字篆書隸書繆篆蟲書師古曰古文謂孔子壁中書竒字即古文而異者也篆書謂小篆蓋秦始皇使程邈所作也𨽻書亦程邈所獻主於徒隸從簡易也始造隸書起於官獄多事茍趨省易施之於徒隸也繆篆謂其文屈曲纒繞所以摹印章也蟲書謂為蟲鳥之形所以書幡信也秦篆藝文志史籀篇者周時史官教學童書也與孔氏壁中古文異體蒼頡七章者李斯所作也博學七章者胡母敬所作也文字多取史籀篇而篆體復頗異所謂秦篆也竹皮冠髙帝紀應劭曰以竹始生皮作冠今鵲尾冠是也文頴曰髙祖居貧志大取其約省與衆有異韋昭曰竹皮竹筠也今南夷取竹幼時續以為帳師古曰竹皮笋皮謂笋上所解之籜耳非竹筠也今人亦往往為笋皮巾古之遺制也能髙帝紀吾非敢自愛恐能薄師古曰能謂材也能本獸名形似熊足似鹿為物堅中而强力故人謂有賢材者皆為能擊筑髙帝紀十二年後漢延篤傳五十四髙祖過沛留置酒沛宫酒酣上擊筑而歌鄧展曰筑音竹應劭曰狀似琴而大頭安絃以竹擊之故名曰筑師古曰今筑形似瑟而細頸也後漢書注云說文曰筑五絃之樂沈約宋書曰筑不知誰所造也史記唯云髙漸離擊筑案今筑形似筝有項有柱史記荆軻至燕日與屠狗及髙漸離擊筑荆軻和而歌於市中相樂已而相泣旁若無人三雍河間獻王傳二十三河間獻王武帝時來朝獻雅樂對三雍宫應劭曰辟雍明堂靈臺也雍和也言天地君臣人民皆和也又漢書音義曰皆叶天人雍和之氣為之故謂三雍蹲鴟貨殖傳六十一蜀卓氏曰吾聞岫山之下沃壄下有踆鴟至死不飢師古曰蹲鴟謂芋也其根可食以充糧故無飢年華陽國志曰汶山郡都安縣有大芋如蹲鴟也感槩郭解傳六十二季布傳七郭解少時隂賊感槩師古曰隂賊者隂懷賊害之意也感槩者感意氣而立節槩也季布傳贊曰婢妾賤人感槩而自殺非能勇也五陵原涉傳六十二師古曰五陵謂長陵安陵陽陵茂陵平陵也班固西都賦曰南望杜霸北眺五陵是知霸陵杜陵非此五陵之數也而說者以為髙祖以至茂陵為五陵失其大意二府劉向傳六如淳曰二府謂丞相御史大夫府也亦曰兩府也交㦸劉向傳佞邪與賢臣並在交㦸之內師古曰交㦸謂宿衛者置醴楚元王傳六魯穆生受詩於浮丘伯楚元王好詩以穆生為中大夫穆生不嗜酒元王每置酒常為穆生設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠楚人將鉗我於市稱疾卧師古曰醴甘酒也少麴多米一宿而熟不齊之枕中書劉向傳宣帝興神仙方術之事而淮南有枕中鴻寶苑祕書言神仙使鬼物為金之術及鄒衍重道延命方世人莫見而劉更生父德武帝時治淮南獄得其書更生幼而讀誦以為竒獻之言黃金可成上令典尚方鑄作事費甚多方不驗師古曰鴻寶苑祕書並道術篇名藏在枕中言常存録之不漏泄也印刓韓信傳四韓信曰項王使人有功當封爵刻印刓忍不能豫蘇林曰刓音刓角之刓刓與摶同手弄角訛不忍授也師古曰刓音五丸反摶音大官反馮軾酈食其傳十三酈食其馮軾下齊七十餘城師古曰馮讀曰憑憑據也軾車前橫板隆起者也云憑軾者言但安坐乘車而遊說不用兵衆間路韓信傳黥布傳四韓信欲東下井陘擊趙李左車說趙王曰願假臣等兵三萬人從間路絶其輜重師古曰間路微路也黥布先從間道破關下軍師古曰間道微道也葬驪山劉向傳秦始皇葬於驪山之阿下錮三泉上崇山墳髙五十餘丈石椁為游館人膏為燈燭水銀為江海黃金為鳧雁珍寶之藏機械之變棺槨之麗宫館之盛不可勝原又多殺宫人生薶工匠計以萬數驪山之作未成而周章百萬之師至其下矣項籍燔其宫室往者咸見發掘其後牧兒亡羊羊入其鑿牧者持火照求羊失火燒其藏槨師古曰石椁為游館者多纍石於壙中以為離宫别館也孟康曰作機發木人之屬盡其巧變也晉灼曰始皇本紀命匠作機弩矢有所穿近輒射之又言工匠為機咸皆知之已下閉羡門皆殺工匠也師古曰不可勝原者言不能盡其本數也周章陳勝之將也往者皆發掘之以求財物也鑿謂所穿冡藏者音在到反騶騎惠帝紀東方朔傳又注應劭曰騶騶騎也師古曰騶本廄之馭騶也後人以為騎謂之騶騎凌室惠帝紀四年武帝紀又注師古曰凌室藏冰之室也間者文帝紀師古曰間者猶言中間之時也弋綈文帝紀贊文帝身衣弋綈如淳曰弋皂也賈誼曰身衣皂綈師古曰弋黑色也綈厚繒音大奚反太夫人文帝紀七年如淳曰列侯之妻稱夫人列侯死子復為列侯乃得稱太夫人子不為列侯不得稱也醪文帝紀後元年師古曰醪汁滓酒也指縱蕭何傳九功臣皆曰蕭何未有汗馬之勞居臣等上何也上曰諸君知獵乎夫獵追殺獸者狗也而發縱指示獸處者人也師古曰發縱謂解紲而放之也指示者以手指示之俗言放狗縱音子用反而讀者乃為蹤蹟之蹤非也書本皆不為蹤字自有逐蹤之狗不待人發也棧道髙帝紀元年張良說漢王燒絶棧道師古曰閣道也鴆酒齊悼惠王傳八應劭曰鴆鳥黑身赤目食蝮蛇野葛以其羽畫酒中飲之立死引强周勃𫝊十周勃材官引强服䖍曰能引强弓弩官也孟康曰如今挽强司馬也師古曰强音其兩反殿兵周勃傳周勃擊章邯車騎殿師古曰殿填也謂鎮軍後以扞敵勃擊破章邯之殿兵也殿音丁見反鈍如椎周勃傳周勃不好文學每召諸生說事東鄉坐責之趣為我語其椎少文如此臣瓉曰令直言勿稱經也師古曰趣讀曰促謂令速言也服䖍曰謂訥鈍也應劭曰今俗名拙語為椎儲師古曰椎謂朴鈍如椎也音直推反酒家保欒布傳七欒布窮困賣庸於齊為酒家保孟康曰酒家作保保庸也可保信故謂之保師古曰謂庸作受顧也為保謂保可任使遮虜障李陵傳二十四師古曰障者塞上險要之處往往修築别置候望之人所以自障蔽而伺敵也遮虜障名也穹廬胸奴傳六十四上師古曰穹廬旃帳也其形穹隆故曰穹廬成蹊李廣傳贊二十四諺曰桃李不言下自成蹊師古曰蹊謂徑道也言桃李以其華實之故非有所召呼而人爭歸趣來往不絶其下自然成徑以喻人懷誠信之心故能潜有所感也爰臂李廣傳李廣爰臂如淳曰臂如猿臂通肩也厥角首諸侯王表二王莽因母后之權漢諸侯王厥角首應劭曰厥者頓也角者額角也首首至地言王莽漸漬威福漢之王侯莫敢怨望皆頓角首至地而上其璽綬也晉灼曰厥猶豎也叩頭則額角豎與稽同門牡飛五行志七中之上成帝元延元年長安章城門門牡自亡函谷關次門牡亦自亡晉灼曰章城門者西出南頭第一門也師古曰牡所以下閉者也亦以鐡為之韋昭曰次門者函谷關邉小門也師古曰非行人所由蓋關司曹府所在之門也京房易傳曰飢而不損兹謂泰厥災水厥咎牡亡妖辭曰關動牡飛辟為亡道臣為非厥咎亂臣謀篡故谷永對曰章城門通路寢之路函谷關距山東之險城門關守國之固固將去焉故牡飛也九流藝文志十儒家者流出於司徒之官道家者流出於史官隂陽家者流出於羲和之官法家者流出於理官名家者流出於禮官墨家者流出於清廟之守從橫家者流出於行人之官雜家者流出於議官農家者流出於農稷之官小說家者流出於稗官諸子十家其可觀者九家而已皆起於王道既微諸侯力政時君世主好惡殊方是以九家之術蜂出並作師古曰稗音稊稗之稗稗官小官漢名臣奏唐林請省置吏公卿大夫至都官稗官各減什三是也初用夏正髙里武帝紀太初元年冬十月行幸泰山十一月甲子朔旦冬至祀上帝于明堂十二月䄠髙里應劭曰初用夏正以正月為嵗首故改年為太初也髙里者伏儼曰山名在泰山下師古曰此髙字自作髙下之髙而死人之里謂之蒿里或呼為下里者也字則為蓬蒿之蒿或者既見太山神靈之府髙里山又在其旁即誤以髙里為蒿里混同一事文學之士共有此謬陸士衡尚不免況其餘乎今流俗書本此髙字有作蒿者妄加增耳奔命昭帝紀始元元年益州牂柯等皆反遣水衡都尉吕破胡募吏民及發犍為蜀郡奔命擊益州大破之應劭曰舊時郡國皆有材官騎士以赴急難今夷反常兵不足以討之故權選取精勇聞命奔走故謂之奔命師古曰奔古奔字耳犍音䖍又巨言反封君食貨志四下師古曰封君受封邑者謂公主及列侯之屬也即山鑄錢食貨志建元以來用度少縣官往往即多銅山而鑄錢師古曰就多銅之山而鑄錢也摩錢質取鋊食貨志姦或盜摩錢質而取鋊臣瓉曰許慎云鋊銅屑也摩錢漫面以取其屑更以鑄錢西京黃圖叙曰民摩錢取屑是也師古曰鋊音浴皮幣食貨志有司言曰古者皮幣諸侯以聘享金有三等黃金為上白金為中赤金為下今半兩錢法重四銖而姦或盜摩錢質而取鋊錢益輕薄而物貴則逺方用幣煩費不省乃以白鹿皮方尺緣以繢為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行又造銀錫白金以為天用莫如龍地用莫如馬人用莫如龜故白金三品其一曰重八兩圜之其文龍名白撰直三千二曰以重差小方之其文馬直五百三曰復小橢之其文龜直三百令縣官銷半兩錢更鑄三銖錢重如其文盜鑄諸金錢罪皆死而吏民之犯者不可勝數孟康曰白金銀也赤金丹陽銅也鄭氏曰半兩錢其文為半兩實重四銖也師古曰繢繡也繪五采而為之如淳曰銀錫白金者雜鑄銀錫為白金也晉灼曰以重差小之者以半斤之重差為三品則中品六兩下品四兩也師古曰橢音他果反橢圜而長之也苑馬景帝紀中六年胸奴入鴈門至武泉入上郡取苑馬如淳曰漢儀注太僕牧師諸苑三十六所分布北邉西邉以郎為苑監官奴婢三萬人養馬三十萬匹師古曰武泉雲中之縣也養鳥獸者通名為苑故謂牧馬處為苑商顔溝洫志九發卒萬人穿渠自徵引洛水至商顔下師古曰徵音懲即今所謂澄城也商顔商山之顔也謂之顔者譬人之顔額也亦猶山領象人之頸領黔首藝文志十後漢光武紀師古曰秦謂人為黔首言其頭黑也又光武建武五年注秦呼人為黔首謂奴為蒼頭以别於良人也鶡冠藝文志後漢輿服志三十師古曰以鶡鳥羽為冠後漢志武冠加雙鶡尾豎左右為鶡冠五中郎將羽林左右監等皆冠鶡冠鶡者勇雉也其鬪對一死乃止故趙武靈王以表武事奉施之焉徐廣曰鶡似黑雉出於上黨荀綽晉百官表注曰冠插兩鶡鷙鳥之暴疏者也每所攖撮應爪催衄天子武騎故以冠焉傅𤣥賦注曰羽騎騎者戴鶡雉經馮奉世傳贊四十九申生雉經師古曰國語云晉獻公黜太子申生乃雉經于新城之廟蓋為俯頸閉氣而死若雉之為牢讓師丹傳五十六牢讓爵位師古曰牢堅也咀藥王嘉傳五十六王嘉引藥杯以擊地曰三公負國當伏刑都市何謂咀藥而死師古曰咀嚼也劔璏王莽傳六十九上王莽為新都侯就國孔休守新都相莽盡禮待之緣恩意進玊具寶劔欲以為好休不肯受莽因曰誠見君面有瘢美玉可滅瘢欲獻其瑑即解其瑑休復辭莽曰君嫌其價邪遂椎碎之自裹以進休休乃受及莽徵去欲見休休稱疾不見師古曰瘢創痕也服䖍曰瑑音衛蘇林曰劔鼻也師古曰瑑本作璏後傳寫訛也瑑音雕瑑字耳音篆說文云劔鼻玉也從玉彘音直例反秒忽叙傳七十下元元本本數始於一産氣黃鍾造計秒忽劉德曰秒禾芒也忽蜘蛛網細者也師古曰秒音眇其字從禾置亭馮奉世傳四十九劉屈氂傳又注師古曰置謂置驛之所也離飢寒蕭望之傳四十八邊郡數被兵離飢寒師古曰離遭也金選之品蕭望之傳西羌反張敞上書言縣官榖度不足以振之度徒各反願令諸有罪非盜受財殺人及犯法不得赦者皆得以差入榖贖罪天子下其議兩府丞相御史以難問敞敞曰因此令贖其便明甚何化之所亂甫刑之罰小過赦薄罪贖有金選之品師古曰吕侯為周穆王司冦作贖刑之法謂之吕刑後改為甫侯故又稱甫刑也應劭曰選音刷金銖兩名也師古曰音刷是也字本作鋝鋝即鍰也其重十二銖二十五分銖之十三一曰重六兩吕刑曰墨辟疑赦其罰百鍰劓辟疑赦其罰惟倍剕辟疑赦其罰倍差宫辟疑赦其罰六百鍰大辟疑赦其罰千鍰是其品也名數孔光傳五十一元帝賜霸第一區徙名數于長安師古曰名數户籍也首鼠兩端田蚡灌夫傳二十二武安侯田蚡始未貴時往來侍酒於魏其侯竇嬰所跪起如子姓及蚡貴士吏趨勢利者皆去嬰而歸蚡蚡日益橫灌夫者父張孟嘗為灌嬰舍人得幸故蒙灌氏姓吳楚反夫父子俱有功武帝時夫位至太僕後蚡請嬰城南田嬰曰老僕雖棄將軍雖貴寧可以勢相奪乎不許夫聞怒蚡聞嬰夫怒不與田蚡亦怒兩人有隙蚡取燕王女為夫人嬰與夫俱往賀遂縛夫居室遣吏逐捕諸灌氏支屬皆得棄市罪嬰救夫因言蚡短兩人廷辨之蚡罷朝召御史大夫韓安國怒曰與長孺共治一秃翁何為首鼠兩端嬰夫皆棄市師古曰姓生也言同子禮若已所生也居室署名屬少府長孺安國字也張晏曰秃翁言嬰年老嗜酒頭秃言當共治一秃翁也服䖍曰首鼠一前一却也雎陽曲梁孝王傳十七梁孝王築東苑三百餘里廣雎陽城七十里師古曰更廣大之也晉太康地記云城方十三里梁孝王築之鼓倡節杵而後下和之者稱雎陽曲今踵以為故今之樂家雎陽曲是其遺音兩漢博聞卷四
