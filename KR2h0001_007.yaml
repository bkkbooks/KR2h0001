body:
  text: 兩漢博聞卷七宋楊侃輯阿房賈山傳二十一秦為阿房之殿師古曰阿房者言殿之四阿皆為房也一説大陵曰阿言其殿髙若於阿上為房也韋帶賈山傳布衣韋帶之士師古曰韋帶以單韋為帶無飾也弧弓韓安國傳二十二弧弓射獵師古曰以木曰弧以角曰弓魯縞韓安國傳強弩之末力不能入魯縞師古曰縞素也曲阜之地俗善作之尤為輕細故以取喻也劘上賈山傳贊二十一賈山自下劘上卒免刑戮者以其言正也孟康曰劘上者謂剴切之也蘇林曰劘音摩厲也師古曰剴工來反齧膝王褒傳三十四下孟康曰良馬低頭口至膝故曰齧膝么髍敘傳七十上勇如信布強如梁籍威如王莽然卒潤鑊伏鑕亨醢分裂又况么髍尚不及數子鄭氏曰髍音麼師古曰么麼皆微小之稱也么一堯反麼莫可反北叟敘傳七十上北叟頗識其倚伏丹青之信王莽傳六十九明告以生活丹青之信師古曰生活謂來降者不殺之也丹青之信言明著也渾元敘傳渾元運物師古曰渾元天地之氣也椒除王莽傳羣臣扶掖王莽自前殿南下椒除服虔曰除殿陛之道也椒取芬香之名也秦中婁敬傳十三師古曰秦中謂關中故秦地也東箱周昌傳十二吕后側耳於東箱聽師古曰正寢之東西室皆曰箱言似箱篋之形大奴昌邑哀王傳三十三師古曰凡言大奴者謂奴之尤長大者也南北軍七校刑法志三漢初天下既定踵秦置材官於郡國京師有南北軍之屯至武帝平百粵內增七校外有樓船皆嵗時講肄修武備云晉灼曰百官表中壘屯騎步兵越騎長水胡騎射聲虎賁凡八校尉胡騎不常置故此言七也飲泣賈捐之傳三十四下飲泣巷哭師古曰淚流被面以入於口故言飲泣也提封東方朔傳三十五盩厔以東宜春以西提封頃畝及其賈直師古曰提封謂提舉四封之內總計其數也賈讀曰價裋褐貢禹傳四十二裋褐不完師古曰裋者謂僮豎所著布長襦也褐毛布之衣也裋音豎顓門夏侯勝傳四十五夏侯建者勝之從父子也師事勝勝非建章句小儒破碎大道建亦非勝為學疏略難以應敵建卒自顓門社木眭𢎞傳四十五師古曰社木社主之樹也菜色翼奉傳四十五百姓菜色師古曰人専食菜故肌膚青黃為菜色也伏歷李尋傳四十五馬不伏歷不可以趨道師古曰伏歷謂伏槽歷而秣之也壼奧敘傳七究先聖之壼奧應劭曰宫中門謂之闈宫中巷謂之壼苦本反牛衣王章傳四十六師古曰牛衣編亂麻為之即今俗呼為龍具者蹂躪王商傳五十二百姓奔走相蹂躪訛言大水至也師古曰蹂踐也躪轢也蹂人九反躪音藺文毋害蕭何傳九蕭何以文毋害為沛主吏掾蘇林曰無害言無比也一曰害勝也無能勝害之者晉灼曰酷吏傳趙禹為丞相亞夫吏府中皆稱其廉然亞夫不任曰極知禹無害然文深不可以居大府蘇説是也師古曰害傷也無人能傷害之者蘇晉兩説皆得其意豪吏曹參傳九蕭何曹參並為縣之豪吏師古曰言為吏之豪長也梟首髙帝紀四年漢王西入關梟故塞王欣頭櫟陽市師古曰梟縣首於木上啖秦將髙帝紀秦三年漢王使酈食其陸賈往説秦將啖以利秦將果欲連和師古曰啖者以食餧人令其啖食徒濫反今言以利誘之取食為譬甚亡謂也髙帝紀五年師古曰亡謂者失於事宜不可以訓七大夫髙帝紀髙帝詔曰七大夫以上皆令食邑臣瓚曰秦制列侯乃得食邑今七大夫以上皆食邑所以寵之也師古曰七大夫公大夫也爵第七故謂之七大夫省中昭帝紀昭帝八嵗即位帝姊鄂邑公主益湯沐邑為長公主共養省中師古曰以供養天子故益邑也伏儼曰蔡雍云本為禁中門閣有禁非侍御之臣不得妄入行道豹尾中亦為禁中孝元皇后父名禁避之故曰省中師古曰省察也言入此中皆當察視不可妄也海丞果丞平帝紀元始元年置少府海丞果丞各一人師古曰海丞主海稅果丞掌諸果實也軨獵車宣帝紀霍光廢昌邑王太僕以軨獵車奉迎曽孫是為宣帝嗣昭帝後文穎曰軨獵小車前有曲軨不衣也近世謂之軨獵車李竒曰蘭輿輕車也是時未備天子車駕故且取其輕便爾疇其爵邑宣帝紀地節二年霍光薨詔曰大將軍功德茂盛朕甚嘉之復其後世疇其爵邑世世毋有所與張晏曰律非始封十減二疇者等也言不復減也師古曰與讀曰豫年號武帝紀武帝即位年號建元元年師古曰自古帝王未有年號始起於此大要陳萬年傳三十六陳咸謂其父曰具曉所言大要教咸讇也師古曰大要大歸也射聲百官公卿表七上射聲校尉掌待詔射聲士服虔曰工射者也冥冥中聞聲則中之因以名也應劭曰須詔所命而射故曰待詔射也大長秋百官公卿表師古曰秋者秋成之時長者恆久之義故以為皇后官名景帝時置皇后卿也長信少府百官公卿表長信詹事掌皇太后宫景帝更名長信少府張晏曰以太后所居宫為名也居長信宫則曰長信少府居長樂宫則曰長樂少府也塊然陳湯傳四十師古曰塊然獨處之意如土塊也廉上趙充國傳三十九辛武賢擊罕羌入鮮水北句廉上服虔曰句音鉤師古曰句廉謂水岸曲而有廉稜也倅馬趙充國傳趙充國上屯田奏曰至四月草生發郡騎及屬國胡騎伉健各千倅馬什二就草為田者逰兵師古曰倅副也什二者千騎則與副馬二百匹也伉口浪反薦草趙充國傳今虜亡其美地薦草師古曰薦稠草也刺舟王莽傳六十九下師古曰楫所以刺舟也班輸敘傳七十上班輸榷巧於斧斤師古曰班輸即魯公輸班也一説班魯班也與公輸氏為二人也皆有巧藝也故樂府云誰能為此器公輸與魯班榷専也一曰競也榷音角鶡雀黃霸傳五十九京兆尹張敞舍鶡雀飛集丞相府師古曰此鶡音芬本作鳻此通用耳鳻雀大而色青出羌中非虎賁所著虎賁鶡者色黑出上黨以其鬭死不止故用其尾飾武臣首云今時俗人所謂鶡雞者也音曷非此鳻雀也胥靡楚元王傳六楚王戊淫暴申公白生二人諫不聽胥靡之晉灼曰胥相也靡隨也師古曰聨繫使相隨而服役之故謂之胥靡猶今之役囚徒以鎖聨綴耳部署髙帝紀漢王引兵東定三秦部署諸將師古曰分部而署置屬吏昌邑哀王傳三十三昌邑王賀徴入嗣位過𢎞農使大奴善以衣車載女子至湖郎中令龔遂入問賀賀曰無有遂曰即無有何愛一善以毁行義請牧屬吏以湔灑大王即捽善屬衛士長行法師古曰以善付吏也屬之欲反湔浣也灑濯也湔子顛反灑先禮反捽持頭也衛士長主衛之官捽才兀反博望苑武五子傳三十三武帝為戾太子立博望苑使通賔客師古曰取其廣博觀望也禖祝武五子傳武帝年二十九乃得太子甚喜為立禖使東方朔枚臯作禖祝師古曰禖求子之神也禮月令祀于髙禖是也令朔等作祝禖之辭少府私府路溫舒傳二十二路溫舒遷廣陽私府長師古曰藏錢之府天子曰少府諸侯曰私府長者其官之長也厄三七之間路溫舒傳谷永傳五十五路溫舒從祖父受厯數天文以為漢厄三七之間張晏曰三七二百一十嵗也自漢初至哀帝元年二百一年也至平帝崩二百十一年成帝時谷永曰陛下承八世之功業當陽數之標季涉三七之節紀直百六之災厄孟康曰陽九之末季也至平帝乃三七二百一十嵗之厄今已涉向其節紀師古曰直當也土著張騫傳三十二身毒國在大夏東南可數千里其俗土著鄧展曰毒音篤李竒曰一名天篤即浮屠胡是也師古曰即敬佛道者也土著者謂有城郭常居不隨畜牧移徙也著直略反西南夷傳身毒國即天竺國也不得月支要領張騫傳張騫至大月支留嵗餘還不得月支要領師古曰要衣要也領衣領也凡持衣者執要與領言騫不得月支意趣無以持歸漢故以為喻要一遙反先容鄒陽傳二十一蟠木根柢輪囷離竒而為萬乘器者以左右先為之容也師古曰蟠木屈曲之木也萬乘器者天子車輿之屬也容謂雕刻加飾匕首鄒陽傳匕首竊發師古曰匕首短劍也其首類匕便於用也寥廓之士鄒陽傳師古曰寥廓逺大之度也糲食司馬遷傳糲粱之食服虔曰糲粗米也張晏曰一斛粟七斗米為糲音賴師古曰食飯也杜陵男子蕭育傳四十八後漢楊彪傳四十四蕭育為茂陵令扶風召詣後曹當以職事對育徑出曹書佐隨牽育育案佩刀曰蕭育杜陵男子何詣曹也如淳曰賊曹法曹皆後曹也師古曰欲以職事責之也自言欲免官而去但是杜陵一白衣男子耳何須召我詣曹乎後漢曹操欲殺楊彪孔融謂操曰今橫殺無辜海內觀聽誰不解體孔融魯國男子明日便當拂衣而去押至息夫躬傳十五軍書交馳而輻湊羽檄重迹而押至師古曰押至言相因而至也侵牟李廣利傳三十一將吏侵牟之師古曰侵牟言如牟賊之食苗也質木地理志八下民俗質木師古曰質木者無有文飾如木石然虎牢地理志八上成臯注云故虎牢或曰制師古曰穆天子傳云七萃之士生捕獸即獻天子天子畜之東虢號曰獸牢句吳于越地理志八下師古曰句音鉤夷俗語之發聲也亦猶越為于越耳勃碣地理志武帝紀元封元年注勃碣之間一都會也師古曰薊縣燕之所都也勃勃海也碣碣石也此石著海旁碣碣然特立之貌也三楚髙帝紀項羽自為西楚霸王孟康曰舊名江陵為南楚吳為東楚彭城為西楚罘罳文帝紀七年五行志七上未央宫東闕罘罳災如淳曰東闕與其兩旁罘罳皆災也晉灼曰東闕之罘罳獨災也師古曰罘罳謂連闕曲閣也以覆重刻垣墉之處其形罘罳然一曰屏也罘音浮五行志注云罘罳闕之屏也即拜趙充國傳三十九上乃拜樂成侯許延夀為強弩將軍即拜酒泉太守辛武賢為破羌將軍師古曰即就也就其郡而拜之三始鮑宣傳四十二如淳曰正月一日為嵗之朝月之朝日之朝始猶朝也蕭然食貨志四下江淮之間蕭然煩費矣師古曰蕭然猶騷然勞動之貌子母錢食貨志周景王時患錢輕更鑄大錢單穆公曰不可古者量資幣權輕重以救民民患輕則為之作重幣以行之於是有母權子而行民皆得焉若不堪重則多作輕而行之亦不廢重於是有子權母而行小大利之今王廢輕而作重民失其資能無匱乎應劭曰母重也其大倍故為母也子輕也其輕少半故為子也民患幣之輕而物貴為重幣以平之權時而行以廢其輕故曰母權子猶言重權輕也民皆得者本末有無皆得其利也孟康曰重為母輕為子若市八十錢物以母當五十以子當三十續之民患幣重則多作輕錢而行之亦不廢去重者言重者行其貴輕者行其賤也腹非食貨志張湯奏當異九卿見令不便不入言而腹非論死自是後有腹非之法比師古曰比則例也姦鑄赤仄食貨志郡國鑄錢民多姦鑄錢多輕而公卿請令京師鑄官赤仄一當五賦官用非赤仄不得行師古曰姦鑄謂巧鑄之雜鉛錫應劭曰赤仄謂子紺錢也如淳曰以赤銅為其郭也今錢郭見有赤者不知作法云何師古曰凡充賦及給官用皆令以赤仄莢錢食貨志漢興以為秦錢重難用更令民鑄莢錢如淳曰如榆莢也八銖錢髙后紀髙后二年行八銖錢應劭曰本秦錢質如周錢文曰半兩重如其文即八銖也漢以其太重更鑄莢錢今民間名榆莢錢是也民患其太輕至此復行八銖錢五分錢髙后紀髙后六年行五分錢應劭曰所謂莢錢者四銖錢文帝紀五年食貨志孝文時以錢益多而輕乃更鑄四銖錢其文為半兩除盜鑄錢令使民放鑄師古曰恣其私鑄也賈誼諌曰令細民人操造幣之藝各隱屏而鑄作姦錢日多其為禍博矣五銖錢武帝紀食貨志武帝元狩五年罷半兩錢行五銖錢食貨志元狩五年三官初鑄五銖錢三官謂上林三官也契刀錯刀食貨志王莽居攝變漢制以周錢有母子相權於是更造大錢徑寸二分重十二銖文曰大錢五十又造契刀錯刀契刀其環如大錢身形如刀長二寸文曰契刀五百錯刀以黃金錯其文曰一刀直五千與五銖錢凡四品並行張晏曰案今所見契刀錯刀形質如大錢而肉好輪厚異於此大錢形如大刀環矣契刀身形員不長二寸也其文左曰契右曰刀無五百字也錯刀則刻之作字也以黃金填其文上曰一下曰刀二刀泉甚不與志相應也似扎單差錯文字磨滅故耳師古曰王莽錢刀今並尚在形質及文與志相合無差錯連弩李陵傳二十四李陵發連弩射單于張晏曰三十絭共一臂也絭去權反便衣李陵傳師古曰謂著短衣小褎也一半氷李陵傳李陵令軍士人持二升糒一半氷師古曰半讀曰判判大片也時冬寒有氷持之以備渴也百金裞朱建傳十三朱建母死辟陽侯奉百金裞師古曰贈終者之衣被曰裞言以百金為衣被之具裞式芮反其字從衣問遺婁敬傳十三師古曰問遺謂餉饋之也舍匿淮南厲王傳十四舍匿者論皆有法師古曰舍匿謂容止而藏隱也發車封淮南厲王傳淮南厲王謀逆赦死罪載以輜車令縣次傳王不食而死縣傳者不敢發車封孟康曰檻車有封友壻嚴助傳三十四上嚴助對武帝曰臣家貧為友壻富人所辱師古曰友壻同門之壻也搏景主父偃傳三十四胸奴獸聚而鳥散從之如搏景師古曰搏擊也搏人之隂景言不可得也刷恥貨殖傳六十一報強吳刷會稽之恥師古曰刷謂拭除之也埒富猗頓傳與王者埒富師古曰埒等也稱之不容口爰盎傳十九師古曰稱美其德口不能容也法宫鼂錯傳十九五帝神聖處法宫之中明堂之上如淳曰法宫路寢正殿也充賦鼂錯傳鼂錯曰以臣充賦甚不稱明詔求賢之意如淳曰猶言備數也臣讚曰充賦此錯之謙也云如賦調也狐白匡衡傳五十一夫富貴在身而列士不譽是有狐白之裘而反衣之也師古曰狐白謂狐掖下之皮其毛純白集以為裘輕柔難得故貴也反衣之者以其毛在內也今人則以背毛為裘而棄其白蓋取厚而溫也衣於既反隨牒匡衡傳匡衡材智有餘經學絶倫但以無階朝廷故隨牒在逺方師古曰階謂升次也隨牒謂隨選補之常牒不被超擢者已然諾灌夫傳二十二灌夫不好文學喜任俠已然諾師古曰已必也謂一言許人必信之也餐錢奉邑髙后紀二年列侯幸得賜餐錢奉邑韋昭曰稅租奉祿正所食也四時得間賜是為餐錢餐小食也師古曰餐餐同一字耳千安反餐所謂吞食物也餐錢賜厨膳錢也奉邑本所食邑也奉扶用反兩漢博聞卷七
