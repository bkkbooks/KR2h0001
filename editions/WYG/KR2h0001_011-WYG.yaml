body:
  text: 兩漢博聞卷十一宋楊侃輯封禪光武紀中元元年幸魯柴望岱宗登封太山禪梁父注云岱宗太山也梁父太山下小山也封謂聚土為壇墠謂除地而祭改墠為禪神之也續漢志曰時上御輦升山即位於壇南北面尚書令奉玉牒檢皇帝以寸三分璽親封之藏玊牒已以石覆訖尚書令以五寸印封石檢畢皇帝再拜禪祭地于梁隂以髙后配山川羣神從祀焉其玉牒文秘刻石文辭多不載使君周恂傅六郭伋傳二十一冦恂為上谷太守耿況功曹更始立遣使者徇郡國恂從況迎使者上印綬使者納之無還意恂勒兵入見使者就請之曰使君建節銜命以臨四方今始至上谷而墮大信將復何以號令他郡乎遂授況印綬注云君者尊之稱故曰使君郭伋為并州牧行部有童兒騎竹馬迎之曰聞使君到喜故來迎太史公光武紀中元元年注云太史史官之長也前書音義曰太史公武帝置在丞相之上巴蜀光武紀注云蜀有巴郡故總言之使匈奴中郎將擁節光武紀南匈奴傳七十九建武六年匈奴遣使來獻使中郎將報命注云漢官儀曰使匈奴中郎將擁節秩比二千石匈奴傳論曰馳中郎之使都䕶西域傳七十八武帝時西域内屬有三十六國漢為置校尉領䕶之宣帝改曰都䕶注云前書云李廣利征討大宛之後屯田渠犁置使者領䕶營田以供使外國也宣帝時以鄭吉前破車師後降日逐遂并令䕶車師以西北道號曰都䕶都䕶之置始於吉也修黌宇儒林傳序六十九上注云説文曰黌學也黌與橫同儒林傳云遊庠序聚横塾者蓋布之於邦域矣博士十四家徐防傳三十四徐防曰漢以孔聖旣逺微㫖將絶故開置大學立博士十有四家設甲乙之科以勉勸學者注云漢官儀曰光武中興恢𢎞稽古易有施孟梁丘賀京房書有歐陽和伯夏侯勝建詩有申公轅固韓嬰春秋有嚴彭祖顔安樂禮有戴德戴聖凡十四博士太常差選有聰明威重一人為祭酒總領綱紀也前書曰嵗課甲科四十人為郎中乙科二十人為太子舍人丙科四十人補文學掌故家法徐防傳徐防曰伏見太學試博士弟子皆以意説不修家法注云諸經為業各自名家石經儒林傳序靈帝詔諸儒正定五經刋於石碑為古文篆𨽻三體書法以相㕘樹之學門使天下咸取則焉注云古文謂孔子壁中書篆𨽻並程邈所作也縢囊儒林傳序董卓移都之際典策剖散其縑帛圖書大則連為帷葢小則制為縢囊注云縢亦㬺也徒恒反説文曰幐囊也樓櫓匈奴傳七十九公孫瓚傳六十三造戰車可駕數牛上作樓櫓置於塞上以拒匈奴注云櫓即樓也釋名曰樓無屋為櫓樓樐千里注云樐即櫓字説文釋名曰櫓露也上無覆屋也三家詩儒林傳六十九下前書魯人申公受詩於浮丘伯為作詁訓是為魯詩齊人轅固生亦傳詩是為齊詩燕人韓嬰亦傳詩是為韓詩三家皆立博士趙人毛萇傳詩是為毛詩未得立平帝時方立毛詩西域南山西域傳七十八西域東極玊門陽關西至葱嶺其東北與匈奴烏孫相接南北有大山中央有河其南山東出金城與漢南山屬焉其河有兩源匈奴龍祠南匈奴傳七十九注云前書匈奴法嵗二月諸長小㑹單于庭祠五月大㑹龍城祭其先天地鬼神八月大㑹蹛林課校人畜計蹛音帶釃酒臧宫傳八臧宫陳兵大㑹擊牛釃酒注云釃所宜反説文云下酒也詩注曰以筐曰釃也羯胡臧宫傳論八戎羯䘮其精膽按此語本出臧宫傳論原本誤為吳漢謹改正注云羯本匈奴別部分散居其上黨武鄉羯室因號羯胡此總謂戎夷耳不指於羯也幅巾鮑永傳十九趙咨傳二十九韋彪傳十六注云幅巾謂不著冠但幅巾束首也太尉楊賜辟趙咨使飾巾出入請與講議注云以幅巾為首飾不加冠冕又符融傳注云幅巾以一幅為之韋著不應州郡之命靈帝就家拜東海相詔書逼切不得已解巾之郡注云巾幅巾也旣服冠冕故解幅巾馬當匈鮑永傳鮑永諫太守拔佩刀截馬當匈注云當匈以韋為之也含元包一郅惲傳十九注云前書志曰太極元氣含三為一謂三才未分包而為一祕經蘇竟傳二十上注云謂幽祕之經即緯書之𩔖也踟蹰蘇竟傳皇天所以眷顧踟蹰憂漢子孫者也注云踟蹰猶徘徊也綈表楊厚傳二十上楊厚之祖春卿善圖䜟學臨終戒其子統曰吾綈袠中有先祖所傳秘記爾其修之注云綈厚繒也音提請讞襄楷傳二十下注云讞疑也謂罪有疑者讞於廷尉也君子不死之國東夷傳七十五東夷天性柔順易以道御至有君子不死之國焉注云山海經曰君子國衣冠帶劒食獸使二文虎在旁去琅邪三萬里山海經又曰不死人在交脛東其為人黒色壽不死並在東方也德星襄楷傳二十下注云德星嵗星也不三宿桑下佛陁襄楷傳襄楷上疏曰浮屠不三宿桑下不欲久生恩愛精之至也今陛下婬女艷婦極天下之麗注云浮屠即佛陁也但聲轉耳並謂佛也言浮屠之人寄桑下者不經三宿便即移去示無愛戀之心也嗇神養和周盤傳二十九注云嗇愛惜也季母西域傳注云季母叔母也青門逄萌傳七十三逄萌解冠挂東都城門注云漢宫殿名東都門今名青門也前書音義曰長安東都城北頭第一門毾㲪西域傳七十八天竺國出細布好毾㲪注云毾它闔反㲪音登埤蒼曰毛席也釋名曰施之承大牀前小榻上登以上牀也奇幻西域傳注云大秦國俗多奇幻口中出火自縛自解跳十二丸巧妙非常流沙傳論七十八李恂傳四十一天竺記云西度流沙屢有熱風惡鬼過之必死注云廣志曰流沙在玉門關外東西數百里有三斷名曰三隴故曰隴沙以西使命不得通也大秦國蘇合香西域傳大秦國在海西亦云海西國其人民皆長大平正𩔖中國故謂之大秦其國合㑹諸香煎其汁以為蘇合魂歸岱天孫烏桓傳八十烏桓國言死者神靈歸赤山赤山在遼東西北數千里如中國人死者魂神歸岱山也注云博物志泰山天帝孫也主召人魂東方萬物始故知人生命貂鼲鮮卑傳八十鮮卑有貂豽鼲子皮毛柔蝡故天下以為名裘注云豽女滑反鼲胡昆反貂鼲並鼠屬豽猴屬也軷祀吳祐傳五十四注云祖道之禮封土為軷壇也五經要義曰祖道者行祭為道路祈也周禮太馭掌王玉路以祀及犯軷注云軷祀者封土象山於路側以芻棘栢為神主祭之以車轢軷而去喻無險難也秦海西域傳敦煌太守張璫上書以為北虜呼衍王常展轉蒲𩔖秦海之間專制西域共為冦鈔注云大秦國在西海西故曰秦海也蒲𩔖亦國名文犀馬援傳十四注云犀之有文彩者也藁葬馬援傳馬援旣卒有上書譖援前所載南方薏苡一車皆明珠文犀帝益怒援妻孥惶懼不敢以䘮還舊塋買城西數畝地藁葬而已注云藁草也以不歸舊塋時權葬故稱藁幅裂南匈奴傳論七十九方夏幅裂注云諸夏如布帛之裂也虹蜺楊賜傳四十四注云爾雅云雙出色鮮盛者為雄曰虹闇者為雌曰蜺投蜺楊賜傳春秋䜟曰投蜺天下怨海内亂注云春秋演孔圖曰霓者斗之亂精也失度投霓見宋均注曰投霓投應也配袝陳球傳四十六曹節欲別葬竇太后而以馮貴人配袝注云袝謂新死之主於先死者之廟婦袝於其夫投暮任光傳十一注云投至也選懦之恩清河孝王傳四十五注云選懦仁弱慈戀不決之意懦仁兖反聚落聚落化其德注云小於鄉曰聚廣雅曰落居也玉門關班超傳三十七注云玉門關屬敦煌郡今沙州也在敦煌縣西北小杜律郭躬傳三十六注云武帝時廷尉杜周之子延年亦明習法律宣帝時為御史大夫對父故言小管穴陳忠傳三十六如其管穴妄有譏刺注云管穴言小也史記扁鵲曰若以管窺天宿麥安帝紀五注云宿舊也麥必經年而熟故稱宿命夫安帝紀永初六年注云命夫者其男子之為大夫也命婦者其大夫之妻也大行安帝紀注云前書音義韋昭云大行者不反之辭也天子崩未有諡故稱大行也榖梁傳曰大行受大名青部臧洪傳四十八袁紹以臧洪為青州刺史時羣盜飇起而青部殷實拘儒左雄等傳論五十二處士鄙生忘其拘儒拂巾衽褐以企旌車之招矣注云拘儒猶褊狹也置之度外公孫述傳三漢帝釋關隴之憂注云隗囂居西無東之意故置之度外而不為憂解構隗囂傳三帝與隗囂書曰自今已後手書相聞勿用人解構之言注云解構猶間構也抵掌隗囂傳注云説文抵側擊也戰國策曰蘇秦與李兊抵掌而談糗糒隗囂傳注云周禮曰糗熬大豆與米也説文又云糒乾飯也坏冶崔駰傳四十二坏冶一陶注云坏土器之未燒者刻玉版崔駰傳䇿合道從克亂弭衝乃將鏤𤣥珪冊顯功注云珪玉也詩含神霧曰刻之玉版藏之金匱銘功鼎崔駰傳注云墨子曰昔夏后開冶使飛廉析金於山以鑄鼎於昆吾蔡邕銘論曰吕尚作周太師其功銘於昆吾之鼎也勒景襄之鍾崔駰傳注云國語曰晉魏顆以其身退秦師于輔氏其勲銘于景鍾此兼言襄也欽頤周燮傳四十三周燮生而欽頤折頞醜狀駭人其母欲棄之其父不聽曰吾聞聖賢多有異貌注云頤頷也欽頤曲頷也説文曰頞鼻莖也折亦曲也欽立凡反欽或作顩音同髫鬌周燮傳周燮始在髫鬌而知亷讓注云髫髮也禮記曰子生三月之末擇日剪髮為髫男角女覊否則男左女右鬌徒果反恭館班固傳三十下啓恭館之金縢注云恭肅之館謂廟中也金縢以金緘匱藏符瑞之書於其中也遂古班固傳注云遂古猶逺古茹薇申屠蟠傳四十三昔人之隱巢棲茹薇注云巢棲猶巢父也薇似藿也診脈郭玊傳七十二下有老父不知何出常漁釣於涪水因號涪翁見有疾者時下針石輒應時而效乃著針經診脈法傳於世注云診候也賈胡李恂傳四十一注云賈胡胡之商賈也鼓下戮人岑彭傳七光武收韓歆置鼓下將斬之注云中將軍最尊自執旗鼓若置營則立旗以為軍門并設鼓戮人必於其下攘袂攘袂而正讓注云袂衣袖也攘袂猶今之言捋臂也錄尚書事肅宗紀三肅宗以侯熹為太傅牢融為太尉並錄尚書事注云武帝初以張子孺領尚書事錄尚書事由此始放手顯宗紀權門請託殘吏放手注云放手謂貪縱為非也贖刑顯宗紀詔曰方春戒節人以耕桑其敕有司務順時氣使無煩擾天下亡命殊死已下聽得贖論死罪入縑二十匹右趾至髠鉗城旦舂十匹完城旦舂至司冦作三匹注云前書音義曰右趾謂刖其右足次刖左足次劓次黥次髠鉗為城旦舂城旦者晝日伺冦虜夜暮築長城舂者婦人犯罪不任軍役之事但令舂以食徒者完者謂不加髠鉗而築城也次鬼薪白粲次隷臣妾次司冦作投𫝊陳蕃傳五十六豫州刺史周景辟陳蕃為別駕從事蕃以諫爭不合投傳而去注云投棄也傳謂符也丁戀反度遼將軍五原顯宗紀永平五年北匈奴冦五原八年初置度遼將軍屯五原曼柏注云武帝拜范明友為度遼將軍至此復置焉以中郎將吳常行度遼將軍曼柏縣在今勝州銀城縣部將冦恂傳六注云部將謂軍部之下小將也天人致誅班固傳三十下往者王莽作逆漢祚中缺天人致誅六合相滅注云天人謂天意人事共相誅也封事副封顯宗紀永平八年詔羣司勉修職事極言無諱於是在位者皆上封事各言得失注云宣帝始令羣臣得奏封事以知下情封有正有副領尚書者先發副封所言不善屏而不奏後魏相奏去副封以防壅蔽昆侖塞顯宗紀永平十七年竇固耿秉劉張出敦煌昆侖塞擊破白山虜於蒲𩔖海上注云昆侖山名因以為塞在今肅州酒泉縣西南山有昆侖之體故名之周穆王見西王母于此山有石室王母臺郎官上應列宿顯宗紀郎官上應列宿出宰百里注云史記曰太微宫後二十五星郎位也懐檄陳寔傳五十二中常侍侯覽託潁川太守髙倫用吏倫教署為文學掾功曹陳寔知非其人懐檄請見注云檄板書謂以髙倫之教書之於檄而懐之者懼洩事也尤無狀者肅宗紀建初元年前漢東方朔傳注詔刺史明加督察尤無狀者注云無狀謂其罪惡尤大其狀無可寄言故云無狀它皆𩔖此館陶公主徒跣頓首謝曰妾無狀師古曰狀形貌也無狀猶言無顔面以見人也一曰自言所行醜惡無善狀也斗食小吏肅宗紀注云前書曰百石已下有斗食佐吏之秩言小吏也方目紗肅宗紀建初二年詔齊相省冰紈方空縠吹綸絮注云紈素也冰言色鮮㓗如冰釋名曰縠紗也方空者紗薄如空也或云孔也即今之方目紗也前書齊有三服官故詔齊相罷之鉆鑽肅宗紀元和元年詔曰自徃者大獄已來掠考多酷鉆鑽之屬慘苦無極注云大獄謂楚王英等事也鉆其廉反説文曰鉆鋷也國語曰中刑用鑽鑿皆謂酷慘其肌膚也汴渠顯宗紀永平十二年遣將作謁者王吳修汴渠自滎陽至于千乗海口注云汴渠即莨蕩渠也汴自滎陽首受河所謂石門在滎陽山北一里過汴已東積石為隄亦號金隄成帝陽嘉中所作也大酺禁羣飲顯宗紀永平十五年令天下大酺五日注云前書音義曰漢律三人已上無故羣飲罰金四兩今恩詔横賜得令聚㑹飲食五日酺布也言天子布恩於天下三老顯宗紀詔賜天下男子爵人一級三老孝悌力田人三級注云前書音義曰男子者謂户内之長也人賜爵者有罪得贖貧者得賣與人三老孝悌力田三者皆鄉官之名三老髙帝置孝悌力田髙后置所以勸導鄉里助成風化也文帝詔曰孝悌天下之大順也力田為生之本也三老衆人之師也其以户口率置員白馬羌光武紀建武十三年廣漢徼外白馬羌豪率種人内屬注云廣漢今益州雒縣也羌有百五十四種在廣漢西北者為白馬羌也三韓東夷傳七十五東夷有三韓一曰馬韓二曰辰韓三曰弁韓馬韓在西有五十四國其北與樂浪南與倭接辰韓在東十有二國其北與濊貊接弁韓在辰韓之南亦十有二國凡七十八國百濟是其一國焉大者萬餘户小者數千家各在山海間地方四千餘里太白杜篤傳七十注云太白天之將軍初作壽陵光武紀建武二十六年初作壽陵注云初作陵未有名故號壽陵蓋取久長之義也漢自文帝以後皆預作陵今循舊制也徙函谷關光武紀更始二年注云函谷谷名因谷以名關舊在𢎞農湖城縣西前書楊僕為樓船將軍有功耻居關外武帝乃徙於新安故關在今洛州新安縣之東襃斜順帝紀注云襃斜漢中谷名南谷名襃北谷名斜首尾七百里軍假吏山阻用材官光武紀建武七年詔曰今國有衆軍並多精勇宜且罷輕車騎士材官樓船士及軍假吏注云漢官儀曰髙祖命天下郡國選能引關蹶張材力武猛者以為輕車騎士材官樓船常以秋後講肄課試各有員數平地用車騎山阻用材官水泉用樓船軍假吏謂軍中權置吏也今悉罷之幘光武紀更始元年注云漢官儀曰幘者古之卑賤不冠者之所服也方言曰覆髻謂之幘或謂之承露豪傑英俊光武紀崔駰傳注云淮南子曰智過百人謂之豪白虎通云賢過萬人曰傑注云文子曰智過萬人謂之英千人謂之俊司隷光武紀注云前書曰司隷校尉本周官武帝初置持節從中都官徒千二百人督大姦猾後罷其兵察三輔三河𢎞農秩比二千石音義云以掌徒隷而廵察故曰司隷榖皮綃頭周黨傳七十三向栩傳七十一周黨被徵不得已乃著短布單衣榖皮綃頭待見尚書注云以榖樹皮為綃頭也服此尚書以待見也向栩性卓詭不倫恒讀老子狀如學道又似狂生好被髮著絳綃頭注云説文綃生絲也從系肖聲音消案此字當作幧此消反其字從巾古詩云少年見羅敷脱巾著幧頭鄭𤣥注儀禮云如今著幧頭自頂中而前交額上却繞髻也内學方術傳序七十二自王莽矯用符命及光武尤信䜟言自是習為内學尚奇文貴異數不乏於時矣注云内學謂圖䜟之書也其事祕密故稱内謁太山請命許曼傳七十二下許峻少嘗篤病三年不愈乃謁太山請命注云太山主人生死故謂請命也思遲直士肅宗紀建初五年詔朕思遲直士側席異聞注云遲猶希望也持二反側席謂不正坐所以待其賢良也三屬肅宗紀元和元年詔曰徃者妖言大獄所及廣逺一人犯罪禁至三屬注云三屬即三族也謂父族母族妻族莩甲肅宗紀元和二年方春生養萬物莩甲注云莩葉裏白皮也易曰百果甲拆兩漢博聞卷十一
