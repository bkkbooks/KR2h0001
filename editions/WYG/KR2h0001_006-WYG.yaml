body:
  text: 兩漢博聞卷六宋楊侃輯龍樓成帝紀十成帝為太子初居桂宫上嘗急召太子出龍樓門師古曰三輔黄圖桂宫在城中近北宫非太子宫張晏曰樓上有銅龍若白鶴飛㢘之為名也枸醬西南夷傳六十五唐䝉使南粤食䝉蜀枸醬䝉問所從來曰道西北牂柯江江廣數里出畨禺城下䝉歸至長安問蜀賈人獨蜀出枸醬多持竊出市夜郎夜郎者臨牂柯江江廣百餘步足以行船南粤以財物役屬夜郎然亦不能臣使也晉灼曰枸音矩師古曰子形如桑椹耳縁木而生非樹也味尤辛不酢今宕渠則有之食讀曰飤舉白叙𫝊七十上引滿舉白師古曰引取滿觴而飲飲訖舉觴告白盡不也一說白者罰爵之名也飲有不盡者則以此爵罰之魏文侯與大夫飲酒令曰不釂者浮以大白於是公乗不仁舉白浮君是也自繆孝成趙皇后傳鄭氏曰自縊也師古曰繆絞也居虬反戲㦸匈奴傳六十四下漢賜孝單于戲㦸十師古曰戲㦸有旗之㦸也戲許宜反又音麾清狂冒邑王傳三十三昌邑王清狂不惠蘇林曰凡狂者隂陽脉盡濁今此人不狂似狂者故言清狂也或曰色理清徐而心不慧曰清狂清狂如今曰癡也著令吳芮傳四髙祖封吳芮長沙王制詔御史長沙王忠其定著令鄧展曰漢約非劉氏不王而芮王故著令中使特王也或曰以芮至忠故著令也故贊云著于甲令而稱忠也支庶吳芮傳孝惠髙后時封吳芮庶子二人為列侯故贊云慶流支庶有以矣夫樵蘇韓信傳四樵蘇後爨師不宿飽師古曰樵取薪也蘇取草也小雅白華之詩云樵彼桑薪食采揚雄傳五十七上刑法志三揚雄其先出自有周伯僑者以支庶初食采於晉之揚因氏焉揚在河汾之間師古曰采官也以官受地謂之采地應劭曰左傳云霍揚韓魏皆姬姓也刑法志注師古曰因官食地故曰采地三輔號為卿王尊傳四十六如淳曰三輔皆秩中二千石號為卿也迹射士王尊傳校尉傅剛將迹射士千人逐捕南山羣盜師古曰迹射言能尋跡而射取之也射食亦反布鼔王尊傳王尊曰毋持布鼔過雷門師古曰雷門㑹稽城門也有大鼓越擊此鼓聲聞洛陽布鼓謂以布為鼓故無聲柱後惠文張敞傳四十六應劭曰柱後以鐵為柱今法冠是也一名惠文冠晉灼曰漢注法冠也一號柱後惠文以纚裹鐵柱卷秦制執法服今御史服之謂之獬廌一角今冠兩角以獬廌為名耳纚即今方目紗也纚山爾反卷去權反搒掠孫寳傳四十七後漢陳寵傳附師古曰搒掠謂笞擊而考問之也搒音彭陳寵曰獄者急於篣格酷烈之痛注云篣即搒也古字通用格擊也又陳萬年𫝊下獄掠治注云掠擊也力向反抱弩負籣韓延夀傳四十六如淳曰籣盛弩箭箙也師古曰鞮鞪即兜鍪也籣盛弩矢者也其形如木桶鞮丁奚反鞪莫侯反雞卜郊祀志五下立粤祠而以雞卜李竒曰持雞骨卜如鼠卜挺身逃劉屈氂傳三十六師古曰挺引也獨引身而逃難傅㑹爰盎贊十九爰盎雖不好學亦善傅㑹張晏曰因宜附著合㑹之衣褐張良傳十師古曰褐制若裘今道士所服者是禁錢賈捐之傳五十四下賈捐之曰往者暴師曽未一年費四十餘萬大司農錢盡乃以少府禁錢續之師古曰少府錢主供天子故曰禁錢浩穰張敞傳四十六長安中浩穰於三輔師古曰浩大也穰盛也言人衆之多也穰人掌反清閒之燕蔡義傳三十六蔡義上疏曰願賜清閒之燕得盡精思於前上召見說詩甚說之師古曰燕安息也閒讀曰閑扼虎命中李陵傳二十四力扼虎射命中師古曰扼謂捉持之也命中者所指名處即中之也儲偫除舎孫寳傳四十七後漢肅宗紀御史大夫張忠辟孫寳為屬欲令授子經更為除舎設儲偫師古曰除為修飾掃除也設儲偫謂豫備器物也偫丈紀反後漢書云南巡狩詔所經道一郡縣無得設儲跱注云儲積也跱具也言不預有蓄備擿觖孫寳傳傅太后怒曰帝置司𨽻使擿觖以揚我惡我當坐之師古曰擿觖謂挑發之擿他歴反觖音決以日易月文帝紀後七年文帝遺詔曰服大紅十五日小紅十四日纖七日釋服服䖍曰皆當言大功小功布也纖細布衣也應劭曰紅者中祥大祥以為領縁纖者禫也凡三十六日而釋服矣此以日易月也晉灼曰漢書例以紅為功也師古曰紅與功同服晉二說是也此喪制者文帝自率已意創而為之非有取於周禮也何為以日易月乎三年之喪其實二十七月豈有三十六月之文禫又無七月也應氏既失之於前而近代學者因循謬說未之思也檉柳胡桐白草西域傳六十六上樓蘭國出玉多葭葦檉柳胡桐白草注云孟康曰白草草之白者胡桐似桑而多曲師古曰檉柳河柳也今謂之赤檉白草似莠而細無芒其乾熟時正白色牛馬所嗜也胡桐亦似桐不𩔖桑也蟲食其樹而沫出下流者俗名為胡桐淚言似眼淚也可以汗金銀工匠用之流俗語訛呼淚為律檉丑成反臧繦食貨志四下萬室之邑必有萬鍾之臧臧繦千萬千室之邑必有千鍾之臧臧繦百萬春以奉耕夏以奉耘耒耜器械種饟糧食必有取澹焉故大賈畜家不得豪奪吾民矣孟康曰六斛四斗為鍾繦錢貫也饟與餉同謂餉田之具也都䕶督察西域傳六十六上日逐王畔單于將衆來降䕶鄯善以西使者鄭吉迎之既至漢封日逐王為歸徳侯吉為安逺侯因使吉并䕶北道故號曰都䕶都䕶之起自吉置矣都䕶督察烏孫康居諸外國師古曰都猶總也言總䕶南北之道督視也單于文帝紀匈奴傳六十四上單于者廣大之貌也言其象天單于然也師古曰單于匈奴天子之號單音蟬突門後漢竇融傳附注云突門守城之門墨子曰城百步為一突門也曰者髙帝紀師古曰日者猶往日也倒縣賈誼傳十八賈誼曰天下之埶方倒縣凡天子者天下之首何也上也蠻夷者天下之足何也下也今匈奴嫚娒侵掠至不敬也而漢嵗致金絮采繒以奉之夷狄徴令是主上之操也天子供貢是臣下之禮也足反居上首顧居下倒縣如此莫之能解猶為國有人乎碑碣後漢竇憲傳附封神丘兮建隆嵑注云神丘即燕然山也方者謂之碑圓者謂之碣嵑亦碣也其例反騅項籍傳一羽駿馬名騅師古曰蒼白雜毛曰騅蓋以其色名之贈行段㑹宗傳四十朋友以言贈行師古曰贈行謂將别相贈也焫膋蕭禮樂志二郊祀歌李竒曰膋腸間脂也蕭香蒿也師古曰以蕭焫脂合馨香也膋來彫反焫人說反柘漿禮樂志樂府歌泰尊柘漿析朝酲應劭曰柘漿取甘柘汁以為飲也酲病酒也析解也贅壻賈誼傳十八秦人家富子壯則出分家貧子壯則出贅應劭曰出作贅壻也師古曰謂之贅壻者言其不當出在妻家亦猶人身之有肬贅非應所有也贅之鋭反分扶問反隊帥爰盎傳十九如淳曰隊帥軍中小官請室賈誼傳爰盎傳賈誼曰大臣有辠白冠氂纓盤水加劒造請室而請辠耳應劭曰請罪之室蘇林曰車駕出有請室令在前先驅此官有别獄也如淳曰水性平若已有正罪君以平法治之也加劒當以自刎也或曰殺牲者以盤水取頸血故示若此也爰盎傳云人上書告絳侯反時絳侯已就國徴繫請室師古曰請室獄也兩宫王莽傳六十九上師古曰兩宫謂成帝及太后也祖有功景帝紀元年詔曰古者祖有功而宗有徳師古曰祖始也始受命也宗尊也有徳可尊天郊成帝紀建始二年應劭曰天郊在長安城南地郊在長安城北款塞宣帝紀本始二年百蠻鄉風􅍁塞來享應劭曰款叩也皆叩塞門來服從也什器平帝紀元始元年師古曰軍法五人為伍二伍為什則共其器物故通謂生生之具為什器亦猶今之從軍及作役者十人為火共畜調度也除保父母同産令元帝紀初元五年詔除光禄大夫已下至郎中保父母同産之令應劭曰舊時相保一人有過皆當坐之師古曰特為郎中已上除此令者所以優之也同産謂兄弟也給事宫司馬中元帝紀初元五年元帝詔今從官給事宫司馬中者得為大父母父母兄弟通籍應劭曰司馬中者宫内門也司馬主武兵禁之意也籍者為二尺竹牒記其年紀名字物色縣之宫門案省相應乃得入也師古曰從官親近天子常侍從者皆是也四輔谷永傳五十五師古曰四輔謂左輔右弼前疑後丞也瞽説谷永傳聽晻昧之瞽説師古曰瞽說言不中道若無目之人也晻與暗同小學杜鄴傳五十五杜鄴初從張吉學吉子竦又幼孤從鄴學問亦著於世尤長小學鄴子林清靜好古亦有雅才其正文字過於鄴竦故世言小學者由杜公師古曰小學謂文字之學也周禮八嵗入小學保氏教國子以六書故因名云藝文志載小學十家三十五篇首嵗蕭望之傳四十八師古曰首嵗嵗之初首謂正月也下走蕭望之傳應劭曰下走僕也師古曰下走者自謙言趨走之役也又司馬遷報任少卿書曰太史公牛馬走注云言已為太史公掌牛馬之僕自謙之辭也出文選望舒揚雄傳五十七望舒彌轡師古曰望舒月御也彌斂也言天子之車斂轡徐行故假望舒為言耳結轍文帝紀後二年使者冠蓋相望結轍於道韋昭曰使車往還故轍如結也膠葛楊雄傳下五十七解難云獨不見夫翠虯絳螭之將登虖天不階浮雲翼疾風虚舉而上升則不能撠膠葛騰九閎師古曰擑挶也膠葛上清之氣也九閎九天之門撠音㦸挶居足反又甘泉賦齊總總撙撙其相膠葛兮師古曰膠葛猶言膠加也獿人楊雄傳獿人亡則匠石輟斤而不敢妄斵服䖍曰獿古之善塗塈者也施廣領大袖以仰塗而領袖不汙有小飛泥誤著鼻因令匠石揮斤而斵之知石之善斵故敢使之也師古曰獿抆拭也故謂塗者為獿人獿乃髙反琴徽揚雄傳師古曰徽琴徽也所以表發撫抑之處也三宫王嘉傳五十六師古曰三宫天子太后皇后也立樂府禮樂志十武帝定郊祀之禮祠太一於甘泉祭后土於汾隂乃立樂府采詩夜誦以李延年為協律都尉多舉司馬相如等數十人造為詩賦畧論律呂以合八章之調作十九章之歌以正月上辛用事甘泉圜丘使童男女七十人俱歌昏祠至明夜常有神光如流星止集于祠壇天子自竹宫而望拜師古曰樂府之名蓋起於此韋昭曰竹宫以竹為宫也師古曰采詩夜誦者其言辭或秘不可宣露故於夜中歌誦也百賈王嘉傳師古曰賈謂販賣之人也案脉王嘉傳師古曰案脉謂切脉也厭衆意王莽傳莽欲厭衆意師古曰厭滿也一艶反雅拜何武傳五十六何武為京兆尹坐舉方正所舉者召見槃辟雅拜有司以為詭衆虛偽武坐左遷楚内史服䖍曰行禮容拜也師古曰槃辟猶槃旋也辟音闢詭違也昆雞司馬相如傳二十七上張揖曰昆雞似鶴黄白色靈鼉相如傳樹靈鼉之鼔師古曰以鼉皮為鼓釋蹻王褒傳三十四下離疏釋蹻而享膏粱應劭曰離此蔬食釋此木蹻也師古曰蹻即鞋也居畧反史記虞卿躡蹻擔簦説趙注云蹻草履也襃成君孔光傳五十一孔霸以選授太子經元帝即位徴霸以師賜爵關内侯食邑八百戸號襃成君如淳曰為帝師教令成就故曰襃成君尺二牘匈奴傳六十四上漢遺單于書以尺一牘中行說令單于以尺二寸牘及印封皆令廣長大倨驁其辭以答漢漢遣中行說使匈奴而說不欲行漢强使之說遂降匈奴不歸髙訾貨殖傳六十一丹王君房豉樊少翁王孫大卿為天下髙訾師古曰王君房賣丹樊少翁及王孫大卿賣豉亦致髙訾訾讀與資同力政游俠傳六十二五行志七中之下戰國合從連衡力政爭彊師古曰力政者棄背禮義専任威力也天子微弱諸侯力政師古曰政亦征也言専以武力相征討釂郭解傳六十二郭解姊子負解之勢與人飲使之釂非其任彊灌之人怒刺殺解姊子師古曰盡爵曰釂其人不飲而使盡爵乃强灌之故怨怒也釂子笑反内朝外朝劉輔傳四十七劉輔上書直諫收繫掖庭秘獄於是中朝左將軍辛慶忌右將軍㢘襃光禄勲師丹太中大夫谷永俱上書諫得减死罪一等孟康曰中朝内朝也大司馬左右前後將軍侍中常侍散騎諸吏為中朝丞相以下至六百石為外朝也傳漏董賢傳六十三董賢傳漏在殿下師古曰𫝊漏奏時刻也粱肉霍去病傳二十五食貨志四上師古曰粱粟𩔖也米之善者食貨志曰粱好粟也即今之粱米也特將去病傳張良傳十衛青家為特將者十五人師古曰特將謂獨别為將而出征也髙帝時魏王豹反使韓信特將北擊之師古曰特獨也専任之使將也渾殽董仲舒傳二十六賢不肖渾殽注云殽雜也渾音胡本反邊穀劉屈氂傳三十六如淳曰戍邊卒糧也車丞相車千秋傳三十六千秋本姓田氏為丞相年老上優之朝見得乗小車入宫殿因號曰車丞相譙讓髙帝紀樊噲譙讓項羽師古曰譙責也才笑反月螖日域揚雄傳五十七下長楊賦西厭月螖東震日域服䖍曰螖音窟穴之窟月螖月所生也師古曰日域日初出之處也㢘問髙帝紀五年髙帝詔曰且亷問有不如吾詔者以重論之師古曰㢘察也詔髙帝紀如淳曰詔告也自秦漢以下唯天子獨稱之梟騎髙帝紀項羽未平北貉燕人來致梟騎助漢應劭曰北貉國也梟健也張晏曰梟勇也若六博之梟也師古曰貉在東北方三韓之屬皆貉𩔖也莫客反兜離後漢董祀妻傳附言兜離兮狀窈停注云兜離匈奴言語之貌二斬後漢曹世叔妻傳附禮夫有再娶之義婦無二適之文故曰夫者天也注云儀禮曰父在為母何以朞至尊在不敢伸也父必三年而後娶達子志也夫者妻之天也婦人不二斬者猶曰不二天也比落䝉全後漢姜詩傳附姜詩至孝赤眉賊經詩里弛兵而過曰驚大孝必觸鬼神時嵗荒賊乃遺詩米肉受而埋之比落䝉其安全注云比近也落藩也楚歌髙帝紀五年漢圍項羽於垓下羽夜聞漢軍四面皆楚歌知盡得楚地應劭曰楚歌者雞鳴歌也漢已畧得其地故楚歌者多雞鳴時歌也師古曰楚歌者為楚人之歌猶言吳歈越吟耳若以雞鳴為歌曲之名於理則可不得云雞鳴時也髙祖令戚夫人楚舞自為作楚歌豈亦雞鳴時乎顧山錢平帝紀元始元年平帝詔天下女徒已論歸家顧山錢月三百如淳曰已論者罪已定也令甲女子犯罪作如徒六月顧山遣歸一說以為當於山伐木聽使入錢顧工直故謂之顧山應劭曰舊刑鬼薪取薪於山以給宗廟今使女徒出錢顧薪故曰顧山也師古曰如說近之論女徒論罪已定並放歸家不親役之但令一月出錢三百以顧人也為此恩者所以行太后之徳施惠政於婦人體貌大臣賈誼傳十八體貌大臣而厲其節也師古曰體貌謂加禮容而敬之也官師賈誼傳官師小吏師古曰官師一官之長也粟紅腐賈􅂢之傳三十四下太倉之粟紅腐而不可食師古曰粟乆腐壊則色紅赤也上東門賈誼傳雒陽上東門師古曰東面最北門曰上東門跡前事賈誼傳臣竊跡前事師古曰尋前事之蹤跡也無狀子杜欽傳三十紅陽侯與杜業書曰誠哀老姊垂白隨無狀子出關師古曰無狀猶言不肖也排擠杜欽傳排擠英俊師古曰擠墜也橐佗匈奴傳六十四上師古曰橐佗言能負橐囊而䭾物也刑名元帝紀宣帝所用多文法吏以刑名繩下師古曰劉向别録云申子學號刑名刑名者以名責實尊君卑臣崇上抑下宣帝好觀其君臣篇繩謂彈治之耳戚里萬石君傳十六師古曰於上有姻戚者皆居之故名其里為戚里廷見萬石君傳石建奏事於上前即有可言屏人乃言極切至廷見如不能言者師古曰廷見謂當朝而見時議格文三王傳十七大臣及爰盎等有所關說於帝太后議格蘇林曰音閤張晏曰止也魁岸江充傳十五為人魁岸師古曰魁大也岸者有㢘稜如崖岸之形微諫伍被傳十五師古曰私諫之也假吏蘇武傳二十四蘇武使匈奴有假吏常惠等師古曰假吏猶言兼吏也時權為使之吏若今差人充使典矣宦吏外戚傳六十七下師古曰宦吏謂奄人也循江上西南夷傳六十五將兵循江上師古曰循順也謂縁江而上也兩漢博聞卷六
