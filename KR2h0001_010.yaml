body:
  text: 兩漢博聞卷十宋楊侃輯金馬碧雞西南夷傳七十六前漢王褒傳三十四越舊郡青蛉縣禺同山有碧雞金馬光景時時出見注云禺同山在今褒州揚波縣王褒碧雞頌曰持節使王褒謹拜南崖敬移金精神馬縹碧之雞處南之荒深溪回谷非土之鄉歸來歸來漢德無疆亷平唐虞澤配三皇華陽國志曰碧雞光景人多見之前書音義曰金形似馬碧形似雞也方士言益州有金馬碧雞之寶可祭祀致也宣帝使褒往祀焉褒於道病死火毳西南夷傳注云火毳即火浣布也神異經曰南方有火山長四十里廣四五里生不燼之木晝夜火燃得烈風不猛暴雨不滅火中有鼠重百斤毛長二尺餘細如絲常居火中時時出外而色白以水逐沃之即死績其毛織以作布用之若汙以火燒之則清潔也傅子曰長老說漢桓時梁冀作火浣布單衣㑹賔客行酒公卿朝臣前佯爭酒失杯而沃之冀僞怒解衣燒之布得火燁然而熾如燒凡布垢盡火滅粲然潔白如水浣也虎魄枕西南夷傳注云廣雅曰虎魄生地中其上及旁不生草深者八九尺大如斛削去皮成虎魄如斗初時如桃膠凝堅乃成其方人以為枕出罽賔及大秦國博物志曰松脂淪入地千年化為茯苓茯苓千嵗化為虎魄今太山有茯苓而無虎魄永昌有虎魄而無茯苓按今本西南夷傳但有虎魄二字無枕字注中亦無其方人以為枕出罽賔國及大秦國十三字猩猩西南夷傳注云酈元水經注曰猩猩形若狗而人面頭顔端正善與人言音聲妙麗如婦人對語聞之無不酸楚南中志曰猩猩在山谷中行無常路百數為羣土人以酒若糟設於路又喜屩子土人織草為屩數十量相連結猩猩在山谷見酒及屩知其設張者即知張者祖先名字乃呼其名而罵云奴欲張我捨之而去去而又還相呼試共嘗酒初嘗少許又取屩子著之若進兩三升便大醉人出收之屩子相連不得去執還內牢中人欲取者到牢邊語云猩猩汝可自相推肥者出之既擇肥竟相對而泣即左思賦云猩猩啼而就禽者也昔有人以猩猩餉封溪令令問餉何物猩猩自於籠中曰但有酒及僕耳無他飲食鉤黨史弼傳五十四注云鉤謂相連也又靈帝紀注鉤謂相牽引也河潼傳贊五十五注云潼谷名谷有水曰潼水即潼關貊獸西南夷傳注云南中八郡志曰貊大如驢狀頗似熊多力食鐵所觸無不拉廣志曰貊色蒼白其皮溫暖蚌珠西南夷傳注云徐衷南方草物狀曰凡採珠常三月用五牲祈禱若祠祭有失則風攪海水或有大魚在蚌左右蚌珠長三寸半凡二品珠也桄榔麵西南夷傳牂牁句町縣有桄榔木可以為麵百姓資之牂牁即夜郎也楚頃襄王遣將莊豪滅夜郎改其名為牂牁注云臨海異物志曰桄榔木外皮有毛似栟櫚而散生其木剛作鋘鋤利如鐵中石更利唯中蕉根乃致敗耳皮中有似搗稻米片又似麥麵中作餅餌廣志曰桄榔樹大四五圍長五六丈洪直旁無枝條其顛生葉不過數十似棕葉破其木肌堅難傷入數寸得麵赤黃密緻可食徽纆西羌論七十七女婦則徽纆而為虜注云徽糾繩也纆索也都亭王美人傳十下王美人兄斌遷執金吾封都亭侯注云凡言都亭者並城內亭也漢法大縣侯位視三公小縣侯位視上卿鄉亭侯位視中二千石長秋宫明德馬皇后傳十上永平三年春有司奏立長秋宫注云皇后所居宫也長者久也秋者萬物成熟之初也故以名焉請立皇后不敢指言故以宫稱之葱嶺西域傳論七十八注云葱嶺山名也西河舊事云其山髙大生葱故名天竺記云葱嶺冬夏有雪有毒龍若犯之則風雨晦冥飛砂揚礫過此者萬無一全雪山班超傳三十七明帝永平十六年十七年注云西河舊事曰白山之中有好木又郭義恭廣志曰西域有白山通嵗有雪亦名雪山注云冬夏有雪故曰白山胸奴謂之天山過之皆下馬拜去蒲類海百里竇固破呼衍王於天山注云呼衍胸奴王號天山即祈連山一名雪山今名折羅漢山在伊州北祁音時龍沙班超傳前漢胸奴傳六十四下安定慷慨專功西遐坦步葱雪咫尺龍沙注云白龍堆沙漠也前漢胸奴傳注孟康曰白龍堆形如土龍身無頭有尾髙大者二三丈埤者丈餘皆東北向相似也在西域中堊墍大秦國傳七十八列置郵亭皆堊墍之注云墍飾也火既反郭璞曰堊白土也音惡原羊鮮卑傳八十鮮卑出原羊注云郭璞注爾雅曰原羊似吳羊而大角出西方三臺袁紹傳六十四上注云漢官尚書為中臺御史為憲臺謁者為外臺渾儀顯宗紀永平三年登靈臺見史官正儀度注云儀謂渾儀以銅為之置於靈臺王者正天文之器也度謂日月星辰之行度也史官即太史掌天文之官也螟蜮顯宗紀永平三年詔曰去其螟蜮以及蟊賊注云爾雅曰食苖心曰螟食根曰蟊蜮一名短狐今之水弩含沙射人為災也伏臘顯宗紀永平十二年注云史記曰秦德公始為伏祠厯忌曰伏者何也金氣伏藏之日也四氣代謝皆以相生至于立秋以金代火金畏於火故庚日必伏月令孟冬之月臘先祖說文云臘冬至後祭百神始皇更臘曰嘉平祖臘陳寵傳三十六陳咸父子閉門不出入猶用漢家祖臘注云應劭風俗通曰共工之子好逺遊死為祖神漢家火行盛於午故以午日為祖也臘者嵗終祭衆神之名臘接也新故交接故大祭以報功也漢火行衰於戍故臘用戌日也塤箎顯宗紀永平十年注云燒土為之大如鴈子鄭衆曰塤有六孔世本曰暴辛公作箎以竹為之長尺四寸有八孔冒耐肅宗紀元和二年注云字書曰耐多須貌音而言須鬢多䝉冒其面或曰西域人多著冒而長故舉以為言也宰士飛禍周榮傳三十五注云榮辟司徒府故稱宰士飛禍言倉卒而死也告諡顯宗紀二太尉趙喜告諡南郊注云風俗通曰禮臣子無爵諡君父之義也故羣臣纍其功美葬日遣太尉於南郊告天而諡之復土顯宗紀注云言下棺訖復以土為墳故言復土邸第甲第安帝紀五注云邸屬國之舍也第謂甲乙之次第機衡郎顗傳二十下尚書職在機衡注云北斗魁星第三為機第五為衡於天文為喉舌追北臧宫傳八乘勝追北注云人好陽而惡隂北方幽隂之地故軍敗者謂之北史記樂書曰北者敗也而近代音北為背失其㫖矣赤地臧宫傳旱蝗赤地注云赤地言在地之物皆盡說苑曰晉平公時赤地千里盤匙隗囂傳三隗囂初起兵設盟祝畢有司穿坎于庭牽馬操刀奉盤錯匙遂割牲而盟注云前書胸奴傳云漢遣韓昌等與單于及大臣俱登諾水東山刑白馬單于以徑路刀金留犁撓酒應劭曰徑路胸奴寶刀也留犁飯匕也撓攪也以匕攪血而㰱之今亦奉盤錯匙而㰱也以此而言匙即匙字錯置也七故反其盟云匙不濡血㰱不入口是欺神明也秭歸和帝紀永元十二年秭歸山崩注云秭歸縣屬南郡古之夔國今歸州也袁嵩曰屈原此縣人既被流放忽然暫歸其姊亦來因名其地為秭歸秭亦姊也輜軿齊王縯傳四注云輜軿有擁蔽之車也列女傳曰齊孝公華孟姬謂公曰妾聞妃后踰閾必乘安車輜軿說文曰軿車衣車也周禮注云軿猶屏也取其自蔽隱鹿門龎公傳七十三龎公攜妻子登鹿門山因採藥不反注云襄陽記曰建武中襄陽侯習郁立神祠於山刻二石鹿夾神道口俗因謂之鹿門廟遂名山也果下馬東夷傳七十五濊出果下馬使來獻之注云髙三尺乘之可於果樹下行縞素順帝紀永建三年注云縞皓也繒之精白者曰縞師子封牛順帝紀陽嘉二年疏勒國獻師子封牛注云疏勒王遣使詣闕師子似虎正黃有髯耐尾端茸毛大如斗封牛其領上肉隆起者若封然因以名之即今之峯牛鴻都門學生靈帝紀光和元年始置鴻都門學生注云鴻都門名也於內置學時其中諸生皆勑州郡三公舉召能為尺牘詞賦及工書鳥篆者相課試至千人焉賣官靈帝紀光和元年初開西邸賣官自關內侯虎賁羽林入錢各有差又私令左右賣公卿公千萬卿五百萬注云山陽公載記曰時賣官二千石二千萬四百石四百萬其以德次應選者半之或三分之一於西園立庫以貯之天祿渴烏靈帝紀中平三年上張讓傳六十八漢西域傳六十六前靈帝修玊堂殿鑄銅人四黃鍾四及天祿蝦蟆注云黃鍾其音中黃鍾也子為黃鍾天祿獸也案今鄧州南陽縣北有宗資碑旁有兩石獸鐫其膊一曰天祿一曰辟邪據此天祿辟邪並獸名時漢有天祿閣亦因獸而立名使掖庭令畢嵐鑄銅人四列於蒼龍𤣥武闕外鍾縣於玊堂及雲臺殿前天祿蝦蟆吐水於平門外橋東轉水入宫又作翻車渴烏施於橋西用灑南北郊路注云翻車設機車以引水渴烏為曲筒以氣引水上也前漢西域傳烏弋國有桃拔師子犀牛孟康曰桃拔一名符拔似鹿長尾一角者或為天鹿兩角者或為辟邪拔步葛反紹介符融傳五十八注云古人相見必因紹介介因也言因此人以相接見也六韜何進傳五十九注云太公六韜篇第一霸典文論第二文師武論第三龍韜主將第四虎韜偏裨第五豹韜校尉第六犬韜司馬龍韜云武王曰吾欲令三軍之衆親其將如父母聞金聲而怒聞鼓音而喜為之奈何䝉衝船禰衡傳七十下黃祖在䝉衝船上大㑹賔客注云釋名曰外狹而長曰䝉衝以衝突敵船推步馮鯤傳二十八馮鯤善推步之術注云推步謂究日月五星之度昏旦節氣之差霄仲長統傳三十九注云霄摩天赤氣也沆瀣仲長統傳沆瀣當餐九陽代燭注云沆瀣者北方夜半氣也九陽謂日也山海經曰陽谷上有扶木九日居下枝一日居上枝也鷇飲仲長統傳論世非胥庭人乖鷇飲注云赫胥氏大庭氏並古之帝號莊子曰夫聖人鶉居而鷇飲言鶉鳥無常居鷇飲不假物並淳朴時也廬落院落仇覽傳六十六仇覽過邑人陳元之舍曰廬落整頓耕耘以時此非惡人教化未至耳注云落居也案今人謂院為落也熊經鴟顧華他傳七十二下注云熊經若熊之攀枝自懸也鴟顧身不動而回顧也莊子曰吐故納新熊經鳥申導引養形之人也餌胡麻乘白鹿方術傳七十二注云漢武內傳曰魯女生初餌胡麻及木絶榖八十餘年日少壯色如桃花道成一旦與故人別云入華山去後五十年先相識者逢女生華山廟前乘白鹿從玊女三十人并令謝其鄉里親故也青牛道士甘始傳注云漢武內傳曰封君達初服黃連五十餘年入鳥舉山服水銀百餘年還鄉里如二十者常乘青牛故號青牛道士風問髙彪傳七十下髙彪與馬融書曰承服風問從來有年注云風問風猷令問也鵠髮承宫傳贊十七注云鵠髮白髮也明府張湛傳十七張湛為左馮翊主簿進曰明府位尊德重注云郡守所居曰府明府者尊髙之稱韓延壽為東郡太守門卒謂之明府亦其義也墝埆丁鴻傳二十七昔孫叔敖勑其子受封必求墝埆之地注云孫叔敖楚相也墝埆瘠薄之地叔敖將死戒其子曰王封汝必無居利地也楚越之間有寢丘者甚惡可長有以食也墝苦交反埆苦角反金沙光珠西南夷傳七十六注云華陽國志曰蘭滄水有金沙洗取融為金有光珠穴博物志曰光珠即江珠也六丁梁節王傳四十梁節王暢數有惡夢從官卞忌自言能使六丁善占夢注云六丁謂六甲中丁神也若甲子旬中則丁卯為神甲寅旬中則丁巳為神之類也役使之法先齊戒然後其神至可使致逺方物及知吉凶也玊搔頭李固傳五十三注云西京雜記曰武帝遇李夫人就取玊簪搔頭自此宫人搔頭皆用玉牛黃延篤傳五十四注云吳普本草曰牛黃味苦無毒牛出入呻者有之夜有光走角中牛死入膽中如雞子黃神農本草曰療驚癎除邪逐鬼五嶺吳祐傳五十四注云嶺者西自衡山之南東至于海一山之限耳別標名則有五焉裴氏廣川記云大庾始安臨賀桂陽揭陽是為五嶺鄧德明南康記曰大庾一也桂陽甲騎二也九真都龎三也臨賀萌渚四也始安越城五也裴氏之說則為審矣壽藏趙岐傳五十四趙岐先自為壽藏注云壽藏謂塜壙也稱壽者取其久逺之意也猶如壽宫壽器之類金𧖟永嘉末發齊桓公墓得水銀池金𧖟數十箔五溪馬援傳十四注云酈元注水經云武陵有五溪謂雄溪樠溪酉溪潕溪辰溪悉是蠻夷所居故謂五溪蠻皆槃瓠子孫也土俗雄作熊樠作朗潕作武在今辰州界投劾周燮等傳序四十三太原閔仲叔世稱節士建武中應司徒侯霸之辟既至霸不及政事徒勞苦而已仲叔恨曰以仲叔為不足問耶不當辟也辟而不問是失人也遂辭出投劾而去注云案罪曰劾自投其劾狀而去也投猶下也今有投辭投牒之言精廬姜肱傳四十三姜肱與弟季江謁郡夜於道遇盜欲殺之肱兄弟更相爭死賊遂兩釋焉但掠奪衣資而已既至郡中終不言盜盜聞而感悔後乃就精廬求見徵君謝罪注云諸公嘗爭加辟命肱皆不就故曰徵君精廬即精舍也水排杜詩傳二十一杜詩為南陽太守造作水排鑄為農器百姓便之注云排蒲拜反冶鑄者為排以吹炭令激水以鼓之排當作㰆古字通用也捲握張堪傳二十一捲握之物足富十世注云捲握猶掌握謂珠玊之類鳬藻杜詩傳二十一士卒鳬藻注云言其和睦歡悅如鳬之戲於水藻方舟班固傳三十上方舟並騖注云方舟並兩舟也雨師風伯班固傳三十下東都賦雨師泛灑風伯清塵注云雨師畢星也風伯箕星也龍門李膺傳五十七注云三秦記曰河津一名龍門水險不通魚鱉之屬莫能上江海大魚薄集龍門下數千不得上上則為龍也巫覡之言張衡傳四十九注云前書曰齊肅聰明者神或降之在男曰覡在女曰巫覡胡歷反銀臺張衡傳聘王母於銀臺注云銀臺仙人所居也曽城張衡傳張衡賦云登閬風之曽城兮注云閬風山名在崑崙山上淮南子曰崑崙山有曽城九重髙萬一千里尺牘蔡雍傳五十下注云說文曰牘書板也長一尺獄犴填滿崔駰傳四十二注云犴音岸前書音義曰鄉亭之獄曰犴容車祭遵傳十祭遵薨贈以將軍侯印綬朱輪容車介士軍陳送葬注云容車容飾之車象生時也交河耿恭傳九發兵擊車師攻交河城注曰前書曰車師前王居交河城河水分流繞城下故號交河去長安八千一百五十里故城在今西州交河縣也翡翠班固傳三十上注云異物志曰翠鳥形似燕赤而雄曰翡青而雌曰翠其羽可以為飾丙穴公孫述傳三蜀有魚鹽之利注云丙穴出嘉魚在漢中三泉袁紹傳六十四上無令愚臣結恨三泉注云三者數之小終言深也前書曰下錮三泉折角巾郭太傳五十八郭太身長八尺褒衣博帶嘗於陳梁間行遇雨巾一角墊時人乃故折巾一角以為林宗巾其見慕皆如此注云墊丁念反巾以葛為之形如幍口洽反本居士野人所服魏武造幍其巾乃廢今國子學生服焉以白紗為之邊幅公孫述傳論三馬援傳十四公孫述不能因隙立功以㑹時變方乃坐飾邊幅以髙深自安注云邊幅猶有邊緣以自矜持修飾邊幅注云若布帛修整其邊幅也左傳曰如布帛之有幅焉為之度使無遷蔡侯紙蔡倫傳六十八自古書契多編以竹簡其用縑帛者謂之紙縑貴而簡重並不便於人尚方令蔡倫乃造意用樹膚麻頭及敝布魚網以為紙奏上之帝善其能故天下咸稱蔡侯紙注云湘州記曰耒陽縣北有漢黃門蔡倫宅宅西有石臼云是倫舂紙臼也突騎光武紀更始二年耿況彭寵各遣其將吳漢冦恂等將突騎來助擊王郎注云突騎言能衝突軍陳三輔光武紀更始元年前漢百官表七上注云謂京兆左馮翊右扶風共在長安中分領諸縣前書百官表曰內史周官秦因之掌治京師景帝二年分置左內史右內史武帝太初元年更名京兆尹左內史更名左馮翊又更名主爵都尉為右扶風治內史右地與左馮翊京兆尹是為三輔服䖍云皆治在長安城中門下掾公孫述傳三公孫述補清水長時父仁為河南都尉以述年少遣門下掾隨之官注云州郡有掾皆自辟除之常居門下故以為號錚錚劉盆子傳一樊崇將劉盆子及丞相徐宣已下三十餘人肉袒降光武光武謂徐宣樊崇等曰卿所謂鐵中錚錚傭中佼佼者也注云說文曰錚錚金也鐵之錚錚言微有剛利也錚初耕反佼古巧反佼好貌也佼佼者凡庸之人稍為勝也爛羊頭劉𤣥傳一更始起兵稱天子其所授官爵者皆羣小賈豎或有膳夫庖人長安為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯注云公羊傳曰炊烹為養緑林劉𤣥傳王莽末南方饑饉人庶羣入野澤掘鳬茈而食之更相侵奪新市人王匡王鳳為平理諍訟遂推為渠帥於是諸亡命馬武王常成丹等往從之藏於緑林中數月間至七八千人後至五萬人州郡不能制於是劉聖公光武皆起兵焉注云緑林山在今荆州當陽縣東北黃巾皇甫嵩六十一巨鹿張角自稱大賢良師奉事黃老道畜養弟子符水呪說以療病病者頗愈百姓信向之角因遣弟子八人使於四方教化天下轉相誑惑十餘年間徒衆數十萬置三十六方方猶將軍號也大方萬餘人小方六七千各立渠帥訛言蒼天已死黃天當立弟子唐周上書告之靈帝使案驗宫省直衛及百姓有事角道者誅殺千餘人角等知事已露晨夜馳敕諸方一時俱起皆著黃巾為標幟時人謂之黃巾亦名蛾賊殺人以祠天角稱天公將軍天下響應帝乃發天下精兵以皇甫嵩為左中郎將朱雋為中郎將各統一軍討平之注云蛾魚綺反即蟻字也喻賊衆多故以為名赤眉劉盆子傳一琅邪人樊崇起兵於莒一嵗間至萬餘人時青徐大饑冦賊蜂起羣盜以崇勇猛皆附之王莽遣廉丹王匡擊之崇等欲戰恐其衆與莽兵亂乃皆朱其眉以相識別由是號曰赤眉赤眉遂大破丹匡軍更始都洛陽遣使降崇崇等聞漢室復興即留其兵自將渠帥二十餘人隨使者至洛陽更始皆封為列侯復亡歸其營分兵為二部攻拔城邑衆遂大集立劉盆子為帝其後奉傳國璽降光武錢塘朱雋傳六十一注云錢塘今杭州縣也錢塘記云昔郡議曹華信義立此塘以防海水始開募有能致土石一斛與錢一千旬日之間來者雲集塘未成而譎不復取皆遂棄土石而去塘以之成也華陽國志益州古梁州之域尚書曰華陽黑水惟梁州孔安國注曰北拒華山之陽南拒黑水故常璩敘蜀事而謂之華陽國志黑水出張掖雞山南流至燉煌過三危山又南流而入南海蟬蛻仲長統傳三十九仲長統詩曰飛鳥遺跡蟬蛻亡殼騰蛇棄鱗神龍喪角注云王充論衡曰蠐螬化為復育復育轉為蟬蟬之去復育龜之解甲蛇之脫皮可謂尸解矣爾雅曰騰蛇有鱗廣雅曰有角曰龍喪角解角也日祀間祀肅宗紀三肅宗即位有司奏言孝明皇帝自稱不德無起寢廟掃地而祭除日祀之法省送終之禮遂藏主於光烈皇后更衣別室臣愚以為更衣在中門之外處所殊別宜尊廟曰顯宗其四時禘祫於光武之堂間祀悉還更衣注云春秋外傳曰日祭月祀時享祖禰則日祭髙曽則月祀三祧則時享今此除日祀之法從時月之祭續漢書曰五年再殷祭三年一祫五年一禘父為昭南向子為穆北向禘以夏四月祫以冬十月禘之為言諦也諦審昭穆尊卑之義祫者合也冬十月五榖成故骨肉合飲食於祖廟謂之殷祭四時正祭外有五月嘗麥三伏立秋嘗粢盛酎十月嘗稻等謂之間祀即各于更衣之殿更衣者非正處也園中有寢有便殿寢者陵上正殿便殿寢側之別殿即更衣也騎奴京師貴戚奢過王制其嫁娶騎奴侍童夾轂並引矢石堅鐔傳十二注云石謂發石以投人也墨子曰備城者積石百枚重十鈞以上者金行之氣西羌傳西羌人性堅剛勇猛得西方金行之氣焉注云黃帝素問曰西方者金玉之域其人山居而多風水土剛强鈐決之符方術傳序七十二上注云兵法有玊鈐篇及𤣥女六韜要決太公對武王曰主將有隂符有大勝得敵之符符長一尺有破軍擒敵之符符長九寸之類胎息氣王真傳七十二下注云漢武內傳曰王真字叔經上黨人習閉氣而吞之名曰胎息習嗽舌下泉咽之名曰胎食真行之斷榖二百餘日肉色光美力並數人抱朴子曰胎息者能以鼻口噓吸如在胎之中嗽音朔鰒魚伏隆傳十六張步據青徐遣使獻鰒魚注云郭璞注三蒼云鰒似蛤偏著石廣志曰鰒無鱗有殼一面附石細孔雜雜或七或九本草云石決明一名鰒魚步角反黃鉞馮勤傳十六注云鉞斧也以黃金飾之所以戮人方底囊隱害廣陵思王傳三十二后傳前漢孝成趙皇廣陵思王荆性刻急隱害光武崩大行在前殿荆哭不哀而作飛書封以方底令蒼頭詐稱東海王彊舅郭況書與彊彊得書惶怖即執其使封書上之注云隱害謂隂害於人也方底囊所以盛書也前書外戚傳中黃門田客持詔記盛緑綈方底師古曰綈厚繒也緑其色方底盛書囊若今之算幐耳銀璫朱穆傳三十三案漢故事中常侍參選士人建武以後乃悉用宦者自延平以來浸溢貴盛假貂璫之飾處常伯之任天朝政事一更其手注云璫以金為之當冠前附以金蟬也漢官儀曰中常侍秦官也漢興或用士人銀璫左貂光武以後專任宦者右貂金璫常伯侍中也黥首繫趾朱穆傳注云黥首謂鑿額涅墨也繫趾謂􅎂其足也以鐵著足曰􅎂五時衣東平憲王蒼傳三十二帝饗衛士於南宫因從皇太后周行掖庭池閣乃閲隂太后舊時器服愴然動容乃命留五時衣各一襲餘悉分布諸王主及子孫在京師者注云五時衣謂春青夏朱季夏黃秋白冬黑也黨錮黨錮傳序五十七桓靈之間國命委于閽寺士子羞與為伍故匹夫抗憤處士橫議遂乃激揚名聲互相題拂品核公卿裁量執政初桓帝受學於甘陵周福及即帝位擢福為尚書時同郡河南尹房植有名當朝鄉人為之謠曰天下規矩房伯武因師獲印周仲進二家賓客互相譏揣由是甘陵有南北部黨人之議自此始矣後汝南太守宗資任功曹范滂南陽太守成瑨亦委功曹岑晊二郡又為謡曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝𢎞農成瑨但坐嘯因此流言轉入太學諸生三萬餘人郭林宗賈偉節為其冠並與李膺陳蕃王暢更相褒重學中語曰天下模楷李元禮不畏强禦陳仲舉天下俊秀王叔茂河內張成善說風角推占當赦遂教子殺人李膺為河南尹督促收捕既而逢宥獲免膺竟按殺之成弟子牢修因上書誣告膺等養太學遊士交結諸郡生徒共為部黨誹訕朝廷於是天子震怒班下郡國逮捕黨人遂收執膺等其辭所連及陳實之徒二百餘人或有逃遁皆懸金構募使者四出相望於道明年竇武等並表請帝意稍解乃皆赦歸田里禁錮終身而黨人之名猶書王府自是正直廢放邪枉熾結海內希風之流遂共相標榜指天下名士為之稱號有三君八俊八顧八及八厨之號張儉鄉人朱並承望中常侍侯覽意㫖上書告儉與同鄉二十四人別相署號共為部黨圖危社稷而儉為之魁大長秋曹節因此諷有司奏捕前黨收司空虞放少府李膺太尉掾范滂等百餘人皆死獄中自此諸為怨隙者因相陷害又州郡承㫖或有未嘗交關亦離禍毒其死徙者廢禁者六七百人及黃巾賊起乃大赦黨人皆歸故郡凡黨事始自甘陵汝南成於李膺張儉海內塗炭二十餘年諸所蔓衍皆天下善士注云標榜猶相稱揚也榜與榜同風為號令張奐傳五十五蔡雍傳五十下又注建寧二年大風雨雹霹靂拔樹詔百寮言災應張奐曰風為號令動物通氣順至為休徵逆來為殃咎注云凡風者天之號令所以譴告人君者也明衣范冉傳七十一注云禮送死者衣曰明衣器曰明器鄭𤣥注云明者神明之也此言明堂亦神明之堂謂壙中也扛費長房傳七十二下壺公樓下有少酒長房使十人扛之猶不舉注云說文曰兩人對舉為扛音江五經博士一家之學章帝紀建初四年詔建立五經為置博士其後學者精進雖曰承師亦別名家宣帝遂立大小夏侯尚書後立京氏易至建武中復置顔氏嚴氏春秋大小戴禮博士注云言雖承一師之業其後觸類而長更為章句則別為一家之學矣大小夏侯謂夏侯勝勝從兄子建也京氏京房也嚴氏謂嚴彭祖顔氏謂顔安樂也大小戴戴德戴聖也白虎觀石渠肅宗紀建初四年五前漢施讐傳五十八前漢儒林傳十八肅宗詔下太常將大夫博士議郎郎官及諸生諸儒㑹白虎觀講議五經同異使五官中郎將魏應承制問侍中淳于恭奏帝親稱制臨決如孝宣甘露石渠故事作白虎議奏注云白虎議奏今白虎通也前書甘露三年詔諸儒講五經同異蕭望之等平奏其議上親稱制臨決焉乃立梁丘易小大夏侯尚書榖梁春秋博士施讎為博士甘露中與五經諸儒雜論同異於石渠閣師古曰三輔故事云石渠閣在未央殿北以藏祕書也前漢儒林傳贊云自武帝立五經博士開弟子貟設科射䇿勸以官祿百有餘年傳業者寖盛一經說至百餘萬言大師衆至千餘人蓋祿利之路然初書唯有歐陽禮后易楊春秋公羊而已至孝宣元帝時又廣諸家矣平帝時又立左氏春秋毛詩逸禮古文尚書墓祭顯宗紀永平元年春正月帝率公卿已下朝於原陵如元㑹儀注云漢官儀曰古不墓祭秦始皇起寢於墓側漢因而不改諸陵寢皆以晦望二十四氣三伏社臘及四時上飯其親陵所宫人隨鼓漏理被枕具盥水陳莊具天子以正月上原陵公卿百官及諸侯王郡國計吏皆當軒下占其郡國榖價四方改易欲先帝魂魄聞之也專門儒林傳贊六十九下質帝紀儒林𫝊云塗分流別專門並興注云說經者各自是其一家本初元年令郡國舉明經各令隨家法注云儒生為詩者謂之詩家禮者謂之禮家故言各隨家法也兩漢博聞卷十
