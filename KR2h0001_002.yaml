body:
  text: 兩漢博聞卷二宋楊侃輯黃屋左纛髙帝紀三年紀信乘王車黃屋左纛李斐曰天子車以黃繒為蓋裏纛毛羽幢也在乘輿車衡左方上注之蔡雍曰以犛牛尾為之如斗或在騑頭或在衡師古曰纛音毒又徒到反關用𫝊文帝紀十二年張晏曰𫝊信也若今過所也如淳曰兩行書繒帛分持其一出入關合之乃得過謂之𫝊也師古曰古者或用棨或用繒帛棨者刻木為合符也𫝊音張戀反棨音啓巖廊董仲舒𫝊二十六虞舜之時游於巖廊之上垂拱無為而天下太平晉灼曰堂邊廡巖廊謂嚴峻之廊也矯僞賈誼𫝊十八誼上文帝疏曰矯僞者出幾十萬石粟賦六百餘萬錢乘𫝊而行郡國師古曰詐為文書以出倉粟近十萬石又詐為詔令妄作賦斂甚多又詐乘𫝊而行郡國詔板後漢竇武傳五十九曹節召尚書官屬脅以白刃使作詔板拜王甫為黃門令持節收尹勳山氷氷疑不受詔甫格殺之遂害勳腐刑景帝紀四年如淳曰腐宫刑也丈夫割勢不能復生子如腐木不生實銅竹符文帝紀二年初與郡守為銅虎符竹使符應劭曰銅虎符苐一至苐五國家當發兵遣使者至郡合符符合乃聽受之竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之圭璋從簡易也師古曰與郡守為符者謂各分其半右留京師左以與之使音所吏反質疑陳遵𫝊六十二張竦免官歸長安好事者從之質疑問事論道經書師古曰質正也緣飾儒術公孫𢎞傳二十八公孫𢎞每朝㑹議開陳其端使人主自擇不肯面折庭爭於是上察其行慎厚辨論有餘習文法吏事緣飾以儒術師古曰緣飾者譬之於衣加純緣者媒糵李陵傳二十四李陵敗羣臣皆罪陵上問司馬遷盛言陵有國士之風今舉事一不幸全軀保妻子之臣隨而媒糵其短孟康曰媒酒教糵麴也謂釀成其罪也師古曰齊人名麴餅曰媒又司馬遷𫝊注媒如媒娉之媒糵如麴糵之糵亭長髙帝紀師古曰秦法十里一亭亭長者主亭之吏也亭謂停留行旅宿食之館甄鈞董仲舒𫝊二十六鄒陽𫝊二十一仲舒云猶泥之在鈞唯甄者之所為金之在鎔唯冶者之所鑄師古曰甄作瓦之人也鈞造瓦之法其中旋轉者鄒陽曰聖王制世御俗獨化於陶鈞之上張晏曰陶家名模下圓轉者為鈞蓋取其周回調鈞耳言聖王制御天下亦猶陶人轉鈞戲下灌夫𫝊二十二灌夫曰願取吳王若將軍頭以報父仇於是募軍中壯士願從數十人及出壁門莫敢前獨兩人及從奴十餘騎馳入吳軍至戲下以此名聞天下師古曰戲大將之旗也讀與麾同又音許宜反又項籍𫝊注曰漢書通以戲為旌麾及指麾字稱制髙后紀髙后臨朝稱制師古曰天子之言一曰制書二曰詔書制書者謂為制度之命也叢臺髙后紀趙王宫叢臺災師古曰連聚非一故名叢臺六國時趙王故臺也邸舍文帝紀代王至邸師古曰郡國朝宿之舍在京師者率名邸邸至也言所歸至也謗木文帝紀二年詔誹謗之木服䖍曰堯作之橋梁交午柱頭也應劭曰橋梁邊板所以書政治之愆失也至秦去之今乃復施也芝房武帝紀元封二年詔曰甘泉宫內中産芝九莖連葉上帝博臨不異下房賜朕𢎞休如淳曰瑞應圖王者敬事耆老不失舊故則芝草生師古曰內中謂後庭之室也故云不異下房言天廣臨不以下房為幽側而隔異之賜以此芝是大美也故作芝房之歌龍淵宫淬劒武帝紀元光三年河水決濮陽泛郡十六發卒十萬救決河起龍淵宫服䖍曰宫在長安西作銅飛龍故以冠名也孟康曰在西平界其水可用淬刀劒特堅利古龍淵之劒取於此水程量東方朔𫝊三十五武帝既招英俊程其器能用之如不及師古曰程謂量計之也疾置劉屈氂𫝊三十六江充發兵入丞相府是時上避暑甘泉宫丞相長史乘疾置以聞師古曰置謂所置驛也伐閲車千秋𫝊三十六車千秋無他材能術學又無伐閲功勞師古曰伐積功也閲經厯也椒房千秋𫝊師古曰椒房殿名皇后所居以椒和泥塗壁取其溫而芳也山郎楊惲傳三十六楊惲為中郎將故事令郎出錢市財用給文書乃得出名曰山郎張晏曰山財用之所出故取名焉槀街陳湯𫝊四十甘延夀陳湯上疏曰斬郅支首及名王以下宜縣頭槀街蠻夷邸間師古曰槀街街名蠻夷邸在此街也邸若令鴻臚客館也橫草之功終軍傳三十四軍自請曰軍無橫草之功得列宿衛師古曰言行草中使草偃臥故云橫草也鸞旗賈捐之𫝊三十四鸞旗在前屬車在後師古曰鸞旗編以羽毛列繫幢旁載於車上大駕出則陳於道而先行屬車相連屬而陳於後也空拳李陵𫝊二十四李陵轉鬬千里矢盡道窮士張空拳文頴曰拳弓弩拳也師古曰拳字與絭同音去權反又司馬遷𫝊張空弮注李奇曰弮弩弓也師古曰讀者乃以拳掔之拳大謬拳則屈指不當言張陵時矢盡故張弩之空弓非是手拳也臨遣元帝紀初元元年詔曰朕憂蒸庶之失業臨遣光祿大夫褒等十二人循行天下應劭曰自臨面約勑乃遣之籍甚陸賈𫝊十三陸賈為陳平畫計與太尉絳侯深相結吕氏謀益壞陳平乃以奴婢百人車馬五十乘錢五百萬遺賈為食飲費賈以此遊漢廷公卿間名聲籍甚孟康曰言狼籍甚盛長榆塞伍被傳十五伍被諫淮南王曰今漢廣長榆開朔方胸奴折傷雖未及古太平時然猶為治如淳曰廣謂斥大之也長榆塞名王恢所謂樹榆以為塞者也師古曰長榆在朔方即衛青𫝊所云榆溪舊塞是也或謂之榆中警䟆梁孝王𫝊十七梁孝王得賜天子旌旗從千乘萬騎出稱警入言䟆師古曰警者戒肅也䟆止行人也言出入者互文耳出亦有䟆漢儀注皇帝輦動左右侍帷幄者稱警出殿則傳蹕止人清道也枝梧項籍傳一項羽晨朝上將軍宋義即其帳中斬義頭出令軍中曰宋義與齊謀反楚楚王隂令籍誅之諸將讋服莫敢枝梧如淳曰梧音悟枝梧猶枝扞也臣瓉曰小柱為枝邪柱為梧今屋梧邪柱是也祭酒伍被傳伍被曰吳王賜號為劉氏祭酒受几杖而不朝如淳曰祭祠時唯尊長者以酒沃酹亷隅賈誼𫝊十八賈誼曰人主之尊譬如堂羣臣如陛衆庶如地故陛九級上亷逺地則堂髙陛亡級亷近地則堂卑髙者難攀卑者易陵理勢然也故古者聖王制為等列內有公卿大夫士外有公侯伯子男然後有官師小吏延及庶人等級分明而天子加焉故其尊不可及也師古曰級等也廉側隅官師一官之長轅門項籍傳楚已破秦軍項羽見諸侯將入轅門膝行而前莫敢仰視張晏曰軍行以車為陳轅相向為門故曰轅門師古曰周禮掌舍王行則設車宫轅門也厮養張耳𫝊二蘇林曰厮取薪者也養養人者也厮音斯相駮薛宣𫝊五十三薛宣後母死弟修去官持服宣謂修三年服少能行之者兄弟相駮不可修遂竟服繇是兄弟不和師古曰駮者執意不同猶如色之間雜秋豪髙帝紀沛公入關秋豪無所敢取文頴曰豪秋乃成好舉盛而言也師古曰豪成之時端極纎細適足喻小非言其盛犬牙文帝紀髙帝王子弟地犬牙相制所謂盤石之宗也師古曰犬牙言地形如犬之牙交相入也驂乘文帝紀代王令宋昌驂乘師古曰乘車之法尊者居左御者居中又有一人處車之右以備傾側是以戎事則稱車右其餘則曰驂乘驂者三也蓋取三人為名義耳進善旌文帝紀二年詔曰古之治天下朝有進善之旌應劭曰旌幡也堯設之五達之道令民進善也如淳曰欲有進者立於旌下言之長星彗孛文帝紀八年有長星出於東方文頴曰孛彗長三星其占略同然其形象小異孛星光芒短其光四出蓬蓬孛孛也彗星參參長如掃彗長星光芒有一直指或竟天或十大或三丈或二丈無常也大法孛彗星多為除舊布新火災長星多為兵革事豎儒髙帝紀三年師古曰言其賤劣無智若童豎也出其右髙帝紀九年賢趙臣田叔孟舒等十人召見與語漢廷臣無能出其右者師古曰古者以右為尊言材用無能過之者故云不出其右也湯沐邑髙帝紀十二年其以沛為朕湯沐邑師古曰凡言湯沐邑者謂以其賦稅供湯沐之具也編戶髙帝紀諸將故與帝為編戶民北面為臣心常鞅鞅師古曰編户者列次名籍也章程帶厲鐡契規摹髙帝紀初髙祖不修文學而性眀達好謀能聽自監門戍卒見之如舊初順民心作三章之約天下既定命蕭何次律令韓信申軍法張蒼定章程叔孫通制禮儀陸賈造新語又與功臣剖符作誓丹書鐵契金匱石室藏之宗廟雖日不暇給規摹𢎞逺矣如淳曰章厯數之章術也程權衡丈尺斗斛之平法也師古曰程法式也剖符作誓者如淳曰謂功臣表誓使河如帶太山若厲國乃滅絶又功臣表注應劭曰封爵之誓國家欲使功臣𫝊祚無窮也帶衣帶也厲砥厲石也河當何時如衣帶山當何時如厲石言如𢃄厲國猶永存以及後世子孫也金匱石室者如淳曰金匱猶金縢也師古曰以金為匱以石為室重緘封之保慎之義規摹者鄧展曰若畫工規模物之摹韋昭曰正員之器曰規摹者如畫工未施采事摹之矣師古曰取喻規摹謂立制垂範也給足也日不暇足言衆事繁多常汲汲也百二建瓴髙帝紀六年田肯賀上曰甚善陛下得韓信又治秦中秦形勝之國也帶河阻山縣隔千里持㦸百萬秦得百二焉地勢便利其以下兵於諸侯譬猶居屋之上建瓴水也蘇林曰百二得百中之二二萬人也秦地險固二萬人足當諸侯百萬人也如淳曰瓴盛水瓶也居髙屋之上而幡瓶水言其向下之勢易也蘇林曰瓴讀曰鈴建音居偃反計偕武帝紀元光五年徵吏民有眀當世之務習先聖之術者縣次續食令與計偕師古曰計者上計簿使也郡國每嵗遣詣京師上之偕者俱也令所徴之人與上計者俱來而縣次給之食角抵武帝紀元封三年作角抵戲文頴曰名此樂為角抵者兩兩相當角力角技藝射御故名角抵蓋雜技樂也巴俞戲魚龍蔓延之屬也漢後更名平樂觀池籞宣帝紀地節三年詔池籞未御幸者假與貧民蘇林曰析竹以繩綿連禁籞使人不得往來律名為籞應劭曰池者陂池也籞者禁苑也佽飛宣帝紀神爵元年西羌反應募佽飛射士服䖍曰周時度江越人在船下負船將覆之佽飛入水殺之漢因以材力名官如淳曰吕氏春秋荆有茲非得寶劒於干將渡江中流兩蛟繞舟茲非拔寶劒赴江刺兩蛟殺之荆王聞之仕以執圭後世以為勇力之官茲佽音相近師古曰取古勇力人以名官熊渠之類是也亦因取其便利輕疾若飛故號佽飛一封軺傳平帝紀元始五年徴天下通知逸經古紀天文厯算鍾律小學史篇方術本草及五經論語孝經爾雅教授者在所為駕一封軺傳遣詣京師至者數千人如淳曰律諸當乘傳及發駕置傳者皆持尺五寸木傳信封以御史大夫印章其乘傳參封之參三也有期會纍封兩端端各兩封凡四封也乘置馳傳五封之兩端各二中央一也軺傳兩馬再封之一馬一封也師古曰以一馬駕軺車而乘傳𫝊音張戀反元服昭帝紀元鳯四年帝加元服師古曰元首也冠者首之所著故曰元服其下汲黯傳序云上正元服是知謂冠為元服昆蟲成帝紀建始三年詔曰草木昆蟲咸得其所師古曰昆衆也昆蟲言衆蟲也又許慎說文云二蟲為䖵讀與昆同謂蟲之總名兩義並通蟲音許尾反璽符節髙帝紀元年秦王子嬰封皇帝璽符節降枳道旁應劭曰璽信也古者尊卑共之左傳襄公在楚季武子使公冶問璽書追而與之秦漢尊者以為信羣下乃避之師古曰符謂諸所合符以為契者也節以毛為之上下相重取象竹節因以為名將命者持之以為信按堵髙帝紀元年髙祖入關除去秦法吏民皆按堵如故應劭曰按按次第堵牆堵也師古曰言不遷動也鉤距趙廣漢傳四十六趙廣漢精於吏職尤善為鉤距以得事情蘇林曰鉤得其情使不得去也晉灼曰鉤致也距閉也使對者無疑若不問而自知衆莫覺所由以閉其術為距也金印赤韍翟方進傳五十四王莽封孫賢等五十五人皆為列侯户邑之數别下遣使者持黃金印赤韍縌朱輪車即軍中拜授服䖍曰縌即今之綬也師古曰韍所以繫印也縌者繫也謂逆受之也縌音逆守宫東方朔傳三十五師古曰守宫蟲名也術家云以器養之食以丹砂滿七斤搗治萬杵以㸃女人體終身不滅若有房室之事則滅矣言可以防間淫逸故謂之守宫也今俗呼為辟宫辟亦禦扞之義耳泰階六符東方朔傳朔陳泰階六符孟康曰泰階三台也每台二星凡六星符六星之符驗也應劭曰黃帝泰階六符經曰泰階者天之三階也上階為天子中階為諸侯公卿大夫下階為士庶人上階上星為男主下星為女主中階上星為諸侯三公下星為卿大夫下階上星為元士下星為庶人三階平則隂陽和風雨時社稷神祇咸獲其宜天下大安是為太平三階不平則五神乏祀日有食之水潤不浸稼穡不成冬雷夏霜百姓不寧故治道傾天子行暴令好興甲兵修宫榭廣苑囿則上階為之奄奄疏闊也以孝武皆有此事故朔為陳之又藝文志注李奇曰三台謂泰階兩兩成體三台故六觀色以知吉凶故曰六符賈區胡建傳三十七胡建為軍正丞時監軍御史為姦穿北軍壘垣以為賈區建斬之以奏師古曰坐賣曰賈為賣物之區也區者小室之名若今小庵屋之類耳故衛士之屋謂之區廬宿衛宫外士稱為區士也投石拔距甘延夀傳四十甘延壽少以良家子善騎射為羽林投石拔距絶於等倫嘗超踰羽林亭樓應劭曰投石以石投人也師古曰拔距者有人連坐相把據地距以為堅而能拔取之皆言其有手掣之力超踰亭樓又言趫捷耳今人猶有拔爪之戲蓋拔距之遺法尸祿鮑宣傳四十二師古曰尸主也不憂其職但主食祿而已漿酒霍肉蒼頭廬兒鮑宣𫝊鮑宣諌曰陛下奈何獨私養外親與幸臣董賢多賞賜以大萬數使奴從賔客漿酒霍肉蒼頭廬兒皆用致富非天意也劉德曰視酒如漿視肉如霍也師古曰霍豆葉也貧人茹之也孟康曰黎民黔首黎黔皆黑也下民隂類故以黑為號漢名奴為蒼頭非純黑以别於良人也諸給殿中者所居為廬蒼頭侍從因呼為廬兒臣瓉曰漢儀注官奴給書計從侍中已下為蒼頭青幘衣敝履空鮑宣𫝊唐尊衣敝履空以瓦器飲食又以厯遺公卿被虛僞名服䖍曰履猶屨也師古曰衣音於既反著敝衣躡空履也空穿也厯遺公卿者服䖍曰以瓦器遺之綿力嚴助傳三十四淮南王曰越人綿力薄材師古曰綿弱也言其柔弱如綿遲明髙帝紀沛公乃夜引軍從他道還偃旗幟遲明圍宛城三匝師古曰言圍城事畢然後天明明遲於事故曰遲明變為去聲音大二反漢書諸言遲某事者義類此史記遲字作邌亦徐緩之意也音黎閩中髙帝紀五年師古曰閩越今泉州建安是其地也其人本蛇種故其字從蟲蟲許尾反亡賴髙帝紀九年髙祖奉玊巵為太上皇壽曰始大人常以臣亡賴不能治産業不如仲力晉灼曰許慎云賴利也無利入於家也或曰江淮之間謂小兒多詐狡獪為無賴獪音工外反逮捕髙帝紀九年貫髙等謀逆發覺逮捕髙等師古曰逮捕謂事相連及者皆捕之也一曰在道守禁相屬不絶若今之𫝊送囚耳三族髙帝紀九年如淳曰父族母族妻族也羽檄髙帝紀十年羽檄徵天下兵師古曰檄者以木簡為書長尺二寸用徴召也其有急事則加以鳥羽插之示速疾也魏武奏事云今邉有警輒露檄插羽檄音胡厯反𣙜酤武帝紀天漢三年初𣙜酒酤韋昭曰以木渡水曰𣙜謂禁民酤釀獨官開置如道路設木為𣙜獨取利也師古曰𣙜者步渡橋爾雅謂之石杠今之略彴是也禁閉其事總利入官而下無由以得有若渡水之𣙜因立名焉酤音工護反彴音酌阡陌成帝紀陽朔四年師古曰阡陌田間道也南北曰阡東西曰陌蓋秦時商鞅所開也幸酒成帝紀成帝為太子其後幸酒樂燕樂晉灼曰幸酒好酒也師古曰論語云樂燕樂燕讀如本字上音五孝反下音來各反傅婢王吉𫝊四十二師古曰凡言傅婢者謂傅相其衣服衽席之事一說傅曰附謂近幸也財取竇嬰傳二十二竇嬰為大將軍賜金千斤陳廊廡下軍吏過輒令財取為用金無入家者師古曰財與裁同謂裁量而用之闔郡武帝紀元朔元年今或至闔郡而不薦一人師古曰闔閉也總一郡之中故云闔郡黃鵠下太液昭帝紀始元元年黃鵠下建章宫太液池中師古曰黃鵠大鳥也一舉千里者非白鵠也太液池者言津潤所及廣也弄田昭帝紀始元元年上耕于鉤盾弄田師古曰謂宴游之田天子所戲弄耳非謂昭帝年幼創有此名飾厨𫝊宣帝紀元康二年詔吏務平法或擅興繇役飾厨傳稱過使客越法踰職以取名譽韋昭曰厨謂飲食傳謂傳舍師古曰使人及賔客來者稱其意而遣之令過去也城旦舂鬼薪白粲惠帝紀當為城旦舂者皆耐為鬼薪白粲應劭曰城旦者旦起行治城舂者婦人不豫外徭但舂作米皆四嵗刑也今皆就鬼薪白粲取薪給宗廟為鬼薪坐擇米使正白為白粲皆三嵗刑也漢書音義曰城旦輕刑之名也後漢韓稜𫝊注晝日司寇虜夜暮築長城曰城旦酎金景帝紀元年髙廟酎金張晏曰正月旦作酒八月成名曰酎酎之言純也至武帝時因八月嘗酎㑹諸侯廟中出助祭所謂酎金也師古曰酎三重釀醇酒也味厚故以薦宗廟酎音直救反方內谷永傳五十五谷永對䇿云方內之治亂在陛下所執師古曰方內四方之內也案嚴助傳方內無狗吠之警在谷永前注並同陸海東方朔三十五東方朔曰漢興去三河之地止灞滻以西都涇渭之南此所謂天下陸海之地師古曰髙平曰陸關中地髙故稱陸耳海者萬物所出言關中山川物産饒富是以謂之陸海不根持論嚴助𫝊三十四朔臯不根持論上頗俳優畜之師古曰論議委隨不能持正如樹木之無根柢也漏澤吾丘壽王𫝊三十四吾丘壽王對寶鼎事曰臣聞周德始乎后稷長於公劉大於太王成於文武顯於周公德澤上昭天下漏泉師古曰昭明也漏言潤澤下霑如屋之漏棄繻終軍傳三十四下終軍入關關吏豫軍繻蘇林曰繻帛邊也舊關出入皆以𫝊𫝊煩因裂繻頭合以為符信也狼戾嚴助傳淮南王上書曰閩越王狼戾不仁師古曰狼性貪戾凡言狼戾者謂貪而戾鼓鑄終軍𫝊鼓鑄鹽鐵如淳曰鑄銅鐵扇熾火謂之鼓五鼎主父偃傳三十四主父偃曰生不五鼎食死則五鼎烹張晏曰五鼎食牛羊豕魚麋也諸侯五卿大夫三緑幘傅韝東方朔傳館陶公主自引董君緑幘傅韝曰館陶公主胞人應劭曰宰人服也韋昭曰韝形如射韝以縛左右手於事便也師古曰緑幘賤人服也傅著也韝即今之臂韝也傅讀曰附胞與庖同抗疏揚雄𫝊五十七下師古曰抗舉也謂上之也疏者疏條其事而言之徇地酈食其傳十三陳項起諸將徇地過髙陽師古曰徇亦略也傳舍酈食其𫝊沛公至髙陽𫝊舍師古曰傳舍者人所止息前人已去後人復來轉相傳也一音張戀反謂傳置之舍也其義兩通他皆類此扼掔郊祀志五上五利將軍欒大數月佩六印貴震天下而海上燕齊之間莫不扼掔而自言有禁方能神仙矣師古曰扼捉持也掔古手腕字扼音厄羽衣郊祀志五利將軍衣羽衣立白茅上受印以視不臣也師古曰羽衣以鳥羽為衣取其神仙飛翔之意六飛袁盎𫝊十九上從霸陵欲西馳下峻阪袁盎攬轡諌曰陛下騁六飛馳不測師古曰攬與􅒆同如淳曰六馬之疾若飛也峭直鼂錯𫝊十九鼂錯為人峭直刻深師古曰峭與峭同峭謂峻狹也音千笑反虎落朝錯傳鄭氏曰虎落者外蕃也若今時竹虎也師古曰虎落以竹篾相連遮落也還踵鼂錯傳鼂錯言勸以厚賞威以重罰則死不還踵矣師古曰還讀曰旋旋踵回旋其足也調兵食鼂錯𫝊吳楚七國俱反上方與錯調兵食師古曰調謂計發之也音徒釣反十年不調張釋之𫝊二十張釋之為騎郎事文帝十年不得調亡所知名師古曰調選也音徒釣反倚瑟張釋之𫝊慎夫人鼓瑟上自倚瑟而歌李竒曰聲氣依倚瑟也師古曰倚瑟即今之以歌合曲也倚音於綺反腐儒黥布傳四後漢李固𫝊師古曰腐者爛敗言無所堪任後漢李固𫝊注云腐生者猶言腐儒也武帳汲黯傳二十上嘗坐武帳汲黯前奏事上不冠望見黯避帷中孟康曰今御武帳置兵闌五兵於帳中也舞文汲黯傳汲黯曰張湯好興事舞文法如淳曰舞猶弄也巧詆汲黯𫝊刀筆之吏深文巧詆師古曰詆毁辱也又誣也尺籍伍符馮唐𫝊二十馮唐曰夫士卒盡家人子起田中從軍安知尺籍伍符李竒曰尺籍所以書軍令伍符軍士五五相保之符信也如淳曰漢軍法曰吏卒斬首以尺籍書下縣移郡令人故行不行奪勞二嵗伍符亦什伍之符要節度也師古曰家人子謂庶人之家子也蹶張申屠嘉傳十二申屠嘉以材官蹶張從髙帝擊項籍如淳曰材官之多力能腳踏彊弩張之故曰蹶張師古曰今之弩以手張者曰擘張以足踏者曰蹶張音厥擘音布麥反一襲叔孫通𫝊十三賜叔孫通衣一襲師古曰上下皆具也今人呼為一副也又昭帝紀賜衣被一襲注曰一襲一稱也原廟叔孫通𫝊十三惠帝詔有司立原廟師古曰原重也先以有廟今更立之故曰重也謂髙帝廟元帝建昭五年復太上皇寢廟園原廟文頴曰髙祖已自有廟在長安城中惠帝更於渭北作廟謂之原廟爾雅曰原者再再作廟也器械宣帝贊八師古曰械者器之總名也一曰有盛為械無盛為器孩提賈誼傳十八賈誼陳教太子事云孩提有識師古曰孩小兒也提謂提撕也物故蘇武𫝊師古曰言同於鬼物而故也一說不欲斥言但云其所服用之物皆已故耳三秦髙帝紀元年應劭曰章邯為雍王司馬欣為塞王董翳為翟王分王秦地故曰三秦為壽髙帝紀項莊入為壽師古曰凡言為壽謂進爵於尊者而獻無疆之壽莋馬僰僮西南夷𫝊六十五巴蜀商賈取其莋馬僰僮旄牛以此巴蜀殷富地理志注師古曰言滇僰之地多出僮𨽻卭莋之地出馬及旄牛滇音顛僰音蒲北反莋音材各反西南夷有莋都亦有君長百越地理志八下粵地牽牛婺女之分野也今之蒼梧鬱林合浦交址九真南海日南皆粵分也其君禹後帝少康之庶子云封於㑹稽師古曰越之為號其來尚矣少康封庶子以主禹祠君於越地耳故此志云其君禹後豈謂百越之人皆禹苗裔壬人元帝紀永光元年詔曰朕之不明亡以知賢也是故壬人在位而吉士雍蔽服䖍曰壬人佞人也師古曰吉善也汶上眀堂郊祀志五下武帝封泰山泰山東北址古時有明堂處處險不敞上欲治明堂奉髙旁未曉其制度濟南人公玉帶上黃帝時明堂圖於是上令奉髙作明堂汶上如帶圖訾算得官景帝紀後二年詔曰今訾算十以上乃得官廉士算不必衆有市籍不得官無訾又不得官朕甚愍之訾算四得官亡令廉士久失職貪夫長利應劭曰古者限訾十算乃得為吏十算十萬也姬妾文帝紀如淳曰姬者衆妾之總稱漢官儀曰姬妾數百外戚𫝊曰幸姬戚夫人師古曰姬者本周之姓貴於衆國之女所以婦人美號皆稱姬焉辟彊文帝紀二年趙王遂弟名辟彊師古曰辟彊言辟禦彊梁者亦猶辟兵辟非耳案師古注本有辟彊闢疆兩說此止載其前說似於義未備白公溝洫志九大始二年趙中大夫白公復奏穿渠引涇水首起谷口尾入櫟陽鄭氏曰白姓師古曰公相呼尊長之稱耳兩漢博聞卷二
