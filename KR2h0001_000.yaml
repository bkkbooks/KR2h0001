body:
  text: 御製題兩漢博聞遷創班承范繼哉纂言功足補秦反博聞特舉兩書要頗繆還兼百卷該史記一百三十卷舉成數也撰者或訛楊侃及魯黃魯曽考朝公武讀書志以兩漢博聞為楊侃撰其書採前後漢書中雋語為標目先載本文而備列諸家注釋于下不加議論亦類書之體明嘉靖間長洲黃魯曽購得其本刻而𫝊之今版久佚原本因有黃魯曽序該撫遂稱為黃魯曽撰誤也注之卻讓馬司馬貞和裴駰史記注以裴駰集解司馬貞索隱為主而張守節正義尤詳今三注並行其餘若徐廣傅瓚諸家之說附見者不可僂數而前漢書注惟載顔師古後漢書注惟列章懷太子賢其諸家注釋雖亦附録不能如史記之三注並行也因披遺籍知來雨周厚堉家藏書處名來雨樓是時盻澤甚殷見樓名亦為心動故落句及之正值望霖雨庶來欽定四庫全書史部八兩漢博聞史鈔類提要臣等謹案兩漢博聞十二卷明嘉靖中黃魯曽刋本不著撰人名氏案朝公武讀書志乃宋楊侃所編也侃錢塘人端拱中進士官至集賢院學士晚為制誥避真宗舊諱更名大雅是編摘録前後漢書不依篇第不分門類惟簡擇其字句故事列為標目而節取顔師古及章懷太子注列於其下凡前漢書七卷後漢書五卷雖於史學無關然較他類書採托雜說者究為雅馴後漢書中間有引及前漢書者必標顔師古字而所引梁劉昭續漢志注乃與章懷注無别體例未免少疏至所列紀傳篇目亦往往多有訛舛然如四皓條下引顔師古注曰四皓稱號本起於此更無姓名可稱蓋隱居之人匿迹逺害不自標顯祕其氏族故史𫝊無得而詳至於皇甫謐圈稱之徒及諸地理書說竟為四人安姓字自相錯互語又不經班氏不載于書諸家皆臆說今並棄略一無取焉云云明監本漢書注竟佚此條惟賴此書幸存則亦非無資考證者矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀兩漢博聞原序自狂秦書儒之禍而三代之文不覽者多矣漢興如隋何魯兩生輩或者亦焚坑孑遺之子未可謂之宏雅也厥後陳農求遺書於天下而未火者出焉蓋異於孔壁之所藏有所槩限者矣由是人漸以傳習文始向盛如司馬遷之史記亦煩心於勤敏播迹於勞瘁以成之而兩漢書則又有所因述採輯頗易其間注釋訓詁不獲盡遍近古載籍莫過於兩漢書也而訛謬弗考形似弗辨則何以下淫於羣編耶韓子所謂記事者必提其要纂言者必鈎其𤣥宋儒之意以為讀書者讀其實而已其浮泛遊移之辭奚足篤尚此兩漢博聞之不可以或少也豫幼學瑣尾促狹習奔時之業遵俗師之課而壁光螢焰注精於漢書博聞一書未之快目晚嵗方遇録本驚歎曰初讀漢書之年而以此備參考決疑二何其詔我以徽哉今衰頽之甚欲再循其次如少齡氣鋭之時不能一强逮矣乃思立達者天下之公開鑿者先民之哲急用鋟諸梓以為讀漢書者之啓鑰庶乎不坐我弊挾持其聰明恢拓其智慮俾學者俱為宏儒則有作必敷國華有言必為世道且有以迥絶乎不根之陋語移責乎非古之纎家而今一時任俗率狼戾離披見此書者是猶覿南威而匿鬼貌覩尚織而毁牛衣矣何則有天降之人斯有天發之言有天發之言斯有天成之文莫非模諸古而濟之以才出諸心而緯之以思講諸類而達之以神其月更而嵗不同者自爾焯然蔚然掞天章而炳地理非由妄以綴之虛以屬之也此又不可以容譏喙肆哂頰焉噫鄭賢記世叔討論之長左史稱子産博雅之學其不異於此書乎嘉靖戊午元日黃魯曾撰兩漢博聞原序
