body:
  text: 兩漢博聞卷五宋楊侃輯請間文帝紀爰盎𫝊十九代王至渭橋羣臣拜謁太尉勃進曰願請間宋昌曰所言公公言之所言私王者無私師古曰間容也猶今言中間也請容暇之頃當有所陳不欲於衆顯論也又注云欲因間隙私有所白也鳴鏑匈奴𫝊六十四上冒頓作鳴鏑令曰鳴鏑所射而不悉射者斬已而冒頓以鳴鏑自射其善馬復射其愛妻左右或莫敢射皆斬之後獵以鳴鏑射殺其父頭曼自立應劭曰鳴鏑髐箭也髐音呼交反師古曰曼音莫安反持滿匈奴𫝊持滿傅矢外鄉師古曰傅讀曰附鄉讀曰嚮持滿言滿引弓弩注矢外捍也鵔鸃冠佞幸𫝊六十三司馬相如傳二十七上孝惠時侍中皆冠鵔鸃貝帶傅脂粉師古曰以鵔鸃毛羽飾冠海貝飾帶鵔鸃即鷩鳥也音峻儀又相如𫝊注云鵔鸃似山雞而小冠背毛黄腹下赤項緑色其尾毛紅赤光采鮮明今俗呼為山雞其實非也餐霞相如𫝊二十七下吸沆瀣兮餐朝霞應劭曰列仙𫝊陵陽子言春食朝霞者日始欲出赤黄氣也夏食沆瀣北方夜半氣也并天地𤣥黄之氣為六氣倒景相如𫝊郊祀志五下貫列缺之倒景服䖍曰列缺天閃也人在天上下向視日月故景倒在下也郊祀志登遐倒景如淳曰在日月之上反從下照故其影倒㳙人蒼頭軍陳勝𫝊一石奮𫝊十六陳勝既為其御莊賈所殺而降秦勝故㳙人將軍吕臣為蒼頭軍起新陽應劭曰時軍皆著青巾故曰蒼頭軍也師古曰涓潔也㳙人主潔除之人㳙音蠲石奮為髙祖中㳙中㳙官名主居中而㳙潔者上游項籍𫝊一匈奴𫝊項羽陽尊懐王為義帝曰古之王者地方千里必居上游徙之長沙都郴文頴曰居水之上流也師古曰游即流也又匈奴𫝊從上游來厭人拾芥夏侯勝𫝊四十五夏侯勝毎講授常謂諸生曰士病不明經術經術茍明其取青紫如俛拾地芥爾師古曰地芥謂草芥之横在地上者俛而拾之言其易而必得也青紫卿大夫之服也俛即俯字也天極李尋𫝊四十五李尋云紫宫極樞通位帝紀孟康曰紫宫天之北宫也極天之北極星也樞是其迴轉者也天文志曰天極其一明者太一常居也太一天皇大帝也與通極為一體故曰通位帝紀也折膠鼂錯𫝊十九鼂錯曰陛下絶匈奴不與和親臣竊意其冬來南也欲立威者始於折膠來而不能困使得氣去後未易服也蘇林曰秋氣至膠可折弓弩可用匈奴常以為候而出軍師古曰使得氣去者使其得勝逞志氣而去賈豎張良𫝊十張良曰秦兵尚强未可輕也其將屠者子賈豎易動以利令持重寳啗秦將師古曰商賈之人志無逺大譬如僮豎故云賈豎長休告丙吉𫝊四十四丙吉居相位上寛大掾吏有罪臧不稱職輒予長休告師古曰長給休假令其去職也大府張湯傳二十九大府丞相府也方中張湯傳張湯調茂陵尉治方中蘇林曰天子即位豫作陵師古曰古謂掘地為阬曰方今荆楚俗土功築作算程課者猶以方計之爰書張湯傳張湯劾鼠掠治𫝊爰書訊鞫論報師古曰𫝊謂𫝊逮若今之追送赴對也爰換也以文書代換其口辭也訊考問也鞫窮也謂窮覈之也論報謂上論之而獲報也縣土炭天文志六李尋傳四十五天文志曰冬至短極縣土炭炭動麈鹿解角蘭根出泉水踊孟康曰先冬至三日縣土炭於衡兩端輕重適均冬至而陽氣至則炭重夏至而隂氣至則土重晉灼曰蔡邕律厯記候鍾律權土炭冬至陽氣應黄鍾通土炭輕而衡仰夏至隂氣應㽔賔通土炭重而衡低進退先後五日之中李尋曰政治感隂陽猶鐵之低卬見效可信者也孟康曰天文志云縣土炭也以鐵易土耳先冬夏至縣鐵炭於衡各一端令適停冬陽氣至炭仰而鐵低夏隂氣至炭低而鐵仰以此候二至也景星天文志六景星徳星也其狀無常常出於有道之國舞知乾没張湯傳張湯舞知以御人始為小吏乾没與長安富賈田甲魚翁叔之屬交私師古曰舞弄其智制御他人也服䖍曰乾没射成敗也如淳曰豫居物以待之得利為乾失利為没乾音干間適杜欽傳三十支庶有間適之心師古曰間代也音居莧反適讀曰嫡緑車金日磾傳三十八王莽傳六十九上金敞為衛尉病甚上拜其子涉為侍中使緑車載送衛尉舎晉灼曰漢注緑車名皇孫車太子有子乗以從如淳曰常置左右以待召載皇孫李竒曰欲敞見其榮寵也王莽得乗緑車從師古曰亦以寵之也珠襦霍光傳三十八將廢昌邑王太后被珠襦盛服坐武帳中武士陛㦸陳列殿下晉灼曰貫珠以為襦形若今革襦矣師古曰陛㦸為執㦸以衛陛下席勝蒯通傳十五乗利席勝威震天下師古曰席因也若人之在席上琅當西域傳六十六上後漢循吏傳序注軍候趙徳使罽賔與罽賔王隂末赴相失隂末赴鎻琅當徳殺副已下七十餘人師古曰琅當長鎻也若今之禁繫人鎻矣琅音郎後漢注云王莽一家鑄錢保五人没入為官奴婢男子檻車女子步鐵鎖琅當其頸愁苦死者十七八横行書西域傳服䖍曰安息國横行為書記師古曰今西方胡國及南方林邑之徒書皆横行不直下也尉薦趙廣漢傳四十六趙廣漢為二千石以和顔接士其尉薦待遇吏殷勤甚備師古曰尉薦謂安尉而薦達之童騎張敞傳四十六出從童騎師古曰以童奴為騎而自從也便面張敞傳王莽傳張敞為京兆尹無威儀時罷朝㑹過走馬章臺街使御史驅自以便面拊馬師古曰便面所以障面葢扇之𩔖也不欲見人以此自障面則得其便故曰便面亦曰屏面今之沙門所持竹扇上衺平而下圜即古之便面也音頻面反王莽常翳雲母便面金布令蕭望之傳四十八金布令甲曰邊郡數被兵離饑寒夭絶天年父子相失令天下共給其費師古曰同共給之也自此以上令甲之文金布者令篇名也其上有府庫金錢布帛之事因以篇名令甲者其篇甲乙之次犀利馮奉世傳四十九羌戎弓矛之兵耳器不犀利晉灼曰犀堅也千人司馬馮奉世傳如淳曰漢注邊郡置都尉及千人司馬皆不治民也畫象武帝紀元光元年詔曰昔在唐虞畫象而民不犯應劭曰二帝但畫衣冠異章服而民不敢犯師古曰白虎通云畫象者畫其衣服象五刑度曲元帝紀贊元帝多材藝善史書鼓琴瑟吹洞簫自度曲被歌聲應劭曰史書周宣王太史籀所作大篆也度曲謂自隱度作新曲因持新曲以為歌詩聲也荀悦曰被聲能播樂也臣瓚曰度曲謂歌終更授其次謂之度曲西京賦曰度曲未終雲起雪飛張衡舞賦亦曰度終復位次受二八度音大各反被音皮義反甲觀畫堂成帝紀孝成皇帝元帝太子也母王皇后元帝在太子宫生甲觀畫堂如淳曰三輔黄圖云太子宫有甲觀師古曰甲者甲乙丙丁之次元后𫝊言見於丙殿此其例也畫堂但畫飾耳霍光止畫室中是則宫殿中通有彩畫之堂室祫祭平帝紀元始五年祫祭明堂應劭曰禮五年而再殷祭一禘一祫祫祭者毁廟與未毁廟之主皆合食於太祖郡將嚴延年傳六十師古曰謂郡守為郡將者以其兼領武事也股弁嚴延年傳嚴延年為涿郡太守按大姓髙氏獄吏皆股弁師古曰股戰若弁弁謂撫手也縣度西域烏秅國六十六上西域罽賔國烏秅國其西則有縣度去陽關五千八百八十八里縣度者石山也谿谷不通以繩索相引而度成帝時罽賔國復遣使獻謝罪漢欲遣使者報送其使杜欽說大將軍王鳳曰今縣度之阨歴大頭痛小頭痛之山赤土身熱之阪令人身熱無色頭痛嘔吐驢畜盡然行者騎步相持繩索相引二千餘里乃到縣度其鄉慕不足以安西域有求則卑辭無欲則嬌嫚終不可懐服也師古曰縣繩度也縣古懸字耳蝯飲西域傳烏秅國山居累石為室民接手飲師古曰自髙山下谿澗中飲水故接連其手如蝯之為馬復令西域傳當今務在禁苛暴止擅賦力本農修馬復令師古曰馬復因養馬以免徭賦也復音方目反田輪臺渠犂西域傳武帝初通西域置校尉屯田渠犂是時軍旅連出海内虚耗𢎞羊等奏言故輪臺以東㨗枝渠犂有溉田五千頃以上臣以為可遣屯田卒詣輪臺以東置校尉三人分䕶以時益種五穀詔曰今請逺田輪臺起亭隧是擾勞天下非所以優民也師古曰隧者依深險之處關通行道也儀形王莽傳六十九上唯陛下儀形虞周之盛子午道王莽傳王莽以皇后有子孫瑞通子午道子午道從杜陵直絶南山徑漢中張晏曰時年十四始有婦人之道也子水午火也水以天一為牡火以地二為牝故火為水妃今通子午以協之師古曰子北方也午南方也言通南北道相當故謂之子午耳今京城直南山有谷通梁漢道者名子午谷又宜州西界有山名子午嶺計南北直相當此則北山者是子南山者是午共為子午道跬步王莽傳進不跬步師古曰半步曰跬謂一舉足也音空橤反毛摯義縱傳六十義縱為定襄太守郡中不寒而栗縱以鷹擊為治師古曰言如鷹隼之擊奮毛羽執取飛鳥也束濕甯成傳六十甯成以郎謁者事景帝好氣為少吏必陵其長吏為人上操下急如束濕師古曰操執持也束濕言其急之甚也濕物則易束操音千髙反曲臺記孟卿傳五十八藝文志十后蒼說禮數萬言號曰后氏曲臺記服䖍曰在曲臺校書著記因以為名師古曰曲臺殿在未央宫藝文志注如淳曰行禮射於曲臺后蒼為記故名曰曲臺記漢官儀曰大射於曲臺晉灼曰天子射宫也西京無太學於此行禮也大小戴孟卿傳梁戴徳延君戴聖次君徳號大戴聖號小戴皆受經于后蒼由是禮有大戴小戴之學驪駒王式傳五十八諸博士共薦王式詔除下為博士式徴來諸大夫博士共持酒肉勞式江公世為魯詩宗心嫉式謂歌吹諸生曰歌驪駒式曰聞之師客歌驪駒主人歌客毋庸歸今日諸君為主人日尚早未可也遂謝病免歸服䖍曰逸詩篇名也見大戴禮客欲去歌之文頴曰其辭云驪駒在門僕夫具存驪駒在路僕夫整駕也客毋庸歸者庸用也主人禮未畢且無用歸也鬼廷栢東方朔傳三十五東方朔曰栢者鬼廷也師古曰言鬼神尚幽闇故以松栢之樹為廷府也真宅楊王孫傳三十七楊王孫病將死先令其子曰吾欲臝葬以反吾真且曰死者物之歸也精神者天之有也形骸者地之有也精神離形各歸其真夫裹以幣帛髙以棺槨支體絡束口含玉石欲化不得鬱為枯腊千載之後棺槨朽腐迺得歸土就其真宅遂臝葬缿筩趙廣漢四十六王温舒傳六十趙廣漢為潁川太守先是潁川豪傑大姓相與為婚姻吏俗朋黨漢患之出有案問故漏泄其語令相怨咎又教吏為缿筩及得投書削其主名而託以為豪傑大姓子弟所言其後彊宗大族結為仇讐姦黨散落風俗大改吏民相告訐廣漢得以為耳目蘇林曰缿音項如缾可受投書孟康曰筩竹筩也如今宫受密事筩也師古曰缿若今盛錢藏瓶為小孔可入而不可出或缿或筩皆為此制而用受書令投其中也筩音同王温舒為中尉少年投缿購告言姦負海五行志七下之上秦大用民力轉輸起負海至北邊負海猶言背海也隼五行志師古曰隼鷙鳥即今之鴩也鴩字音胡骨反鴩與鶻同方制地理志八上黄帝方制萬里畫埜分州得百里之國萬區方制以為方域也日夜食五行志七下之下李尋傳又注日夜食則無景立六尺木不見其景以此為候雒陽地理志八下師古曰魚豢云漢火行忌水故去洛水而加隹如魚氏說則光武已後改為雒字也酒泉郡地理志八下酒泉郡武帝太初元年開應劭曰其水若酒故曰酒泉師古曰舊俗𫝊云城下有金泉味如酒古瓜州地理志燉煌古瓜州也地生美瓜師古曰即春秋左氏𫝊允姓之戎居於瓜州也其地今猶出大瓜長者狐入瓜中食之首尾不出靈州地理志惠帝四年置有河竒苑號非苑師古曰苑謂馬牧也水中可居者曰洲此地在河之洲隨水髙下未嘗淪没故號曰靈州又曰河竒也二苑皆在北焉曰南郡地理志故秦象郡武帝時更名屬交州師古曰言在日之南所謂北戶以向日者耐刑髙帝紀第一髙祖七年令郎中有罪耐已上請之應劭曰輕罪不至於髠完其耏鬢故曰耏古從彡髪膚之意也師古曰耏當音而耏謂頰旁毛也罽髙帝紀八年罽毛若今毼及氍毹之𩔖也罽居例反毼音曷氍音瞿毹音俞說文云氍毹氊緂之屬蓋方言也别注云罽織毛為布者略地髙帝紀凡言略地者皆謂行而取之用功力少葭莩之故王莽傳六十九中山靖王傳二十三王莽上言曰自諸侯王以下至於吏民咸知莽與陛下有葭莩中山靖王曰今羣臣亦有葭莩之親鴻毛之重晉灼曰葭莩裏之白皮也師古曰葭蘆也莩者其筩中白皮至薄者也葭莩喻薄鴻毛喻輕薄甚也前星五行志七下之下大辰心也心為明堂天子之象又星𫝊曰心大星天王也其前星太子也後星庶子也河源西域傳六十六張騫贊三十一西域傳河有兩源一出葱嶺山一出于闐于闐在南山下其河北流與葱嶺河合東注蒲昌海蒲昌海一名蓋澤者也去玉門陽關三百餘里廣袤三百里其水亭居冬夏不増減皆以為潛行地下南出於積石中國河又張騫傳贊曰禹本紀言河出昆侖山髙二千五百餘里日月所相避隱為光明也自張騫使大夏之後窮河源惡睹所謂昆侖者乎故言九州山川尚書近之矣至禹本紀山經所有放哉鄧展曰尚書曰導河積石是謂河源出於積石積石在金城河關不言出昆侖也㑹稽禹穴九疑司馬遷傳三十二司馬相如傳注司馬遷自叙曰遷年十嵗則誦古文二十而南游江淮上㑹稽探禹穴窺九疑張晏曰禹巡狩至㑹稽而崩因葬焉上有孔穴民間云禹入此穴師古曰㑹稽山名本茅山也禹於此㑹諸侯之計因名㑹稽也九疑山在零陵營道縣舜所葬也疑似也山有九峯其形相似故曰九疑紫貝相如傳二十七上釣紫貝郭璞曰紫貝紫質黒文也師古曰貝水中介蟲古以為貨也珊瑚相如傳郭璞曰珊瑚生水底石邊大者樹髙二尺餘枝格交錯無有葉家徒四壁相如傳相如居成都家徒四壁立師古曰徒空也但有四壁更無資産犢鼻相如傳相如身自著犢鼻褌師古曰即今之衳也形似犢鼻故以名云衳音之容反蜀徼西南夷傳六十五巴蜀西南外蠻夷諸侯秦時頗置吏焉秦滅漢興皆棄此國而關蜀故徼師古曰西南之徼猶北方塞也徼音工釣反張揖曰徼謂以木石水為界者也請吏一竒相如傳二十七下西南夷傳卭莋之君長聞南夷與漢通得賞賜多多欲願為内臣妾請吏比南夷南夷君長以十數夜郎最大武帝時唐䝉往南粤食蜀枸醬問之知牂柯江出畨禺城下歸上書說上曰竊聞夜郎所有精兵可得十萬浮船牂柯出不意此制粤一竒也流離西域傳六十六上流離出罽賔國師古曰魏略云大秦國出赤白黒黄青緑縹紺紅紫十種流離變告韓信傳四師古曰凡言變告者謂告非常之事持更西域傳杜欽說王鳳曰欲遣使報送罽賔國使斥候七百餘人五分夜擊刁斗自守師古曰夜有五更故分而持之附離五行志七下之下成帝時夜過中星隕谷永曰星辰附離于天猶庶民附麗王者也王者失道下將叛去故星叛天而隕以見其象監奴霍光傳三十八霍光愛幸監奴馮子都常與計事師古曰監奴謂奴之監知家務者也甲令宣帝紀地節四年後漢皇后紀十上文頴曰蕭何承秦法所作為律令經是也如淳曰令有先後故有令甲令乙令丙師古曰甲乙者若今之第一第二篇耳後漢書向使設外戚之禁編著甲令改正后妃之制貽厥方來豈不休哉試守一切平帝紀元始元年後漢齊武王縯傳注平帝初即位詔二百石以上一切滿秩如真師古曰時諸官有試守者特加非常之恩令如真耳非凡除吏皆當試守也一切者權時之事非經常也猶如以刀切物茍取整齊不顧長短縱横故言一切他皆倣此後漢注云試守者稱職滿嵗為真昆明池武帝紀元狩三年發謫吏穿昆明池臣瓚曰西南夷傳有越雋昆明國有滇地方三百里漢使求身毒國而為昆明所閉今欲伐之故作昆明池象之以習水戰在長安西南周回四十里食貨志又曰時越欲與漢用船戰遂乃大修昆明池也師古曰謫吏吏有罪者罰而役之滇音顛居延武帝紀元狩二年將軍去病出北地二千餘里過居延師古曰居延匈奴中地名也五屬國武帝紀匈奴昆邪王殺休屠王并將其衆合四萬餘人來降置五屬國以處之以其地為武威酒泉郡師古曰昆音下門反屠音儲凡言屬國者存其國號而屬漢朝故曰屬國武威今凉州也酒泉今肅州也詳延武帝紀元朔五年詳延天下方聞之士咸薦諸朝師古曰詳悉也延引也方道也聞博聞也言悉引有道博聞之士而進於朝也鄜畤郊祀志五上畤音止神靈之所止也秦文公夢黄蛇自天下屬地其口止於鄜衍作鄜畤祭白帝焉李竒曰三輔謂山阪間為衍密畤郊祀志作鄜畤後八十四年秦宣公作密畤於渭南祭青帝吳陽上下畤郊祀志自秦宣公作密畤後二百五十年而秦靈公於吳陽作上畤祭黄帝作下畤祭炎帝自未作鄜畤而雍旁故有吳陽武畤雍東有好畤皆廢無祀或曰自古以雍州積髙神明之隩故立畤郊上帝諸神祠皆聚云又作吳陽上下畤後五十年櫟陽雨金秦獻公自以為得金瑞故作畦畤櫟陽而祀白帝師古曰畦畤者如種韭畦之形而於畦中各為一土封也畦音下圭反五畤郊祀志諸祠唯雍四畤上帝為尊髙祖東擊項籍而還入關問故秦時上帝祀何帝也對曰四帝有白青黄赤帝之祠髙祖曰吾聞天有五帝而四何也莫知其說於是髙祖曰吾知之矣待我而具五也迺立黒帝祠名曰北畤有司進祠上不親往至文帝始幸雍郊見五畤趙人新垣平以望氣見上言長安東北有神氣成五采若人冠冕焉宜立祠上帝以合符應於是作渭陽五帝廟帝一殿面五門各如其帝色祠所用及儀亦如雍五畤木寓龍馬郊祀志秦祠四畤毎畤用木寓龍一駟木寓車馬一駟各如其帝色李竒曰寓寄也寄生龍形於木也師古曰一駟亦四龍也三服官元帝紀元初五年罷齊三服官李斐曰齊國舊有三服之官春獻冠幘縰為首服紈素為冬服輕綃為夏服凡三縰與纚同音山爾反司馬門元帝紀元初五年後漢趙孝王傳四項籍傳一師古曰司馬門者宫之外門也衛尉有八屯衛候司馬主衛士徼巡宿衛毎面各二司馬故謂宫之外門為司馬門項籍傳留司馬門三日師古曰凡言司馬門者宫垣之内兵衛所在四面皆有司馬司馬主武事故總謂宫之外門為司馬門後漢趙王乾居父喪白衣出司馬門注云諸侯王宫門有兵衛亦為司馬門陽朔年成帝紀河平四年山陽火生石中明年改元為陽朔師古曰朔始也以火生石中言陽氣之始微行成帝紀鴻嘉五年上始為微行出張晏曰於後門出從期門郎及私奴客十餘人白衣組幘單騎出入市里不復警蹕若微賤之所為故曰微行陵夷成帝紀鴻嘉二年帝王之道曰以陵夷師古曰陵丘陵也夷平也言其頽替若丘陵之漸平也又曰陵遲亦如丘陵之逶遲稍卑下也客土成帝紀永始元年詔曰昌陵作治五年百姓罷勞客土疏惡終不可成服䖍曰取他處土以増髙為客土枌榆社郊祀志五上髙祖禱豐枌榆社鄭氏曰枌榆鄉名也社在枌榆晉灼曰枌白榆也社在豐東北十五里師古曰以此樹為社神因立名也枌音符云反公社郊祀志髙祖令縣為公社李竒曰公社猶官社官稷平帝紀元始三年安漢公奏立官稷師古曰初立官稷於官社之後是為一處今更創置建於别所不相從也槥櫝成帝紀河平四年民為水所流死不能自葬者令郡國給槥櫝葬埋師古曰槥櫝謂小棺槥音衛米鹽黄霸傳五十九咸宣傳黄霸為潁川太守為政米鹽靡密初若煩碎師古曰米鹽言雜而且細咸宣為左内史其治米鹽銀黄三組楊僕傳六十楊僕懐銀黄垂三組師古曰銀銀印也黄金印也僕為主爵都尉又為樓船將軍并將梁侯三印故三組也組綬也郎中令百官公卿表七上郎中令秦官武帝更名光禄勲臣瓚曰主郎内諸官故曰郎中令應劭曰光明也禄爵也勲功也中郎將百官公卿表中郎有五官左右三將秩皆比二千石車戶騎三將百官公卿表郎中有車戶騎三將秩皆比千石如淳曰主車曰車郎主户衛曰戸郎漢儀注左右車將主左右車郎左右戸將主左右戸郎檻車陳餘傳二貫髙與趙王檻車詣長安師古曰檻車者車而為檻形謂以板四周之無所通見絶亢陳餘傳貫髙絶亢而死師古曰亢者總謂頸耳爾雅云即喉嚨也音工郎反沐猴項籍傳一人謂楚人沐猴而冠張晏曰沐猴獮猴也師古曰言雖著人衣冠其心不𩔖人也辟易項籍傳楊喜為郎騎追項羽羽還叱之喜人馬俱驚辟易數里師古曰辟易謂開張而易其本處辟音頻亦反麗譙陳勝傳一陳勝攻陳戰譙門中師古曰譙門謂門上為髙樓以望耳樓一名譙故謂美麗之樓為麗譙譙亦呼為巢所謂巢車者亦於兵車之上為樓以望敵也譙巢聲相近本一物也蔕芥相如傳二十七上賈誼傳十八吞若雲夢者八九其於胷中曽不蔕芥張揖曰蔕芥刺鯁也賈誼傳注師古云蔕芥小鯁也攝弓相如傳二十七下攝弓而馳師古曰攝謂張弓注矢而持之也攝女涉反騎置西域傳六十六下事有便宜因騎置以聞師古曰騎置即今之驛馬也斷匈奴左右臂西域傳贊後漢班超傳三十七孝武之世圖制匈奴患其兼從西國結黨南羌迺表河曲列四郡開玉門通西域以斷匈奴右臂隔絶南羌月氏單于失援由是逺遁而幕南無王庭後漢班超曰先帝開西域議者皆曰取三十六國號為斷匈奴右臂注云哀帝時劉歆上議曰武帝時立五屬國起朔方伐朝鮮起元莵樂浪以斷匈奴之左臂西伐大宛結烏孫裂匈奴之右臂南面以西為右也分陜王莽傳六十九中王莽時分陜立二伯師古曰分陜者欲依周公召公故事自陜以東周公主之自陜以西召公主之甌脫匈奴傳六十四上東胡使使謂冒頓曰匈奴所與我界甌脫外棄地匈奴不能至也吾欲有之服䖍曰甌脫作土室胡兒所作以候漢也師古曰境上候望之處若今之伏宿舍也甌音一侯反脫音土活反威斗王莽傳六十九下王莽親之南郊鑄作威斗威斗者以五石銅為之長二尺五寸以厭勝衆兵既成令司命負之莽出在前入在御旁李竒曰以五色藥石及銅為之師古曰若今作鍮石之為跂行喙息匈奴傳上及飛鳥跂行喙息蝡動之𩔖師古曰跂行凡有足而行者也喙息凡以口出氣者也跂音岐喙音許穢反蝡音人兖反豬其宫室王莽傳六十九上古者畔逆之國既已誅討則豬其宫室以為汙池納垢濁焉名曰凶虚雖生菜茹而人不食李竒曰掘其宫以為池用貯水也師古曰豬謂畜水汙下也汙音烏所食之菜曰茹盱衡王莽傳盱衡厲色振揚武怒孟康曰眉上曰衡盱衡舉揚目也校司馬南粤王傳六十五伏波將軍路博徳討南粤而南粤王趙建徳亡入海伏波遣人追故其校司馬蘇宏得建徳師古曰校之司馬若今之行軍總管司馬也受降城匈奴傳李陵傳二十四單于年少好殺伐左大都尉使人間告漢曰我欲殺單于降漢漢聞此言故築受降城李陵𫝊注師古曰受降城公孫敖所築兩漢博聞卷五
