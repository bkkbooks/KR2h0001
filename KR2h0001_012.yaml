body:
  text: 兩漢博聞卷十二宋楊侃輯物色錯愕寒朗傳三十一注云物色謂形狀也錯愕猶倉卒也錯七故反愕五故反貫行東平憲王蒼三十二前漢谷永傳附光武營建陵地詔曰無為山陵陂池裁令流水而已孝明皇帝大孝無違奉承貫行注云貫行謂一皆遵奉也谷永曰一以貫行固執無違谷永傳云以次貫行固執無違師古曰貫聨續也謂永所陳奏諸事宜次第相續行之不當更違異也太白經天廣陵思王荆傳三十二太白前出西方至午兵當起注云洪範五行傳云太白少隂之星以己未為界不得經天而行經天為不臣今至午是為經天也款段馬馬援傳十四注云􅍁猶緩也言形段遲緩也試守馬援傳朱勃未二十右扶風請試守渭城宰注云試守者試守一嵗乃為真食其全俸麤糲伏湛傳十六注云麤糲米也九章筭術曰粟五斗糲率三斗一斛粟得六斗米為糲也眩瞀韋彪傳十六注云眩風疾也瞀亂也謂視不明之貌也眩音縣瞀亡遘反髫髪伏湛傳十六髫髪厲志白首不衰注云埤蒼曰髫髦也髫髪謂童子垂髪正印文馬援傳十四注云東觀記曰馬援上書臣所假伏波將軍印書伏字犬外嚮城臯令印臯字為白下羊丞印四下羊尉印白下人人下羊即一縣長吏印文不同恐天下不正者多符印所以為信也所宜齊同薦曉古文字者事下大司空正郡國印章奏可頭山馬援傳注云頭山山名也在今辰州沅陵東武陵記曰此山頭與東海方壺山相似神仙多所遊集因名壺頭山也山邊有石窟即馬援所穿室以避炎氣也室内有蛇如百斛船大云是援之餘靈也荅布馬援傳公孫述為馬援制都布單衣注云東觀記曰都作荅前書音義曰荅布白疊布也椒風班固傳三十上前漢董賢傳附注云桓譚新論曰董賢女弟為昭儀居舍號曰椒風召賢女弟為昭儀位次皇后更名其舍為椒風以配椒房師古曰皇后殿稱椒房欲配其名故云椒風昭陽殿班固傳注云昭陽殿成帝趙昭儀所居也泰紫班固傳西都賦云放泰紫之圓方注云放象也泰紫謂泰㣲紫宫也劉向七略曰明堂之制内有太室象紫宫南出明堂象太微春秋合誠圖曰太微其星十二四方史記天官書曰環之匡衛十二星藩臣皆曰紫宫是太微方而紫宫圓也避第皇甫規傳五十五皇甫規自以連在大位欲退身避第注云言欲歸第避仕宦之塗也帷幄仲長統傳三十九注云在旁曰帷在上曰幄檢柙仲長統傳三十九中世之選三公也務於清慤謹慎循常習故者是婦女之檢柙鄉曲之常人耳惡足以居斯位邪注云檢柙猶規矩狙詐黨錮傳序五十七霸德旣衰狙詐萌起注云霸德衰謂六國時也狙七余反廣雅曰狙彌猴也以其多詐故比之也叔末黨錮傳序叔末澆訛王道陵缺注云叔末猶季世也權崔寔傳四十二聖人執權遭時定制步驟之差各有云設注云權謂變也遭遇其時而定法制不循於舊也兼金張衡傳四十九注云兼金價倍於惡者故曰兼金邪揄王霸傳十王郎起光武在薊郎移檄購光武光武令王霸至市中募人將以擊郎市人皆大笑舉手邪揄之注云説文曰歋手相笑歋弋支反音踰或音由此云邪揄語輕重不同强項楊震傳四十四注云强項言不低屈也慺慺楊賜傳四十四不盡其慺慺之心注云慺慺猶勤勤也慺力侯反壽冢侯覽傳六十八注云生而自為冢為壽冡抵罪南匈奴傳七十九中郎將張脩與單于不相能脩擅斬之更立右賢王羌渠為單于脩以不先請而擅誅殺檻車徵詣廷尉抵罪注云前書注曰抵至也殺人者死張脩擅斬單于呼徵故至其罪也南北庭南匈奴傳論乃詔有司開北鄙擇肥美之地量水草以處之馳中郎之使盡法度以臨之制衣裳備文物加璽紱之綬正單于之名於是匈奴分破始有南北二庭焉注云永元三年將軍竇憲請立於除鞬為北單于是為北庭由南北二庭自相馳突而漢之塞地晏然無事矣前載南匃奴傳論坐樹大鯁永言前載注云由竇憲請立北庭遂使匈奴滋蔓即是坐樹大鯁永言前事深可恨哉載事也調榖蓋勲傳四十八蓋勲為漢陽太守調榖以稟飢人注云調猶發也嗇夫城陽恭王傳四百官志二十八光武十八年立考侯康侯廟北園陵置嗇夫注云嗇夫本鄉官主知賦役多少平其差品園陵置之知祭祀徵求諸事注云風俗通曰嗇者省也夫賦也言消息百姓均其役賦平署李膺傳五十七李膺等遭黨事當考實案經三府太尉陳蕃郤之曰今所考案皆海内人譽憂國忠公之臣此等猶將十世宥也豈有罪名不章而致收掠者乎不肯平署注云平署猶連署比門夏馥傳五十七夏馥行質直同縣髙氏蔡氏並皆富植郡人畏而事之唯馥比門不與交通注云比門猶並門也版蕩董卓傳論六十二版蕩之篇於焉而極注云詩曰上帝版版下民卒癉注云版反也癉病也言厲王為改反先王之道民盡病也又蕩之什曰蕩蕩上帝下民之辟注云蕩蕩法度廢壊之貎也九市班固傳三十上注云長安九市其六在道西三在道東山西鄭興傳二十六注云山西謂陜山已西也門士郭太傳五十八庾乗少給事縣庭為門士注云門士即門卒也大駔郭太傳段干木晉國之大駔注云說文曰駔儈也謂合兩家之賣買如今之度市也駔子朗反題目許劭傳五十八許劭少峻名節好人倫多所賞識曹操微時嘗卑辭厚禮求為已目劭鄙其人而不對操乃伺隙脅劭劭不得已曰君清平之姦賊亂世之英雄操大悦而去注云已目者令品藻為題目琴操曹襃傳二十五注云操猶曲也劉向别錄曰君子因雅琴之適故從容以致思焉其道閉塞悲愁而作者名其曲曰操言遇災害不失其操也紂為象筯箕子諫不聽乃佯狂為奴隱而鼓琴以自悲故傳之曰箕子操園邑梁竦傳二十四注云文帝即位追尊薄太后父為靈文侯㑹稽郡置園邑三百家綺疏梁冀傳二十四窗牖皆綺疏青瑣注云牖小窗也綺疏謂鏤為綺文青瑣謂刻為瑣文而以青飾之也飛梁梁冀傳注云架虛為橋若飛也洞户梁冀傳連房洞户注云洞通也謂相當也偃伯靈臺馬融傳五十上注云司馬法曰古者武軍三年不興則凱樂凱歌偃伯靈臺荅人之勞告不興也偃休也伯師節也靈臺望氣之臺也亡命王常傳五王常舞陽人也王莽末為弟報仇亡命江夏注云命者名也言背其名籍而逃亡也刋章孔融傳六十山陽張儉為中常侍侯覽所怨覽為刋章下州郡以名捕儉注云刋削也謂削去告人姓名郵置郭太傳五十八注云説文曰郵境上傳書舍也廣雅曰郵驛也置亦驛也風俗通曰漢改郵為置置者度其逺近之間置之也隷名孔融傳孔融為將作大匠遷少府每朝㑹訪對融輒引正定議公卿大夫皆隷名而已注云説文云隷附著隱几孔融傳注云隱憑也直指孔融傳孔融曰馬日磾以上公之尊秉髦節之使銜命直指寧輯東夏注云直指無屈撓也前書有繡衣直指輯和也臘賜何敞傳三十三何敞曰臘賜自郎官以上公卿王侯以下至於空竭帑藏損耗國資注云臘賜大將軍三公錢各二十萬牛肉二百觔粳米二百斛特進侯十五萬卿十萬校尉五萬尚書三萬侍中將大夫各二萬千石六百石各七千虎賁羽林郎二人共三千以為祀門户直五湖馮衍傳十八下注云越絶書曰太湖周三萬六千頃虞翻云太湖有五道故謂之五湖隔湖洮湖射湖貴湖及太湖為五湖並太湖之小支俱連太湖故太湖兼得五湖之名在今湖州東也浩亹馬援傳十四注云浩亹音告門縣名屬金城郡浩水名也亹者水流夾山間兩岸深若門也詩曰鳬鷖在亹亦其義也今俗呼此水為閤門河蓋疾言之耳駱驛不絶郭伋傳二十一注云駱驛連續也優復杜詩傳二十一杜詩上疏曰今若使公卿郡守出於軍壘則將帥自厲士卒之復比於宿衛則戎士自百注云復謂優寛也音福續漢志曰羽林郎秩比三百石掌侍從宿衛言士卒得比於郎則人百其勇轔藉廉范傳二十一虜自相轔藉死者千餘人注云轔轢也藉相蹈藉也典負樊鯈傳二十二河南縣亡失官錢典負者坐死注云典謂主典負謂欠負二祖四宗肅宗紀元和二年詔祠二祖四宗注云二祖謂髙祖世祖四宗謂文帝為太宗武帝為世宗宣帝為中宗明帝為顯宗釡鬵和帝紀永元五年注云鬵音尋方言曰甑自關而東謂之鬵平民殤帝紀貪苛慘毒延及平民注云平民謂善人也書曰延于平人伏閉和帝紀永元六年六月己酉初令伏閉盡日注云漢官舊儀曰伏日萬鬼行故盡日閉不干他事墱道班固傳三十上西都賦云彌明光而絙長樂陵墱道而超西墉注云墱道陛級也柧棱班固傳西都賦云上柧棱而棲金雀注云柧棱殿堂上最髙處也柧音孤棱力登反其上棲金雀靈篇班固傳注云靈篇河洛之書也苛細宣秉傳十七宣秉務舉大綱簡畧苛細注云説文曰苛細草也以喻煩雜也仭積張讓傳六十八宦者傳論靈帝寵任宦官又於西園造萬金堂引司農金錢繒帛仞積其中注云仞滿也宦者論曰南金和寶冰紈霧縠之積盈仞珍藏廢典顯宗紀注云廢典謂明堂辟雍之禮歴漢不行也犀舟勁檝張衡傳四十九注云前書曰羌戎弓矛之兵器不犀利音義曰今俗謂刀兵利為犀犀堅也鎧馬蔡邕傳五十下幽冀舊壤鎧馬所出注云鎧甲也周禮考工記曰燕無函函亦甲也言幽燕之地家家皆能為函故無函匠也左傳云冀之北土馬之所生表左蔡邕傳蔡邕曰謹條宜所施行七事表左注云表左謂陳之於表左猶今云如左右者列將西北列將得無解體注云列將謂諸將也宰府蔡邕傳注云宰府謂三公府也右職蔡邕傳注云右用事之便謂樞要之官皁囊蔡邕傳注云漢官儀曰凡章表皆啟封其言密事得皁囊也魁頭露紒東夷傳七十五馬韓人大率皆魁頭露紒注云魁頭猶科頭也謂以髪縈繞成科結也紒音計闊達馬武傳十二馬武為人嗜酒闊達敢言注云闊達大度也敢言果敢於事無所隱也回容馬武傳光武雖制御功臣而每能回容宥其小失注云回曲也曲法以容也風星任文公傳七十二任文孫明曉天官風星秘要乙夜雞鳴歌百官志二十六注云凡中宫漏夜盡鼓鳴則起晝盡鍾鳴則息衛士甲乙檄相傳甲夜畢傳乙夜相傳盡五更衛士傳言五更未明三刻後雞鳴衛士踵丞郎趨嚴上臺不畜宫中雞汝南出雞鳴衛士候朱爵門外專傳雞鳴於宫中應劭曰楚歌今雞鳴歌也晉太康地道記曰後漢固始鮦陽公安細陽四縣衛士習此曲於闕下歌之今雞鳴是也賀冬至禮儀志五注云冬至陽氣起君道長故賀夏至隂氣起君道衰故不賀鼓以動衆鍾以止衆故夜漏盡鼓鳴則起晝漏盡鍾鳴則息杜宇張衡傳四十九五十七上文選左思賦四前漢揚雄傳張衡思𤣥賦云鼈令殪而尸亡兮取蜀禪而引世注云鼈令蜀王名也令音靈殪死也禪傳位也引長也揚雄蜀王本紀曰荆人鼈令死其尸流亡隨江水上至成都見蜀王杜宇杜宇立以為相杜宇號望帝自以德不如鼈令以其國禪之號開明帝下至五代有開明尚始去帝號復稱王也左思蜀都賦云碧化萇𢎞之血鳥生杜宇之魄注云萇𢎞死於蜀藏其血三年化為碧杜宇王蜀號曰望帝宇死化為子規鳥揚雄反騷云徒恐鷤䳏之將鳴兮顧先百草為不芳師古曰離騷云鷤䳏之先鳴兮使夫百草為不芳雄言終以自沈何惜芳草而憂鷤䳏也䳏鴂字也鷤鴂鳥一名買䤥一名子規一名杜鵑常以立夏鳴鳴則衆芳皆歇鷤大系反䳏音桂鷤字或作鶗亦音題鴂音決䤥音詭九宫張衡傳四十九張衡以圖緯虛妄非聖人之法乃上疏曰臣聞聖人明審律厯以定吉凶重之以卜筮雜之以九宫注云易乾鑿度曰太一取其數以行九宫鄭𤣥注云太一者北辰神名也下行八卦之宫每四乃還於中央中央者地神之所居故謂之九宫天數大分以陽出以隂入陽起於子隂起於午是以太一下九宫從坎宫始自此而從於坤宫又自此而從於震宫又自此而從於巽宫所以從半也還息於中央之宫既又自此而從於乾宫又自此而從於兊宫又自此而從於艮宫又自此而從於離宫行則周矣上遊息於太一之星而反紫宫行起從坎宫始終於離宫也陽月馬融傳五十注云爾雅曰十月為陽孫炎注云純隂用事嫌於無陽故以名云三家言天張衡傳張衡遷太史令遂乃研覈隂陽妙盡璇璣之政作渾天儀著靈憲筭罔論言甚詳明注云漢名臣奏曰蔡邕曰言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絶無師法周髀術數具存考驗天狀多所違失故史官不用唯渾天者近得其情今史官所用候臺銅儀則其法也靈憲序曰昔在先王將步天路用定靈軌尋緒本元先準之于渾儀體是為正儀故靈憲作興衡集無筭罔論葢網絡天地而筭之因名焉八行竇章傳十二注云馬融與竇章書曰孟陵奴來賜書見手迹歡喜可量書雖兩紙紙八行行七字象鑣輿服志二十九注云爾雅注曰鑣馬勒旁鐵也此用象牙乗輿有之五星蘇竟傳二十上注云五星謂東方嵗星南方熒惑西方太白北方辰星中央鎮星懐宫耿純傳十一注云懐宫河内縣名有離宫焉雲䍐輿服志上二十九法駕前驅有九斿雲䍐注云徐廣曰斿車有九乗前史不記形也武王克紂百夫荷䍐旗以先驅東京賦曰雲䍐九斿薛綜曰旌旗名皮軒輿服志上注云胡廣曰皮軒以虎皮為軒郭璞曰皮軒革車或曰即曲禮前有士師則載虎皮豹尾輿服志上大駕法駕最後一車懸豹尾豹尾以前比省中注云薛綜曰豹尾侍御史載之小學漢官篇曰豹尾過後罷屯解圍胡廣曰施於道路豹尾之内為省中故須過後屯圍乃得解皆所以戒不虞也淮南子曰軍正執豹皮所以制正其衆禮記前載虎皮亦此之𩔖一時之功吳漢傳八吳漢說彭寵曰漁陽上谷突騎天下所聞也君何不合二郡精鋭附劉公擊邯鄲此一時之功也注云一時言不可再遇也尼首髙獲傳七十二髙獲為人尼首方面注云尼首首象尼丘山中下四方高也右姓郭伋傳二十一强宗右姓注云右姓猶髙姓也白水為河張衡傳四十九注云河圖曰崑山出五色流水其白水東南流入中國名為河也天潢張衡傳思𤣥賦云乗天潢之汎汎兮浮雲漢之湯湯注曰史記曰王良旁有八星絶漢曰天潢雲漢曰天河也小靳崔寔傳四十二靈帝時開鴻都門牓賣官爵是時段熲等有功勤名譽然皆先輸貨財而後登公位崔烈時因傅母入錢五百萬得為司徒及拜日天子臨軒百僚畢㑹帝顧謂親倖曰悔不小靳可至千萬注云靳固惜之也靳或作傿説文曰傿引為價也一建反區種劉般傳二十九顯宗時以郡國牛疫通使區種増耕注云汜勝之書曰上農區田法方深各六寸間相去七寸一畝三千七百區丁男女種十畝至秋收區三升粟畝得百斛中農區田法方七寸深六寸間相去二尺一畝千二十七區丁男女種十畝秋收粟畝得五十一石下農區田法方九寸深六寸間相去三尺秋收畝得二十八石旱即以水沃之行春崔駰傳四十二强起班春注云郡國常以春行縣勸人農桑振救乏絶班布春令也桑榆孟嘗傳六十六年嵗有訖桑榆行盡注曰謂日將夕在桑榆間言晚暮也三署郎漢官左右中郎將皆秦官也比二千石三署郎皆屬焉三署謂五官署左右署也端門襄楷傳二十下前漢李尋傳襄楷曰去嵗五月熒惑入太微犯帝坐出端門不軌常道今年嵗星久守太微逆行西至掖門還切執法注云天官書曰太微南四星中為端門軌猶依也又曰端門左右星為掖門太微南四星為執法切謂廹近也前漢書注云端門太微正南門貪叨注云方言曰叨殘也苞苴第五種傳三十一楊賜傳四十四在鄉曲無苞苴之嫌步朝堂無擇言之闕注云苞苴饋遺也楊賜上封事曰夫女謁行則讒夫昌讒夫昌則苞苴通黄腸梁商傳二十四大將軍梁商薨帝賜以東園朱壽之器銀鏤黄腸玉匣什物二十八種注云壽器棺也以朱飾之以銀鏤之前書音義曰以栢木黄心為槨曰黄腸也鄭公鄉鄭𤣥傳二十五孔融告髙密縣為鄭𤣥特立一鄉曰昔齊置士鄉越有君子軍皆異賢之意鄭君好學實懐明德昔太史公廷尉吳公謁者僕射鄧公皆漢之名臣又南山四皓有東園公夏黄公潛光隱耀世嘉其髙皆悉稱公然則公者仁德之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉注云管仲相桓公制國為二十一鄉工商鄉六士鄉十五以居工商士也吳越相攻越王勾踐乃中分其師為左右軍以其私卒君子六千人為中軍注云君子王所親近有志行者事並見國語公羊墨守鄭𤣥傳任城何休好公羊學遂著公羊墨守左氏膏肓榖梁廢疾鄭𤣥乃發墨守鍼膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎注云言公羊義理深逺不可駁難如墨翟之守城也説文云肓隔也心下為膏喻左氏之疾不可為也康成𤣥字也顥氣班固傳三十上西都賦云抗仙掌與承露擢雙立之金莖軼埃壒之混濁鮮顥氣之清英注云説文云顥白貌音皓棹卒岑彭傳棹卒六萬餘人注云棹卒持棹行船也露橈岑彭傳露橈數千艘注云爾雅曰檝謂之橈露橈謂露檝在外人在船中巫蠱和帝隂皇后傳十挾巫蠱道注云巫師為蠱故曰巫蠱左傳注曰蠱惑也讎校和熹鄧皇后紀十東觀讎校傳記注云讎對也侲子和熹鄧皇后紀太后以隂陽不和軍旅數興詔饗㑹勿設戲作樂减逐疫侲子之半注云侲子逐疫之人也音振薛綜注西京賦云侲之為言善也善童幼子也續漢書曰大儺選中黄門子弟年十嵗以上十二以下百二十人為侲子皆赤幘皁製執大鞉兩漢博聞卷十二
